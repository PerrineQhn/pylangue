En NLP, en IA et avec les LLM, la donn\xe9e de base est **la cha\xeene de caract\xe8res**. Avant de parler de tokens, d'embeddings ou d'attention, il faut \xeatre \xe0 l'aise avec la manipulation de texte en Python \u{2014} c'est le socle de *tout* le reste : nettoyage de corpus, construction de prompts, parsing de r\xe9ponses de mod\xe8les.

## Variables et cha\xeenes

Une variable se cr\xe9e par simple affectation. Les cha\xeenes (\`str\`) se d\xe9limitent par des guillemets simples ou doubles :

\`\`\`
phrase = "Les mod\xe8les de langage pr\xe9disent le prochain token."
auteur = 'un data scientist'
\`\`\`

Les **f-strings** sont la mani\xe8re moderne d'ins\xe9rer des valeurs dans du texte \u{2014} tu les utiliseras en permanence pour construire des prompts :

\`\`\`
modele = "GPT"
prompt = f"R\xe9sume ce texte comme le ferait {auteur} avec {modele}."
\`\`\`

## Les m\xe9thodes de cha\xeenes essentielles

- \`.lower()\` / \`.upper()\` \u{2014} normaliser la casse
- \`.strip()\` \u{2014} retirer les espaces (et sauts de ligne) en d\xe9but/fin
- \`.replace(a, b)\` \u{2014} remplacer une sous-cha\xeene
- \`.split(sep)\` \u{2014} d\xe9couper en liste (premi\xe8re \xe9tape vers la *tokenisation* !)
- \`.join(liste)\` \u{2014} recoller une liste en cha\xeene
- \`in\` \u{2014} tester la pr\xe9sence d'une sous-cha\xeene

> En nettoyage de corpus r\xe9el, ces six m\xe9thodes couvrent une part \xe9norme du travail quotidien.`},{kind:"code",title:"Exemple à exécuter — observe chaque sortie",runnable:!0,code:`texte = "  Le Transformer a \xe9t\xe9 introduit en 2017.  \\n"

propre = texte.strip()
print(repr(propre))          # repr() montre la cha\xeene exacte

minuscules = propre.lower()
print(minuscules)

mots = minuscules.split(" ")
print(mots)
print(f"Nombre de mots : {len(mots)}")

# .join() fait l'inverse de .split()
recolle = " ".join(mots)
print(recolle)`},{kind:"exercise",exercise:{id:"m1l1e1",title:"Normaliser un texte brut",instructions:`\xc9cris une fonction \`normaliser(texte)\` qui :

1. retire les espaces et sauts de ligne en d\xe9but/fin,
2. met tout en minuscules,
3. remplace les doubles espaces \`"  "\` par des espaces simples.

C'est litt\xe9ralement la premi\xe8re \xe9tape de 90 % des pipelines NLP.`,starterCode:`def normaliser(texte):
    # \xc0 toi de jouer !
    ...

print(normaliser("  Bonjour  le MONDE \\n"))`,solution:`def normaliser(texte):
    texte = texte.strip()
    texte = texte.lower()
    texte = texte.replace("  ", " ")
    return texte

print(normaliser("  Bonjour  le MONDE \\n"))`,tests:`assert normaliser("  Bonjour  le MONDE \\n") == "bonjour le monde", "La normalisation de '  Bonjour  le MONDE ' devrait donner 'bonjour le monde'"
assert normaliser("IA") == "ia", "normaliser('IA') devrait donner 'ia'"
assert normaliser(" Un  deux  trois ") == "un deux trois", "Les doubles espaces doivent devenir simples"
print("TESTS_PASS")`,hints:["Enchaîne les méthodes : strip() d'abord, puis lower(), puis replace().","N'oublie pas le return ! Une fonction sans return renvoie None."]}},{kind:"quiz",questions:[{question:'Que renvoie "Hello World".split(" ") ?',options:['"HelloWorld"','["Hello", "World"]','("Hello", "World")',"Une erreur"],correct:1,explanation:"split() découpe la chaîne selon le séparateur et renvoie une liste de sous-chaînes. C'est l'ancêtre conceptuel de la tokenisation."},{question:"Pourquoi les f-strings sont-elles importantes quand on travaille avec des LLM ?",options:["Elles rendent le code plus rapide","Elles servent à construire dynamiquement des prompts avec des variables","Elles sont obligatoires en Python 3","Elles compressent le texte"],correct:1,explanation:"Un prompt est presque toujours un template avec des parties variables (contexte, question de l'utilisateur, exemples). Les f-strings sont l'outil de base pour ça."}]}]},{id:"m1l2",title:"Listes, dictionnaires et fréquences de mots",minutes:30,sections:[{kind:"text",md:`# Compter les mots : ton premier mod\xe8le de langage (ou presque)

Avant les r\xe9seaux de neurones, le NLP reposait sur le **comptage**. Et m\xeame aujourd'hui, compter des fr\xe9quences reste partout : construction de vocabulaires, TF-IDF, statistiques de corpus, d\xe9tection de mots-cl\xe9s.

## Les listes

Une liste est une s\xe9quence ordonn\xe9e et modifiable :

\`\`\`
tokens = ["le", "chat", "dort"]
tokens.append("profond\xe9ment")
premier = tokens[0]        # indexation
derniers = tokens[-2:]     # slicing : les 2 derniers
\`\`\`

## Les dictionnaires

Un dictionnaire associe des **cl\xe9s** \xe0 des **valeurs**. C'est LA structure de donn\xe9es du NLP : vocabulaires (\`mot \u{2192} id\`), comptages (\`mot \u{2192} fr\xe9quence\`), embeddings (\`mot \u{2192} vecteur\`)\u{2026}

\`\`\`
comptes = {}
comptes["chat"] = 1
comptes["chat"] = comptes["chat"] + 1   # incr\xe9menter
"chien" in comptes                       # tester une cl\xe9 : False
comptes.get("chien", 0)                  # valeur par d\xe9faut : 0
\`\`\`

## Le motif fondamental : compter

\`\`\`
for token in tokens:
    comptes[token] = comptes.get(token, 0) + 1
\`\`\`

Ce petit motif de trois lignes, tu vas le r\xe9\xe9crire des dizaines de fois dans ta carri\xe8re (ou utiliser \`collections.Counter\`, sa version standard).`},{kind:"code",title:"Counter : le comptage version bibliothèque standard",runnable:!0,code:`from collections import Counter

texte = "le chat dort et le chien dort aussi le chat r\xeave"
tokens = texte.split()

comptes = Counter(tokens)
print(comptes)
print(comptes.most_common(3))   # les 3 tokens les plus fr\xe9quents

# Un vrai vocabulaire NLP : mot -> identifiant entier
vocab = {mot: i for i, mot in enumerate(sorted(comptes))}
print(vocab)`},{kind:"exercise",exercise:{id:"m1l2e1",title:"Top-k des mots d'un texte",instructions:"Écris une fonction `top_mots(texte, k)` qui renvoie la liste des `k` mots les plus fréquents du texte (en minuscules), du plus fréquent au moins fréquent.\n\nUtilise `Counter` et sa méthode `.most_common(k)` — mais attention, elle renvoie des paires `(mot, compte)` et on ne veut que les mots.",starterCode:`from collections import Counter

def top_mots(texte, k):
    # 1. minuscules, 2. split, 3. Counter, 4. extraire les mots
    ...

print(top_mots("Le chat dort le chat r\xeave le chien", 2))`,solution:`from collections import Counter

def top_mots(texte, k):
    tokens = texte.lower().split()
    comptes = Counter(tokens)
    return [mot for mot, _ in comptes.most_common(k)]

print(top_mots("Le chat dort le chat r\xeave le chien", 2))`,tests:`assert top_mots("Le chat dort le chat r\xeave le chien", 2) == ["le", "chat"], "Les 2 mots les plus fr\xe9quents sont 'le' puis 'chat'"
assert top_mots("a b b c c c", 1) == ["c"], "Le mot le plus fr\xe9quent est 'c'"
assert top_mots("x", 5) == ["x"], "Si k d\xe9passe le nombre de mots, on renvoie ce qu'on a"
print("TESTS_PASS")`,hints:["texte.lower().split() te donne la liste des tokens en minuscules.","Counter(tokens).most_common(k) renvoie [(mot, compte), ...] — utilise une list comprehension pour ne garder que les mots."]}},{kind:"quiz",questions:[{question:"Quelle structure de données représente naturellement un vocabulaire mot → identifiant ?",options:["Une liste","Un tuple","Un dictionnaire","Une chaîne"],correct:2,explanation:"Le dictionnaire fait l'association clé → valeur en temps constant. Les tokenizers de Hugging Face contiennent exactement ça : un dict token → id."},{question:'Que fait comptes.get("chien", 0) si "chien" n\'est pas dans le dictionnaire ?',options:["Lève une KeyError","Renvoie None","Renvoie 0",'Ajoute "chien" au dictionnaire'],correct:2,explanation:"get(clé, défaut) renvoie la valeur par défaut sans erreur ni modification. C'est ce qui rend le motif de comptage si compact."},{question:"En NLP, pourquoi met-on généralement le texte en minuscules avant de compter ?",options:["Pour économiser de la mémoire",'Pour que "Le" et "le" soient comptés comme le même mot',"Python l'exige","Pour accélérer le split"],correct:1,explanation:"C'est une forme de normalisation : sans elle, le vocabulaire explose avec des doublons. (Les tokenizers modernes comme BPE font des choix plus subtils, on le verra au palier 2.)"}]}]},{id:"m1l3",title:"Mini-projet : analyseur de corpus",minutes:35,sections:[{kind:"text",md:`# Assembler tout : ton premier outil NLP complet

Tu sais nettoyer, d\xe9couper, compter. Il est temps d'assembler ces briques en un vrai outil : un **analyseur statistique de texte** \u{2014} la premi\xe8re chose qu'on fait face \xe0 un corpus inconnu, avant tout entra\xeenement ou toute indexation.

## Les statistiques qui comptent

- **Nombre de tokens** et **taille du vocabulaire** (mots uniques) : l'ordre de grandeur du corpus,
- **Richesse lexicale** = vocabulaire / tokens : proche de 1 \u{2192} texte tr\xe8s vari\xe9 ; proche de 0 \u{2192} tr\xe8s r\xe9p\xe9titif. (Les linguistes l'appellent *type-token ratio*.)
- **Longueur moyenne des mots** : un indicateur de registre (langage courant vs technique),
- **Hapax** : les mots qui n'apparaissent qu'une seule fois \u{2014} souvent 40-50 % du vocabulaire d'un corpus r\xe9el ! C'est la fameuse *loi de Zipf* : quelques mots tr\xe8s fr\xe9quents, une immense tra\xeene de mots rares.

## Pourquoi c'est important en pratique

Ces statistiques guident des d\xe9cisions tr\xe8s concr\xe8tes : la taille de vocabulaire d'un tokenizer, le choix d'une taille de chunk pour un RAG, la d\xe9tection de corpus dupliqu\xe9s ou anormaux avant un fine-tuning. Les rapports de qualit\xe9 de donn\xe9es des grands labos commencent tous par ces chiffres.`},{kind:"exercise",exercise:{id:"m1l3e1",title:"La fonction analyser()",instructions:'Écris `analyser(texte)` qui renvoie un dictionnaire avec exactement ces clés :\n\n- `"tokens"` : nombre total de mots (après `.lower().split()`),\n- `"vocabulaire"` : nombre de mots uniques,\n- `"richesse"` : vocabulaire / tokens, arrondi à 3 décimales (`round(x, 3)`),\n- `"hapax"` : liste **triée** des mots n\'apparaissant qu\'une fois,\n- `"top3"` : les 3 mots les plus fréquents (utilise `Counter.most_common`).\n\nPour un texte vide, renvoie `{"tokens": 0, "vocabulaire": 0, "richesse": 0.0, "hapax": [], "top3": []}`.',starterCode:`from collections import Counter

def analyser(texte):
    ...

resultat = analyser("le chat dort et le chien dort aussi le chat r\xeave")
for cle, valeur in resultat.items():
    print(f"{cle} : {valeur}")`,solution:`from collections import Counter

def analyser(texte):
    mots = texte.lower().split()
    if not mots:
        return {"tokens": 0, "vocabulaire": 0, "richesse": 0.0, "hapax": [], "top3": []}
    comptes = Counter(mots)
    return {
        "tokens": len(mots),
        "vocabulaire": len(comptes),
        "richesse": round(len(comptes) / len(mots), 3),
        "hapax": sorted(m for m, c in comptes.items() if c == 1),
        "top3": [m for m, _ in comptes.most_common(3)],
    }

resultat = analyser("le chat dort et le chien dort aussi le chat r\xeave")
for cle, valeur in resultat.items():
    print(f"{cle} : {valeur}")`,tests:`_r = analyser("le chat dort et le chien dort aussi le chat r\xeave")
assert _r["tokens"] == 11, "11 tokens au total"
assert _r["vocabulaire"] == 7, "7 mots uniques"
assert _r["richesse"] == round(7 / 11, 3), "richesse = vocabulaire / tokens, arrondie \xe0 3 d\xe9cimales"
assert _r["hapax"] == ["aussi", "chien", "et", "r\xeave"], "Les hapax, tri\xe9s alphab\xe9tiquement"
assert _r["top3"][0] == "le", "'le' (3 occurrences) est le plus fr\xe9quent"
assert set(_r["top3"][1:]) == {"chat", "dort"}, "'chat' et 'dort' (2 occurrences chacun) compl\xe8tent le top 3"
_v = analyser("")
assert _v == {"tokens": 0, "vocabulaire": 0, "richesse": 0.0, "hapax": [], "top3": []}, "Texte vide : le dict par d\xe9faut"
print("TESTS_PASS")`,hints:["Counter(mots) te donne tout : len(comptes) est le vocabulaire, comptes.items() permet de filtrer les hapax.","Les hapax : sorted(m for m, c in comptes.items() if c == 1).","Traite le cas du texte vide en premier (if not mots) pour éviter la division par zéro."]}},{kind:"quiz",questions:[{question:"Un corpus a une richesse lexicale de 0.05. Qu'est-ce que ça suggère ?",options:["Un texte très créatif et varié","Un texte très répétitif (peu de mots uniques rapportés au total) — typique de logs, de spam ou de données dupliquées","Un corpus multilingue","Une erreur de calcul"],correct:1,explanation:"Une richesse très basse est un signal d'alerte avant un fine-tuning : données dupliquées ou dégénérées. Ce simple ratio détecte des problèmes que l'œil ne voit pas sur 10 Go de texte."},{question:"Que dit la loi de Zipf sur les fréquences des mots ?",options:["Tous les mots ont à peu près la même fréquence","Une poignée de mots domine le corpus, et une immense traîne de mots est très rare","Les mots longs sont plus fréquents","La fréquence dépend de l'alphabet"],correct:1,explanation:"Le 1er mot est ~2× plus fréquent que le 2e, ~3× que le 3e… Cette distribution explique pourquoi les hapax pullulent, pourquoi TF-IDF fonctionne, et pourquoi les tokenizers BPE compressent si bien les mots fréquents."}]}]}]},{id:"m2",tier:1,title:"Fonctions, pipelines et objets",tagline:"Structurer son code comme un vrai pipeline NLP : fonctions, comprehensions, classes.",status:"ready",lessons:[{id:"m2l1",title:"Fonctions et list comprehensions",minutes:30,sections:[{kind:"text",md:`# Du script au pipeline

Un pipeline NLP r\xe9el, c'est une suite d'\xe9tapes : *nettoyer \u{2192} tokeniser \u{2192} filtrer \u{2192} vectoriser*. Chaque \xe9tape m\xe9rite sa **fonction** : testable, r\xe9utilisable, rempla\xe7able.

## Fonctions : les bons r\xe9flexes

\`\`\`
def tokeniser(texte, sep=" "):
    """D\xe9coupe un texte en tokens."""     # docstring
    return texte.lower().split(sep)
\`\`\`

- Param\xe8tres avec **valeur par d\xe9faut** (\`sep=" "\`)
- Une fonction = une responsabilit\xe9
- Toujours un \`return\` explicite

## List comprehensions

La mani\xe8re pythonique de transformer et filtrer des listes \u{2014} omnipr\xe9sente dans le code de pr\xe9paration de donn\xe9es :

\`\`\`
tokens = ["le", "transformer", "est", "une", "architecture"]

longs = [t for t in tokens if len(t) > 3]      # filtrer
majs  = [t.upper() for t in tokens]            # transformer
ids   = [vocab[t] for t in tokens if t in vocab]  # les deux
\`\`\`

## Stopwords : filtrer le bruit

Les mots tr\xe8s fr\xe9quents mais peu informatifs (\xab le \xbb, \xab de \xbb, \xab et \xbb\u{2026}) sont appel\xe9s **stopwords**. Les retirer est une \xe9tape classique en recherche d'information \u{2014} m\xeame si les LLM modernes, eux, gardent tout : leur tokenizer ne jette rien, c'est le m\xe9canisme d'attention qui apprend \xe0 pond\xe9rer.`},{kind:"exercise",exercise:{id:"m2l1e1",title:"Un tokenizer avec filtrage de stopwords",instructions:'Écris `tokeniser(texte, stopwords)` qui :\n\n1. met le texte en minuscules et le découpe sur les espaces,\n2. retire la ponctuation `.`, `,`, `!` et `?` collée aux mots (indice : `.strip(".,!?")`),\n3. élimine les tokens présents dans l\'ensemble `stopwords` **et** les tokens vides.\n\nRenvoie la liste des tokens restants. Une seule list comprehension bien construite peut suffire (avec une étape intermédiaire pour le strip).',starterCode:`def tokeniser(texte, stopwords):
    ...

STOP = {"le", "la", "les", "de", "et", "un", "une", "est"}
print(tokeniser("Le Transformer est une architecture de r\xe9seau !", STOP))`,solution:`def tokeniser(texte, stopwords):
    bruts = texte.lower().split()
    nettoyes = [t.strip(".,!?") for t in bruts]
    return [t for t in nettoyes if t and t not in stopwords]

STOP = {"le", "la", "les", "de", "et", "un", "une", "est"}
print(tokeniser("Le Transformer est une architecture de r\xe9seau !", STOP))`,tests:`STOP2 = {"le", "la", "et", "est"}
assert tokeniser("Le chat est noir.", STOP2) == ["chat", "noir"], "Attendu : ['chat', 'noir']"
assert tokeniser("Et le vent ! ", STOP2) == ["vent"], "Attendu : ['vent'] \u{2014} attention \xe0 la ponctuation isol\xe9e"
assert tokeniser("", STOP2) == [], "Un texte vide donne une liste vide"
print("TESTS_PASS")`,hints:['t.strip(".,!?") retire ces caractères au début et à la fin du token.','Un "!" isolé devient une chaîne vide après strip — le test "if t" l\'élimine (chaîne vide = False).']}},{kind:"quiz",questions:[{question:'Que produit [len(t) for t in ["ia", "nlp", "llm"]] ?',options:["[2, 3, 3]",'["ia", "nlp", "llm"]',"8","Une erreur"],correct:0,explanation:"La comprehension applique len() à chaque élément : [2, 3, 3]. Transformer une liste élément par élément est le geste de base de la préparation de données."},{question:"Pourquoi les tokenizers des LLM modernes ne retirent-ils PAS les stopwords ?",options:["Par paresse des concepteurs","Parce que le mécanisme d'attention apprend lui-même à pondérer l'importance de chaque token","Parce que les stopwords n'existent plus","Pour augmenter la facture de calcul"],correct:1,explanation:"Les LLM gardent l'intégralité du texte : « ne… pas », les articles, la ponctuation portent du sens. L'attention (palier 3 !) apprend quoi regarder."}]}]},{id:"m2l2",title:"Classes : construire un vrai Tokenizer",minutes:35,sections:[{kind:"text",md:"# Pourquoi des classes en NLP ?\n\nQuand tu utilises Hugging Face, tu écris `tokenizer = AutoTokenizer.from_pretrained(...)` puis `tokenizer.encode(texte)`. Ce `tokenizer` est un **objet** : il regroupe des *données* (le vocabulaire) et des *comportements* (encoder, décoder). Aujourd'hui, tu construis le tien.\n\n## Anatomie d'une classe\n\n```\nclass Tokenizer:\n    def __init__(self):          # constructeur\n        self.vocab = {}          # état interne : mot -> id\n\n    def fit(self, texte):        # apprendre le vocabulaire\n        for mot in texte.lower().split():\n            if mot not in self.vocab:\n                self.vocab[mot] = len(self.vocab)\n\n    def encode(self, texte):     # texte -> liste d'ids\n        ...\n```\n\n- `self` désigne l'instance : `self.vocab` est propre à chaque tokenizer.\n- `fit` / `encode` / `decode` : cette interface en trois temps est **exactement** celle des vrais outils (scikit-learn, tokenizers HF).\n\n## Le token inconnu : `<unk>`\n\nQue faire d'un mot jamais vu à l'entraînement ? Les vocabulaires réels réservent un id spécial `<unk>` (unknown). Les tokenizers modernes (BPE, module 8) contournent le problème en découpant les mots inconnus en sous-mots — mais le concept de token spécial (`<unk>`, `<pad>`, `<eos>`…) reste central dans tous les LLM."},{kind:"exercise",exercise:{id:"m2l2e1",title:"Ton premier Tokenizer complet",instructions:'Complète la classe `Tokenizer` :\n\n- `__init__` : initialise `self.vocab = {"<unk>": 0}`\n- `fit(texte)` : ajoute chaque mot (minuscules, split espace) au vocab avec l\'id suivant (`len(self.vocab)`), sans doublons\n- `encode(texte)` : renvoie la liste des ids ; un mot inconnu → id de `"<unk>"` (0)\n- `decode(ids)` : renvoie la chaîne des mots correspondants séparés par des espaces (construis un dict inverse id → mot)',starterCode:`class Tokenizer:
    def __init__(self):
        ...

    def fit(self, texte):
        ...

    def encode(self, texte):
        ...

    def decode(self, ids):
        ...

tok = Tokenizer()
tok.fit("le chat dort")
print(tok.vocab)
print(tok.encode("le chien dort"))
print(tok.decode([1, 3]))`,solution:`class Tokenizer:
    def __init__(self):
        self.vocab = {"<unk>": 0}

    def fit(self, texte):
        for mot in texte.lower().split():
            if mot not in self.vocab:
                self.vocab[mot] = len(self.vocab)

    def encode(self, texte):
        return [self.vocab.get(m, 0) for m in texte.lower().split()]

    def decode(self, ids):
        inverse = {i: m for m, i in self.vocab.items()}
        return " ".join(inverse[i] for i in ids)

tok = Tokenizer()
tok.fit("le chat dort")
print(tok.vocab)
print(tok.encode("le chien dort"))
print(tok.decode([1, 3]))`,tests:`t = Tokenizer()
t.fit("le chat dort")
assert t.vocab == {"<unk>": 0, "le": 1, "chat": 2, "dort": 3}, "Le vocab doit contenir <unk> puis les mots dans l'ordre d'apparition"
assert t.encode("le chat") == [1, 2], "encode('le chat') devrait donner [1, 2]"
assert t.encode("le dragon dort") == [1, 0, 3], "Un mot inconnu doit donner l'id 0 (<unk>)"
assert t.decode([2, 3]) == "chat dort", "decode([2, 3]) devrait donner 'chat dort'"
t.fit("le chat mange")
assert t.vocab["mange"] == 4, "fit() ne doit pas dupliquer les mots d\xe9j\xe0 connus"
print("TESTS_PASS")`,hints:["Dans fit : if mot not in self.vocab: self.vocab[mot] = len(self.vocab).","Dans encode : self.vocab.get(mot, 0) gère les inconnus sans if.","Dans decode : {i: m for m, i in self.vocab.items()} inverse le dictionnaire."]}},{kind:"quiz",questions:[{question:"Dans une classe Python, que représente self ?",options:["La classe elle-même","L'instance sur laquelle la méthode est appelée","Un mot-clé réservé sans signification","Le module courant"],correct:1,explanation:"self est l'objet concret : deux tokenizers différents ont chacun leur self.vocab. C'est ce qui permet d'avoir un tokenizer français et un anglais côte à côte."},{question:"À quoi sert le token spécial <unk> ?",options:["À marquer la fin d'une phrase","À représenter les mots absents du vocabulaire","À séparer deux documents","À compresser le texte"],correct:1,explanation:"Sans <unk>, encoder un mot jamais vu lèverait une erreur. Les tokenizers BPE modernes réduisent le besoin de <unk> en découpant en sous-mots, mais les tokens spéciaux (<pad>, <eos>…) restent partout."}]}]},{id:"m2l3",title:"Les fonctions comme objets : pipelines composables",minutes:35,sections:[{kind:"text",md:`# Le secret des biblioth\xe8ques \xe9l\xe9gantes

En Python, une fonction est un objet comme un autre : on peut la stocker dans une variable, la mettre dans une liste, la passer en argument. C'est ce qui rend possibles les API que tu utiliseras partout \u{2014} \`map\`, \`sorted(key=...)\`, les \`Dataset.map()\` de Hugging Face, les cha\xeenes de LangChain.

## Fonctions en argument

\`\`\`
def appliquer(fonction, elements):
    return [fonction(e) for e in elements]

appliquer(str.lower, ["A", "B"])     # ['a', 'b']
appliquer(len, ["chat", "il"])       # [4, 2]
\`\`\`

## Le pipeline : une liste d'\xe9tapes

Un pipeline de pr\xe9traitement NLP est *litt\xe9ralement* une liste de fonctions appliqu\xe9es dans l'ordre :

\`\`\`
etapes = [retirer_html, minuscules, corriger_espaces]

def executer(etapes, texte):
    for etape in etapes:
        texte = etape(texte)
    return texte
\`\`\`

Ajouter une \xe9tape = ajouter un \xe9l\xe9ment \xe0 la liste. Tester une \xe9tape = tester une fonction pure. C'est exactement l'architecture des \`Pipeline\` de scikit-learn et des cha\xeenes de traitement de spaCy.

## Composer : fabriquer une fonction \xe0 partir de fonctions

Plus fort : une fonction qui *renvoie* une fonction. \`composer([f, g, h])\` fabrique une nouvelle fonction \xe9quivalente \xe0 \`h(g(f(x)))\` \u{2014} le pipeline devient un objet r\xe9utilisable qu'on passe o\xf9 on veut.`},{kind:"exercise",exercise:{id:"m2l3e1",title:"Fabrique de pipelines",instructions:"Implémente :\n\n1. `executer(etapes, texte)` — applique chaque fonction de la liste `etapes` au texte, dans l'ordre,\n2. `composer(etapes)` — renvoie une **nouvelle fonction** qui, appelée avec un texte, exécute le pipeline (définis une fonction interne et renvoie-la),\n3. crée `pipeline_standard` : la composition de `minuscules`, `sans_ponctuation`, `espaces_propres` (fournies).",starterCode:`def minuscules(t):
    return t.lower()

def sans_ponctuation(t):
    for c in ".,!?;:":
        t = t.replace(c, "")
    return t

def espaces_propres(t):
    return " ".join(t.split())

def executer(etapes, texte):
    ...

def composer(etapes):
    ...

pipeline_standard = ...

print(executer([minuscules, espaces_propres], "  Bonjour  LE Monde "))
print(pipeline_standard("  Salut, toi !  \xc7a va ?  "))`,solution:`def minuscules(t):
    return t.lower()

def sans_ponctuation(t):
    for c in ".,!?;:":
        t = t.replace(c, "")
    return t

def espaces_propres(t):
    return " ".join(t.split())

def executer(etapes, texte):
    for etape in etapes:
        texte = etape(texte)
    return texte

def composer(etapes):
    def pipeline(texte):
        return executer(etapes, texte)
    return pipeline

pipeline_standard = composer([minuscules, sans_ponctuation, espaces_propres])

print(executer([minuscules, espaces_propres], "  Bonjour  LE Monde "))
print(pipeline_standard("  Salut, toi !  \xc7a va ?  "))`,tests:`assert executer([minuscules], "ABC") == "abc", "Une seule \xe9tape"
assert executer([minuscules, espaces_propres], "  A  B ") == "a b", "Les \xe9tapes s'encha\xeenent dans l'ordre"
assert executer([], "Tel Quel") == "Tel Quel", "Z\xe9ro \xe9tape : texte inchang\xe9"
_p = composer([minuscules, sans_ponctuation])
assert callable(_p), "composer doit renvoyer une FONCTION"
assert _p("H\xe9!") == "h\xe9", "La fonction compos\xe9e applique bien les \xe9tapes"
assert pipeline_standard("  Salut, toi !  \xc7a va ?  ") == "salut toi \xe7a va", "Le pipeline standard complet"
_double = composer([pipeline_standard, minuscules])
assert _double(" X. ") == "x", "Un pipeline compos\xe9 peut lui-m\xeame \xeatre une \xe9tape d'un autre pipeline !"
print("TESTS_PASS")`,hints:["executer : une boucle qui réaffecte texte = etape(texte).","composer : def pipeline(texte): return executer(etapes, texte) — puis return pipeline (sans parenthèses !).","pipeline_standard = composer([minuscules, sans_ponctuation, espaces_propres])."]}},{kind:"quiz",questions:[{question:'Quelle est la différence entre "return pipeline" et "return pipeline(texte)" dans composer ?',options:["Aucune","Le premier renvoie la fonction elle-même (réutilisable) ; le second l'exécuterait immédiatement et renverrait un résultat","Le second est plus rapide","Le premier est une erreur de syntaxe"],correct:1,explanation:"Une fonction sans parenthèses est un objet qu'on peut transporter ; avec parenthèses, c'est un appel. Cette distinction est au cœur des callbacks, des décorateurs et de sorted(key=ma_fonction)."},{question:"Pourquoi structurer le prétraitement en pipeline de petites fonctions plutôt qu'en une grosse fonction ?",options:["C'est plus rapide à exécuter","Chaque étape est testable isolément, remplaçable, et l'ordre est explicite — la recette exacte du corpus est lisible en une ligne","Python limite la taille des fonctions","Pour utiliser plus de mémoire"],correct:1,explanation:"En NLP, la reproductibilité du prétraitement est critique : le même pipeline exact doit s'appliquer à l'entraînement ET à l'inférence. Une liste de fonctions nommées documente cette recette mieux que 200 lignes monolithiques."}]}]}]},{id:"m3",tier:1,title:"Regex et données réelles",tagline:"Nettoyer des corpus bruités avec les expressions régulières, manipuler le JSON des API.",status:"ready",lessons:[{id:"m3l1",title:"Expressions régulières pour le texte",minutes:35,sections:[{kind:"text",md:'# Le couteau suisse du nettoyage de corpus\n\nLes données textuelles réelles sont *sales* : URLs, mentions, émojis, HTML résiduel, espaces multiples. Les **expressions régulières** (module `re`) sont l\'outil standard pour nettoyer et extraire — indispensables avant tout entraînement ou toute indexation RAG.\n\n## Les motifs essentiels\n\n- `.` n\'importe quel caractère · `\\d` chiffre · `\\w` lettre/chiffre/_ · `\\s` espace\n- `+` une fois ou plus · `*` zéro ou plus · `?` optionnel · `{2,4}` entre 2 et 4 fois\n- `[abc]` un caractère parmi · `[^abc]` tout sauf · `^` début · `$` fin\n- `()` groupe de capture · `|` alternative\n\n## Les trois fonctions à connaître\n\n```\nimport re\n\nre.findall(r"#\\w+", texte)        # extraire toutes les occurrences\nre.sub(r"https?://\\S+", "", texte) # remplacer (ici : supprimer les URLs)\nre.search(r"\\d{4}", texte)         # premier match (ou None)\n```\n\nLe préfixe `r"..."` (*raw string*) évite que Python interprète les backslashes — utilise-le systématiquement pour les regex.\n\n> En NLP moderne, les regex restent partout : pré-tokenisation de GPT (une grosse regex !), extraction de blocs de code dans les réponses de LLM, détection de PII à anonymiser, parsing de logs.'},{kind:"code",title:'Nettoyage type "réseaux sociaux" — exécute et observe',runnable:!0,code:`import re

tweet = "RT @bob: Les #LLM c'est fou !! \u{1F92F} https://exemple.com/article  #IA #NLP"

sans_url = re.sub(r"https?://\\S+", "", tweet)
sans_mention = re.sub(r"@\\w+", "", sans_url)
hashtags = re.findall(r"#(\\w+)", tweet)   # les () capturent sans le #
propre = re.sub(r"\\s+", " ", sans_mention).strip()

print("hashtags :", hashtags)
print("propre   :", propre)`},{kind:"exercise",exercise:{id:"m3l1e1",title:"Pipeline de nettoyage de commentaires",instructions:'Écris `nettoyer(texte)` qui, dans cet ordre :\n\n1. supprime les URLs (`http://` ou `https://` suivis de non-espaces),\n2. supprime les mentions `@pseudo`,\n3. remplace les ponctuations répétées (`!!`, `???`, `...`) par une seule occurrence — indice : `re.sub(r"([!?.])\\1+", r"\\1", ...)`,\n4. compacte les espaces multiples en un seul et retire ceux des extrémités.\n\nÉcris aussi `extraire_hashtags(texte)` qui renvoie la liste des hashtags **sans** le `#`.',starterCode:`import re

def nettoyer(texte):
    ...

def extraire_hashtags(texte):
    ...

print(nettoyer("G\xe9nial !!! @alice regarde https://x.co/abc  \xe7a"))
print(extraire_hashtags("#IA et #NLP sont li\xe9s"))`,solution:`import re

def nettoyer(texte):
    texte = re.sub(r"https?://\\S+", "", texte)
    texte = re.sub(r"@\\w+", "", texte)
    texte = re.sub(r"([!?.])\\1+", r"\\1", texte)
    texte = re.sub(r"\\s+", " ", texte).strip()
    return texte

def extraire_hashtags(texte):
    return re.findall(r"#(\\w+)", texte)

print(nettoyer("G\xe9nial !!! @alice regarde https://x.co/abc  \xe7a"))
print(extraire_hashtags("#IA et #NLP sont li\xe9s"))`,tests:`assert nettoyer("G\xe9nial !!! @alice regarde https://x.co/abc  \xe7a") == "G\xe9nial ! regarde \xe7a", "Attendu : 'G\xe9nial ! regarde \xe7a'"
assert nettoyer("Quoi ???") == "Quoi ?", "Les '???' doivent devenir '?'"
assert nettoyer("  a   b  ") == "a b", "Espaces multiples compact\xe9s, extr\xe9mit\xe9s nettoy\xe9es"
assert extraire_hashtags("#IA et #NLP sont li\xe9s") == ["IA", "NLP"], "Hashtags sans le #"
assert extraire_hashtags("rien ici") == [], "Aucun hashtag : liste vide"

Cas r\xe9el entre tous : ton application LLM \xe9crit des logs, et tu veux savoir *combien \xe7a co\xfbte* et *o\xf9 \xe7a ralentit*. Le travail : parser des lignes semi-structur\xe9es avec une regex, produire des dicts propres, agr\xe9ger. C'est le quotidien de l'ing\xe9nierie LLM \u{2014} et l'occasion d'apprendre les **groupes nomm\xe9s**.

## Groupes nomm\xe9s : des regex lisibles

\`\`\`
motif = r"(?P<modele>[\\w.-]+) \\| (?P<tokens>\\d+) tokens"
m = re.search(motif, ligne)
m.group("modele")     # acc\xe8s PAR NOM, plus par position
m.groupdict()         # directement un dict !
\`\`\`

\`(?P<nom>...)\` capture comme \`(...)\`, mais le r\xe9sultat s'extrait par nom \u{2014} la regex devient auto-document\xe9e, et \`groupdict()\` te donne un dictionnaire pr\xeat \xe0 l'emploi.

## Le motif du parser robuste

\`\`\`
for ligne in log.splitlines():
    m = re.search(motif, ligne)
    if m is None:
        continue          # ligne malform\xe9e : on saute, on ne crashe pas
    entrees.append(m.groupdict())
\`\`\`

Un parser de logs qui crashe sur une ligne inattendue est inutilisable. Le \`if m is None: continue\` est la version regex de la \xab couche de d\xe9fiance \xbb du module 11.`},{kind:"exercise",exercise:{id:"m3l3e1",title:"Analyseur de coûts LLM",instructions:"Le starter contient des logs au format `[HH:MM:SS] modele | entree=N sortie=M`. Implémente :\n\n1. `parser_ligne(ligne)` — utilise une regex à groupes nommés (`heure`, `modele`, `entree`, `sortie`) et renvoie le dict avec `entree`/`sortie` convertis en `int` ; renvoie `None` si la ligne ne matche pas,\n2. `total_tokens_par_modele(log)` — parse toutes les lignes (en sautant les malformées) et renvoie `{modele: total entree+sortie}`.",starterCode:`import re

LOG = """[09:12:01] gpt-mini | entree=1200 sortie=350
[09:12:44] claude-sonnet | entree=800 sortie=920
ligne corrompue \xe0 ignorer
[09:13:10] gpt-mini | entree=400 sortie=100
[09:14:02] claude-sonnet | entree=1500 sortie=600"""

MOTIF = r"\\[(?P<heure>\\d{2}:\\d{2}:\\d{2})\\] (?P<modele>[\\w.-]+) \\| entree=(?P<entree>\\d+) sortie=(?P<sortie>\\d+)"

def parser_ligne(ligne):
    m = re.search(MOTIF, ligne)
    if m is None:
        return None
    d = m.groupdict()
    d["entree"] = int(d["entree"])
    d["sortie"] = int(d["sortie"])
    return d

def total_tokens_par_modele(log):
    totaux = {}
    for ligne in log.splitlines():
        d = parser_ligne(ligne)
        if d is None:
            continue
        totaux[d["modele"]] = totaux.get(d["modele"], 0) + d["entree"] + d["sortie"]
    return totaux

print(parser_ligne("[09:12:01] gpt-mini | entree=1200 sortie=350"))

Un corpus d'entra\xeenement fait souvent des dizaines de gigaoctets. Le charger entier dans une liste ? Impossible. La r\xe9ponse pythonique : les **g\xe9n\xe9rateurs** \u{2014} des fonctions qui *produisent* les \xe9l\xe9ments un par un, \xe0 la demande, avec \`yield\`.

## yield : produire sans accumuler

\`\`\`
def lire_corpus(lignes):
    for ligne in lignes:
        ligne = ligne.strip().lower()
        if ligne:                # on filtre au vol
            yield ligne          # produit UNE valeur, puis se met en pause
\`\`\`

Appeler \`lire_corpus(...)\` n'ex\xe9cute *rien* : \xe7a renvoie un g\xe9n\xe9rateur. Le code ne tourne qu'au fil de l'it\xe9ration (\`for\`, \`next()\`, \`list()\`). M\xe9moire utilis\xe9e : une ligne \xe0 la fois, pas le corpus entier.

## Le pattern central du ML : les batches

Les GPU traitent les donn\xe9es par **lots** (batches). Tout data loader \u{2014} y compris ceux de PyTorch \u{2014} repose sur ce motif : accumuler jusqu'\xe0 la taille voulue, c\xe9der le lot, recommencer :

\`\`\`
def par_batch(elements, taille):
    batch = []
    for e in elements:
        batch.append(e)
        if len(batch) == taille:
            yield batch
            batch = []
    if batch:            # le dernier lot, incomplet
        yield batch
\`\`\`

## Expressions g\xe9n\xe9ratrices

Comme une list comprehension, mais paresseuse \u{2014} parenth\xe8ses au lieu de crochets :

\`\`\`
total_tokens = sum(len(l.split()) for l in lignes)   # aucun stockage interm\xe9diaire
\`\`\``},{kind:"exercise",exercise:{id:"m4l1e1",title:"Un data loader minimal",instructions:"Implémente deux générateurs :\n\n1. `tokens_du_corpus(phrases)` — cède (`yield`) chaque token (minuscules, split espace) de chaque phrase, un par un,\n2. `par_batch(elements, taille)` — regroupe n'importe quel itérable en listes de `taille` éléments (dernier lot possiblement incomplet).\n\nLes deux doivent être de vrais générateurs (utiliser `yield`), composables : `par_batch(tokens_du_corpus(phrases), 4)`.",starterCode:`def tokens_du_corpus(phrases):

Un pipeline qui appelle une API LLM sur 10 000 documents *va* rencontrer des erreurs : timeouts, rate limits, JSON malform\xe9. La diff\xe9rence entre un script et un syst\xe8me, c'est ce qui se passe \xe0 ce moment-l\xe0.

## try / except : pr\xe9cis, jamais silencieux

\`\`\`
try:
    data = json.loads(reponse)
except json.JSONDecodeError:      # on attrape PR\xc9CIS\xc9MENT ce qu'on attend
    data = None                   # et on d\xe9cide quoi faire
\`\`\`

Deux r\xe8gles d'or : ne jamais attraper \`Exception\` \xe0 l'aveugle (\xe7a masque les vrais bugs), et ne jamais laisser un \`except: pass\` silencieux.

## Le retry avec backoff : LE pattern des API LLM

Les erreurs de rate limit (429) sont *normales* et *temporaires*. Le r\xe9flexe professionnel : r\xe9essayer en attendant de plus en plus longtemps (backoff exponentiel : 1 s, 2 s, 4 s\u{2026}). Toutes les biblioth\xe8ques clientes le font ; savoir l'\xe9crire soi-m\xeame est un classique d'entretien.

## Annotations de type : lire les signatures

Les annotations ne changent pas l'ex\xe9cution, mais documentent et permettent la v\xe9rification statique. Tu les liras partout dans les biblioth\xe8ques ML :

\`\`\`
def encoder(textes: list[str], batch_size: int = 32) -> list[list[float]]:
    ...
\`\`\`

\xc7a se lit : \xab prend une liste de cha\xeenes, renvoie une liste de vecteurs \xbb. Les signatures typ\xe9es sont la *documentation la plus fiable* d'une biblioth\xe8que \u{2014} souvent plus \xe0 jour que la doc elle-m\xeame.`},{kind:"exercise",exercise:{id:"m4l2e1",title:"Retry avec backoff exponentiel",instructions:"Le starter fournit `APIInstable`, qui échoue les 2 premiers appels (`RateLimitError`) puis répond. Écris :\n\n`appeler_avec_retry(fonction, max_essais=4)` qui :\n\n1. tente `fonction()` ; si ça réussit, renvoie le résultat,\n2. sur `RateLimitError` : note le délai de backoff `2 ** tentative` (1, 2, 4…) dans la liste `delais` au lieu de vraiment attendre, puis réessaie,\n3. après `max_essais` échecs, relance l'exception (`raise`).\n\nRenvoie le tuple `(resultat, delais)`.",starterCode:`class RateLimitError(Exception):
    pass

class APIInstable:
    def __init__(self, echecs=2):
        self.restants = echecs
    def appeler(self):
        if self.restants > 0:
            self.restants -= 1
            raise RateLimitError("429 Too Many Requests")
        return "r\xe9ponse du mod\xe8le"

def appeler_avec_retry(fonction, max_essais=4):
    delais = []
    ...

api = APIInstable(echecs=2)
print(appeler_avec_retry(api.appeler))`,solution:`class RateLimitError(Exception):
    pass

class APIInstable:
    def __init__(self, echecs=2):
        self.restants = echecs
    def appeler(self):
        if self.restants > 0:
            self.restants -= 1
            raise RateLimitError("429 Too Many Requests")
        return "r\xe9ponse du mod\xe8le"

def appeler_avec_retry(fonction, max_essais=4):
    delais = []
    for tentative in range(max_essais):
        try:
            return fonction(), delais
        except RateLimitError:
            if tentative == max_essais - 1:
                raise
            delais.append(2 ** tentative)

api = APIInstable(echecs=2)

\`@app.route\`, \`@torch.no_grad()\`, \`@lru_cache\`, \`@retry\`\u{2026} Les d\xe9corateurs sont omnipr\xe9sents dans l'\xe9cosyst\xe8me ML. Et gr\xe2ce \xe0 la le\xe7on sur les pipelines, tu as d\xe9j\xe0 l'id\xe9e cl\xe9 : *une fonction qui prend une fonction et renvoie une fonction*.

## Le m\xe9canisme, sans magie

\`\`\`
def compter_appels(fonction):
    def enveloppe(*args, **kwargs):
        enveloppe.appels += 1
        return fonction(*args, **kwargs)
    enveloppe.appels = 0
    return enveloppe

@compter_appels
def encoder(texte): ...

# strictement \xe9quivalent \xe0 : encoder = compter_appels(encoder)
\`\`\`

\`*args, **kwargs\` transmet n'importe quels arguments \u{2014} l'enveloppe fonctionne pour toute signature.

## Le cas d'usage roi en LLM : la m\xe9mo\xefsation

Appeler deux fois une API d'embeddings avec le *m\xeame* texte = payer deux fois pour le m\xeame r\xe9sultat. Un d\xe9corateur \`@memoiser\` intercepte l'appel : si les arguments ont d\xe9j\xe0 \xe9t\xe9 vus, renvoyer le r\xe9sultat du **cache** sans appeler la fonction. C'est le principe du \`@lru_cache\` de la biblioth\xe8que standard, des caches d'embeddings de production, et \u{2014} c\xf4t\xe9 serveur \u{2014} du *prompt caching* des API LLM.`},{kind:"exercise",exercise:{id:"m4l3e1",title:"Écrire @memoiser",instructions:"Implémente le décorateur `memoiser(fonction)` :\n\n1. crée un dict `cache` ; l'enveloppe utilise le tuple `args` comme clé,\n2. si la clé est au cache → renvoie la valeur stockée **sans** appeler la fonction,\n3. sinon → appelle la fonction, stocke, renvoie,\n4. expose le cache : `enveloppe.cache = cache` avant de renvoyer l'enveloppe.\n\nLe starter fournit `embed_couteux` qui compte ses exécutions réelles — les tests vérifient que le cache évite bien les appels répétés.",starterCode:`def memoiser(fonction):
    ...

compteur = {"executions": 0}

@memoiser
def embed_couteux(texte):
    compteur["executions"] += 1
    return [len(mot) for mot in texte.split()]

print(embed_couteux("le chat"))
print(embed_couteux("le chat"))   # m\xeame argument : depuis le cache
print(f"ex\xe9cutions r\xe9elles : {compteur['executions']}")`,solution:`def memoiser(fonction):
    cache = {}
    def enveloppe(*args):
        if args in cache:
            return cache[args]
        resultat = fonction(*args)
        cache[args] = resultat
        return resultat
    enveloppe.cache = cache
    return enveloppe

compteur = {"executions": 0}

@memoiser
def embed_couteux(texte):
    compteur["executions"] += 1
    return [len(mot) for mot in texte.split()]

print(embed_couteux("le chat"))
print(embed_couteux("le chat"))
print(f"ex\xe9cutions r\xe9elles : {compteur['executions']}")`,tests:`compteur["executions"] = 0
embed_couteux.cache.clear()
_r1 = embed_couteux("un deux trois")
assert _r1 == [2, 4, 5], "Premier appel : la fonction s'ex\xe9cute normalement"
assert compteur["executions"] == 1, "1 ex\xe9cution r\xe9elle"
_r2 = embed_couteux("un deux trois")
assert _r2 == _r1, "M\xeame argument : m\xeame r\xe9sultat"
assert compteur["executions"] == 1, "Le 2e appel doit venir du cache : toujours 1 ex\xe9cution r\xe9elle"
embed_couteux("autre texte")
assert compteur["executions"] == 2, "Un argument nouveau d\xe9clenche une vraie ex\xe9cution"
assert ("un deux trois",) in embed_couteux.cache, "Le cache doit \xeatre expos\xe9 et contenir la cl\xe9 (args en tuple)"
print("TESTS_PASS")`,hints:["La structure : def enveloppe(*args) → test du cache → appel si absent → return. Puis enveloppe.cache = cache ; return enveloppe.","args est déjà un tuple, donc utilisable directement comme clé de dict.",'Si "toujours 1 exécution" échoue : tu appelles la fonction avant de vérifier le cache.']}},{kind:"quiz",questions:[{question:"Que fait exactement la syntaxe @memoiser au-dessus d'une fonction f ?",options:["Elle exécute f immédiatement","Elle remplace f par memoiser(f) : le nom f désigne désormais l'enveloppe","Elle marque f comme privée","Elle compile f"],correct:1,explanation:"@decorateur est du sucre syntaxique pour f = decorateur(f). Rien de plus. Une fois cette équivalence comprise, tous les décorateurs deviennent lisibles."},{question:"Pourquoi la mémoïsation est-elle particulièrement rentable avec les API d'embeddings ?",options:["Les embeddings sont aléatoires","Même entrée → même sortie (fonction pure côté client), et chaque appel évité économise argent ET latence réseau","Les API interdisent les appels répétés","Le cache améliore la qualité des vecteurs"],correct:1,explanation:"Dans un RAG réel, les mêmes requêtes et chunks reviennent sans cesse. Un cache d'embeddings réduit couramment la facture de 30-70 %. Le même raisonnement vaut pour le prompt caching côté LLM."}]}]}]},{id:"m5",tier:2,title:"NumPy, le langage des tenseurs",tagline:"Vecteurs, matrices et vectorisation : la grammaire de tout le deep learning.",status:"ready",lessons:[{id:"m5l1",title:"Arrays, shapes et vectorisation",minutes:35,sections:[{kind:"text",md:`# NumPy : pourquoi c'est incontournable

PyTorch, TensorFlow, JAX\u{2026} toutes les biblioth\xe8ques de deep learning sont des variations autour du m\xeame objet : le **tableau multidimensionnel** (array/tenseur). NumPy est l'original \u{2014} apprendre \xe0 *penser en arrays* est le vrai objectif de ce module.

## Cr\xe9er et inspecter

\`\`\`
import numpy as np

v = np.array([1.0, 2.0, 3.0])        # vecteur, shape (3,)
M = np.array([[1, 2], [3, 4]])       # matrice, shape (2, 2)
v.shape, M.shape, M.dtype
\`\`\`

Le r\xe9flexe n\xb01 en debug de code ML : **imprimer les shapes**. La moiti\xe9 des bugs de deep learning sont des erreurs de shape.

## La vectorisation : jamais de boucle

\`\`\`
v * 2          # multiplie chaque \xe9l\xe9ment
v + w          # addition \xe9l\xe9ment par \xe9l\xe9ment
v * w          # produit \xe9l\xe9ment par \xe9l\xe9ment (PAS le produit scalaire !)
v @ w          # produit scalaire (dot product)
np.sqrt(v)     # fonction appliqu\xe9e \xe0 chaque \xe9l\xe9ment
v.sum(), v.mean(), v.max()
\`\`\`

En NLP, un mot devient un **vecteur** (embedding), une phrase une **matrice** (une ligne par token), un batch un **tenseur 3D**. Les op\xe9rations vectoris\xe9es sont des centaines de fois plus rapides que des boucles Python \u{2014} et surtout, elles correspondent aux maths des articles de recherche.

## Le produit scalaire, star du NLP

\`v @ w = v\u{2081}w\u{2081} + v\u{2082}w\u{2082} + \u{2026}\` mesure \xe0 quel point deux vecteurs \xab pointent dans la m\xeame direction \xbb. C'est le c\u{153}ur de la similarit\xe9 d'embeddings **et** des scores d'attention des transformers (palier 3). Retiens : *produit scalaire = similarit\xe9 brute*.`},{kind:"code",title:"Penser en arrays — exécute et observe les shapes",runnable:!0,needsNumpy:!0,code:`import numpy as np

# 4 "embeddings" de dimension 3 (une ligne = un mot)
E = np.array([
    [0.9, 0.1, 0.0],   # chat
    [0.8, 0.2, 0.1],   # chien
    [0.0, 0.1, 0.9],   # voiture
    [0.1, 0.0, 0.8],   # camion
])
print("shape :", E.shape)

chat = E[0]
print("norme de 'chat' :", np.linalg.norm(chat))

# Produit scalaire de 'chat' avec TOUS les mots d'un coup :
scores = E @ chat          # (4,3) @ (3,) -> (4,)
print("similarit\xe9s brutes :", scores)
print("mot le plus proche (hors lui-m\xeame) :", scores[1:].argmax() + 1)`},{kind:"exercise",exercise:{id:"m5l1e1",title:"Normaliser des vecteurs (norme L2)",instructions:"Les embeddings sont souvent **normalisés** : divisés par leur norme pour avoir une longueur de 1. Écris `normaliser_l2(M)` qui prend une matrice `(n, d)` et renvoie la matrice où **chaque ligne** a une norme de 1.\n\nIndices : `np.linalg.norm(M, axis=1)` donne la norme de chaque ligne (shape `(n,)`) ; pour diviser une matrice `(n, d)` par un vecteur `(n,)`, il faut le remodeler en `(n, 1)` avec `.reshape(-1, 1)` ou `[:, None]` — c'est le *broadcasting*.",starterCode:`import numpy as np

def normaliser_l2(M):
    ...

M = np.array([[3.0, 4.0], [0.0, 2.0]])
print(normaliser_l2(M))`,solution:`import numpy as np

def normaliser_l2(M):
    normes = np.linalg.norm(M, axis=1)
    return M / normes[:, None]

M = np.array([[3.0, 4.0], [0.0, 2.0]])
print(normaliser_l2(M))`,tests:`import numpy as np
_M = np.array([[3.0, 4.0], [0.0, 2.0]])
_R = normaliser_l2(_M)
assert _R.shape == (2, 2), "La shape doit \xeatre conserv\xe9e"
assert np.allclose(_R[0], [0.6, 0.8]), "Ligne 0 : [3,4]/5 = [0.6, 0.8]"
assert np.allclose(np.linalg.norm(_R, axis=1), [1.0, 1.0]), "Chaque ligne doit avoir une norme de 1"
print("TESTS_PASS")`,hints:["np.linalg.norm(M, axis=1) → normes de chaque ligne, shape (n,).","normes[:, None] transforme (n,) en (n, 1) : la division se diffuse alors ligne par ligne."],needsNumpy:!0}},{kind:"quiz",questions:[{question:"Quelle est la shape du résultat de A @ B si A est (32, 128) et B est (128, 64) ?",options:["(32, 64)","(128, 128)","(64, 32)","Erreur : shapes incompatibles"],correct:0,explanation:"(n, k) @ (k, m) → (n, m) : les dimensions internes (128) doivent coïncider et disparaissent. C'est LA règle à connaître par cœur — c'est elle qui régit toutes les couches d'un réseau."},{question:"Quelle est la différence entre v * w et v @ w pour deux vecteurs ?",options:["Aucune","v * w est élément par élément (renvoie un vecteur), v @ w est le produit scalaire (renvoie un nombre)","v @ w est plus lent","v * w n'existe pas en NumPy"],correct:1,explanation:"Confusion classique ! * multiplie terme à terme, @ somme ensuite ces produits. Le produit scalaire mesure la similarité — on le retrouvera dans l'attention."}]}]},{id:"m5l2",title:"Similarité cosinus et recherche sémantique",minutes:35,sections:[{kind:"text",md:`# La similarit\xe9 cosinus : le moteur du RAG

Quand un syst\xe8me RAG (Retrieval-Augmented Generation) cherche \xab les passages les plus pertinents \xbb pour une question, il calcule presque toujours une **similarit\xe9 cosinus** entre l'embedding de la question et ceux des documents. Toute base vectorielle (Pinecone, Chroma, pgvector, FAISS\u{2026}) fait \xe7a \xe0 grande \xe9chelle.

## La formule

\`\`\`
cos(u, v) = (u @ v) / (||u|| * ||v||)
\`\`\`

- Vaut **1** si les vecteurs pointent exactement dans la m\xeame direction
- **0** s'ils sont orthogonaux (sans rapport)
- **-1** s'ils sont oppos\xe9s

Diviser par les normes rend la mesure **ind\xe9pendante de la longueur** des vecteurs : seule la *direction* compte \u{2014} et dans un espace d'embeddings, la direction encode le *sens*.

## Recherche s\xe9mantique en 3 lignes

Avec une matrice \`E\` d'embeddings normalis\xe9s (norme 1), la similarit\xe9 cosinus se r\xe9duit au produit scalaire :

\`\`\`
scores = E @ q          # q : embedding normalis\xe9 de la requ\xeate
meilleur = scores.argmax()
\`\`\`

C'est *exactement* ce que fait une base vectorielle, plus des structures d'index pour aller vite sur des millions de vecteurs. Le concept tient en deux lignes de NumPy.`},{kind:"exercise",exercise:{id:"m5l2e1",title:"Mini moteur de recherche sémantique",instructions:"Implémente :\n\n1. `cosinus(u, v)` — la similarité cosinus entre deux vecteurs (utilise `np.linalg.norm`)\n2. `chercher(E, q)` — renvoie l'**indice** de la ligne de `E` la plus similaire (au sens cosinus) au vecteur requête `q`\n\nPour `chercher`, une boucle sur les lignes avec `cosinus` est acceptable — ou la version vectorisée pour les ambitieux.",starterCode:`import numpy as np

def cosinus(u, v):
    ...

def chercher(E, q):
    ...

# Embeddings jouets : chat, chien, voiture
E = np.array([[0.9, 0.1, 0.0],
              [0.8, 0.3, 0.1],
              [0.0, 0.1, 0.9]])
q = np.array([1.0, 0.2, 0.0])   # requ\xeate proche de "chat"
print(chercher(E, q))`,solution:`import numpy as np

def cosinus(u, v):
    return (u @ v) / (np.linalg.norm(u) * np.linalg.norm(v))

def chercher(E, q):
    scores = [cosinus(ligne, q) for ligne in E]
    return int(np.argmax(scores))

E = np.array([[0.9, 0.1, 0.0],
              [0.8, 0.3, 0.1],
              [0.0, 0.1, 0.9]])
q = np.array([1.0, 0.2, 0.0])
print(chercher(E, q))`,tests:`import numpy as np
assert abs(cosinus(np.array([1.0, 0.0]), np.array([1.0, 0.0])) - 1.0) < 1e-9, "Deux vecteurs identiques : cosinus = 1"
assert abs(cosinus(np.array([1.0, 0.0]), np.array([0.0, 1.0]))) < 1e-9, "Vecteurs orthogonaux : cosinus = 0"
assert abs(cosinus(np.array([2.0, 0.0]), np.array([5.0, 0.0])) - 1.0) < 1e-9, "La longueur ne doit pas compter, seulement la direction"
_E = np.array([[0.9, 0.1, 0.0], [0.8, 0.3, 0.1], [0.0, 0.1, 0.9]])
assert chercher(_E, np.array([1.0, 0.2, 0.0])) == 0, "La requ\xeate est la plus proche de la ligne 0"
assert chercher(_E, np.array([0.1, 0.0, 1.0])) == 2, "Cette requ\xeate est la plus proche de la ligne 2"
print("TESTS_PASS")`,hints:["cosinus : (u @ v) divisé par le produit des deux normes.","chercher : calcule la liste des similarités puis np.argmax. Pense à convertir en int()."],needsNumpy:!0}},{kind:"quiz",questions:[{question:"Pourquoi la similarité cosinus plutôt que le simple produit scalaire ?",options:["Elle est plus rapide à calculer","Elle ignore la longueur des vecteurs et ne compare que leur direction","Elle donne toujours des valeurs positives","Le produit scalaire ne marche pas en dimension > 3"],correct:1,explanation:"Un document long peut avoir un embedding de grande norme sans être plus pertinent. La normalisation rend la comparaison équitable. (Beaucoup de modèles d'embeddings sortent d'ailleurs des vecteurs déjà normalisés.)"},{question:"Dans un pipeline RAG, à quel moment intervient la similarité cosinus ?",options:["Pendant la génération de la réponse par le LLM","Lors de la récupération (retrieval) des passages les plus proches de la question","Pendant le fine-tuning","Elle n'intervient pas dans le RAG"],correct:1,explanation:"RAG = retrieval puis génération. Le retrieval compare l'embedding de la question à ceux des chunks de documents — par similarité cosinus — puis injecte les meilleurs passages dans le prompt."}]}]},{id:"m5l3",title:"Broadcasting et matrices de similarité",minutes:40,sections:[{kind:"text",md:`# Toutes les similarit\xe9s d'un coup

Comparer une requ\xeate \xe0 n documents, tu sais faire. Mais comparer *chaque document \xe0 chaque autre* \u{2014} pour d\xe9dupliquer un corpus, regrouper des questions similaires, construire un graphe de voisinage ? Il te faut la **matrice de similarit\xe9** compl\xe8te, et c'est l\xe0 que NumPy brille.

## L'astuce : normaliser d'abord

Pour des embeddings normalis\xe9s (norme 1, ta fonction du module 5 !), la similarit\xe9 cosinus se r\xe9duit au produit scalaire. Donc *toutes* les paires d'un coup :

\`\`\`
E_norm = normaliser_l2(E)        # (n, d)
S = E_norm @ E_norm.T            # (n, n) : S[i, j] = cos(doc_i, doc_j)
\`\`\`

Une ligne. Pour 10 000 documents, \xe7a reste quasi instantan\xe9 \u{2014} c'est exactement ce que fait une base vectorielle en interne (avant d'ajouter des index approximatifs pour les millions).

## argsort : trouver les voisins

\`np.argsort(v)\` renvoie les **indices** qui trieraient le vecteur. Pour les k plus proches voisins du document i :

\`\`\`
ordre = np.argsort(S[i])[::-1]    # indices du plus similaire au moins
voisins = ordre[ordre != i][:k]   # on s'exclut soi-m\xeame (S[i,i] = 1 !)
\`\`\`

Le pi\xe8ge classique : chaque document est son propre voisin n\xb01 (similarit\xe9 1 avec lui-m\xeame). Toujours exclure la diagonale.`},{kind:"exercise",exercise:{id:"m5l3e1",title:"Détecteur de quasi-doublons",instructions:"Implémente :\n\n1. `matrice_similarite(E)` — normalise les lignes (fourni : `normaliser_l2`) puis renvoie `(n, n)` des cosinus,\n2. `voisins(S, i, k)` — les indices des `k` documents les plus similaires au document `i`, hors lui-même, du plus au moins similaire,\n3. `paires_suspectes(S, seuil)` — la liste des paires `(i, j)` avec `i < j` dont la similarité dépasse `seuil` — le détecteur de doublons utilisé avant tout fine-tuning.",starterCode:`import numpy as np

def normaliser_l2(M):
    return M / np.linalg.norm(M, axis=1)[:, None]

def matrice_similarite(E):
    ...

def voisins(S, i, k):
    ...

def paires_suspectes(S, seuil):
    ...

E = np.array([[1.0, 0.0], [0.99, 0.14], [0.0, 1.0], [1.0, 0.02]])
S = matrice_similarite(E)
print(np.round(S, 2))
print("voisins de 0 :", voisins(S, 0, 2))
print("doublons probables :", paires_suspectes(S, 0.99))`,solution:`import numpy as np

def normaliser_l2(M):
    return M / np.linalg.norm(M, axis=1)[:, None]

def matrice_similarite(E):
    En = normaliser_l2(E)
    return En @ En.T

def voisins(S, i, k):
    ordre = np.argsort(S[i])[::-1]
    ordre = ordre[ordre != i]
    return list(ordre[:k])

def paires_suspectes(S, seuil):
    n = S.shape[0]
    return [(i, j) for i in range(n) for j in range(i + 1, n) if S[i, j] > seuil]

E = np.array([[1.0, 0.0], [0.99, 0.14], [0.0, 1.0], [1.0, 0.02]])
S = matrice_similarite(E)
print(np.round(S, 2))
print("voisins de 0 :", voisins(S, 0, 2))
print("doublons probables :", paires_suspectes(S, 0.99))`,tests:`import numpy as np
_E = np.array([[1.0, 0.0], [0.99, 0.14], [0.0, 1.0], [1.0, 0.02]])
_S = matrice_similarite(_E)
assert _S.shape == (4, 4), "Matrice (n, n)"
assert np.allclose(np.diag(_S), 1.0), "La diagonale vaut 1 (chaque doc identique \xe0 lui-m\xeame)"
assert np.allclose(_S, _S.T), "La matrice est sym\xe9trique"
_v = voisins(_S, 0, 2)
assert 0 not in _v, "Un document ne doit pas \xeatre son propre voisin"
assert _v[0] == 3, "Le plus proche de 0 est 3 (quasi identiques)"
_p = paires_suspectes(_S, 0.99)
assert (0, 3) in _p, "0 et 3 sont des quasi-doublons"
assert all(i < j for i, j in _p), "Chaque paire une seule fois, avec i < j"
assert (0, 2) not in _p, "0 et 2 sont orthogonaux : pas suspects"
print("TESTS_PASS")`,hints:["matrice_similarite : deux lignes — normaliser, puis En @ En.T.","voisins : np.argsort(S[i])[::-1] inverse le tri (décroissant), puis filtre ordre != i.","paires_suspectes : double boucle avec range(i + 1, n) pour ne compter chaque paire qu'une fois."],needsNumpy:!0}},{kind:"quiz",questions:[{question:"Pourquoi normaliser AVANT le produit matriciel E @ E.T ?",options:["Pour éviter les nombres négatifs","Parce qu'avec des lignes de norme 1, le produit scalaire EST le cosinus : une seule multiplication matricielle donne toutes les similarités","NumPy l'exige","Pour réduire la taille de la matrice"],correct:1,explanation:"C'est pour ça que beaucoup de modèles d'embeddings sortent des vecteurs pré-normalisés : le dot product devient directement la similarité, et le calcul en masse devient une simple multiplication de matrices — ce que les GPU adorent."},{question:"Pourquoi dédupliquer un corpus avant un fine-tuning ?",options:["Pour économiser du disque uniquement","Les doublons font sur-apprendre certains exemples, biaisent l'évaluation (fuites train/test) et gaspillent du budget d'entraînement","Les doublons font planter l'entraînement","C'est purement esthétique"],correct:1,explanation:"La déduplication (souvent par similarité d'embeddings, exactement comme ici) est une étape standard des pipelines de données des grands labos — un des facteurs les plus rentables de la qualité finale d'un modèle."}]}]}]},{id:"m6",tier:2,title:"TF-IDF et moteur de recherche from scratch",tagline:"Vectoriser des documents sans réseau de neurones — et comprendre ce que les embeddings ont amélioré.",status:"ready",lessons:[{id:"m6l1",title:"Bag of words : des textes aux vecteurs",minutes:30,sections:[{kind:"text",md:`# Transformer du texte en nombres, premi\xe8re m\xe9thode

Aucun algorithme ne travaille sur des mots : il faut des **vecteurs**. La m\xe9thode historique, toujours utilis\xe9e (recherche lexicale, baselines, features), est le **bag of words** (sac de mots) : chaque document devient un vecteur de comptages, une dimension par mot du vocabulaire.

\`\`\`
Vocabulaire : ["chat", "chien", "dort", "mange"]
"le chat dort, le chat mange"  ->  [2, 0, 1, 1]
"le chien dort"                ->  [0, 1, 1, 0]
\`\`\`

L'*ordre des mots est perdu* (d'o\xf9 le nom : un \xab sac \xbb) \u{2014} c'est la grande limite, et la raison d'\xeatre des mod\xe8les s\xe9quentiels puis des transformers.

## Construire la repr\xe9sentation

Deux \xe9tapes, que tu connais d\xe9j\xe0 par morceaux :

1. **Vocabulaire** : l'ensemble des mots du corpus, avec un index fixe par mot (module 2 !),
2. **Vectorisation** : pour chaque document, compter les occurrences de chaque mot du vocabulaire (module 1 !).

## La matrice documents \xd7 mots

Empile les vecteurs : tu obtiens une matrice \`(n_documents, taille_vocab)\`. C'est la structure de donn\xe9es de la recherche d'information classique \u{2014} et l'entr\xe9e des premiers classifieurs de texte. Dans scikit-learn, tout ceci s'appelle \`CountVectorizer\` ; aujourd'hui tu l'\xe9cris toi-m\xeame.`},{kind:"exercise",exercise:{id:"m6l1e1",title:"Vectoriseur bag of words complet",instructions:"Implémente :\n\n1. `construire_vocab(documents)` — renvoie le dict `mot → index` des mots (minuscules, split espace) de tous les documents, **triés alphabétiquement** (pour des index reproductibles),\n2. `vectoriser(document, vocab)` — renvoie la liste de comptages, de longueur `len(vocab)`, où la position `vocab[mot]` contient le nombre d'occurrences du mot (mots hors vocab : ignorés).",starterCode:`def construire_vocab(documents):
    ...

def vectoriser(document, vocab):
    ...

docs = ["le chat dort", "le chien mange le os"]
vocab = construire_vocab(docs)
print(vocab)
print(vectoriser("le chat mange le chat", vocab))`,solution:`def construire_vocab(documents):
    mots = set()
    for doc in documents:
        mots.update(doc.lower().split())
    return {mot: i for i, mot in enumerate(sorted(mots))}

def vectoriser(document, vocab):
    vecteur = [0] * len(vocab)
    for mot in document.lower().split():
        if mot in vocab:
            vecteur[vocab[mot]] += 1
    return vecteur

docs = ["le chat dort", "le chien mange le os"]
vocab = construire_vocab(docs)
print(vocab)
print(vectoriser("le chat mange le chat", vocab))`,tests:`_v = construire_vocab(["b a", "c a"])

Dans un moteur de recherche bag of words, \xab le \xbb et \xab de \xbb dominent tous les scores : tr\xe8s fr\xe9quents, jamais informatifs. **TF-IDF** corrige \xe7a avec une id\xe9e simple : *un mot compte s'il est fr\xe9quent dans CE document mais rare dans LES AUTRES*.

## La formule

Pour un mot \`m\` dans un document \`d\` :

\`\`\`
tf(m, d)   = nombre d'occurrences de m dans d
idf(m)     = log(N / df(m))          # N = nb docs, df = nb docs contenant m
tfidf(m,d) = tf(m, d) * idf(m)
\`\`\`

- Un mot pr\xe9sent dans **tous** les documents : \`idf = log(N/N) = 0\` \u{2192} poids nul. \xab Le \xbb dispara\xeet de lui-m\xeame, sans liste de stopwords !
- Un mot rare : \`idf\` \xe9lev\xe9 \u{2192} ses occurrences p\xe8sent lourd.

## Le moteur de recherche

Score d'un document pour une requ\xeate = somme des tf-idf des mots de la requ\xeate :

\`\`\`
score(d, requete) = somme des tfidf(m, d) pour chaque mot m de la requ\xeate
\`\`\`

Classe les documents par score d\xe9croissant : c'est un moteur de recherche. Les vrais syst\xe8mes (Elasticsearch, et la moiti\xe9 des pipelines RAG en mode \xab recherche hybride \xbb) utilisent **BM25**, un raffinement direct de cette formule \u{2014} le c\u{153}ur conceptuel est identique.`},{kind:"exercise",exercise:{id:"m6l2e1",title:"Moteur de recherche TF-IDF",instructions:"À partir de `docs` (liste de listes de tokens), implémente :\n\n1. `idf(mot, docs)` — `log(N / df)` avec `math.log` ; si le mot n'apparaît dans aucun doc, renvoie `0.0`,\n2. `score(doc, requete, docs)` — somme, pour chaque mot de la requête (liste de tokens), de `tf * idf` où `tf` est le comptage du mot dans `doc`,\n3. `chercher(requete, docs)` — renvoie l'indice du document au meilleur score.",starterCode:`import math

docs = [
    ["le", "chat", "mange", "le", "poisson"],
    ["le", "chien", "mange", "le", "os"],
    ["le", "poisson", "nage", "dans", "le", "lac"],
]

def idf(mot, docs):
    ...

def score(doc, requete, docs):
    ...

def chercher(requete, docs):
    ...

print(round(idf("poisson", docs), 3))
print(chercher(["poisson", "mange"], docs))`,solution:`import math

docs = [
    ["le", "chat", "mange", "le", "poisson"],
    ["le", "chien", "mange", "le", "os"],
    ["le", "poisson", "nage", "dans", "le", "lac"],
]

def idf(mot, docs):
    df = sum(1 for d in docs if mot in d)
    if df == 0:
        return 0.0
    return math.log(len(docs) / df)

def score(doc, requete, docs):
    total = 0.0
    for mot in requete:
        tf = doc.count(mot)
        total += tf * idf(mot, docs)
    return total

def chercher(requete, docs):
    scores = [score(d, requete, docs) for d in docs]
    return scores.index(max(scores))

print(round(idf("poisson", docs), 3))
print(chercher(["poisson", "mange"], docs))`,tests:`import math
assert abs(idf("le", docs)) < 1e-9, "'le' est dans tous les docs : idf = log(3/3) = 0"
assert abs(idf("chat", docs) - math.log(3)) < 1e-9, "'chat' dans 1 doc sur 3 : idf = log(3)"
assert idf("dragon", docs) == 0.0, "Mot absent partout : 0.0 (pas de division par z\xe9ro !)"
assert chercher(["poisson", "mange"], docs) == 0, "Doc 0 contient 'poisson' ET 'mange'"
assert chercher(["nage"], docs) == 2, "'nage' n'est que dans le doc 2"
_s0 = score(docs[0], ["le", "le", "le"], docs)
assert abs(_s0) < 1e-9, "Une requ\xeate de stopwords doit donner un score nul \u{2014} c'est la magie du TF-IDF"
print("TESTS_PASS")`,hints:["df = sum(1 for d in docs if mot in d) — le nombre de documents contenant le mot.","tf = doc.count(mot) — les listes Python ont une méthode count.","chercher : calcule tous les scores puis scores.index(max(scores))."]}},{kind:"quiz",questions:[{question:'Pourquoi idf("le") vaut-il 0 si "le" apparaît dans tous les documents ?',options:["C'est un bug de la formule","log(N/N) = log(1) = 0 : un mot présent partout ne discrimine rien, son poids s'annule naturellement",'Parce que "le" est dans une liste de stopwords',"Parce que tf vaut 0"],correct:1,explanation:"C'est l'élégance de TF-IDF : le filtrage des mots vides émerge de la statistique du corpus, sans aucune liste manuelle — et il s'adapte au domaine (dans un corpus médical, \"patient\" devient un quasi-stopword)."},{question:"Quelle limite de TF-IDF les embeddings neuronaux résolvent-ils ?",options:["La lenteur de calcul",'TF-IDF ne voit aucun lien entre "voiture" et "automobile" : sans mot exact commun, score nul',"TF-IDF ne gère pas les corpus de plus de 1000 documents","TF-IDF nécessite un GPU"],correct:1,explanation:'TF-IDF est purement lexical : synonymes et paraphrases lui échappent. Les embeddings capturent la *sémantique* — "voiture" et "automobile" ont des vecteurs proches. Les meilleurs systèmes RAG combinent d\'ailleurs les deux (recherche hybride).'}]}]},{id:"m6l3",title:"Évaluer un moteur de recherche : précision@k",minutes:35,sections:[{kind:"text",md:`# \xab Mon moteur est-il bon ? \xbb \u{2014} prouve-le

Tu as deux moteurs (comptage brut et TF-IDF). Lequel est meilleur ? *L'impression* ne suffit pas : il faut un **jeu de test** et une **m\xe9trique**. C'est le m\xeame r\xe9flexe que le module 13 c\xf4t\xe9 LLM \u{2014} et en recherche d'information, la m\xe9trique reine s'appelle **pr\xe9cision@k**.

## Le jeu de test de retrieval

Pour chaque requ\xeate, on annote \xe0 la main les documents *r\xe9ellement pertinents* :

\`\`\`
jeu = [
    {"requete": "chat qui dort", "pertinents": {0, 4}},
    {"requete": "recette gateau", "pertinents": {2}},
]
\`\`\`

## Pr\xe9cision@k

Le moteur renvoie ses k premiers r\xe9sultats. Quelle fraction est pertinente ?

\`\`\`
precision@k = |top_k \u{2229} pertinents| / k
\`\`\`

Exemple : top-3 = [4, 1, 0], pertinents = {0, 4} \u{2192} 2/3 \u{2248} 0.67. On moyenne ensuite sur toutes les requ\xeates du jeu. (Sa jumelle, le **rappel@k**, divise par le nombre de pertinents \u{2014} \xab en ai-je retrouv\xe9 la totalit\xe9 ? \xbb. Les deux se lisent ensemble.)

## Pourquoi c'est LE r\xe9flexe \xe0 avoir

Chunking diff\xe9rent, embeddings diff\xe9rents, TF-IDF vs s\xe9mantique, hybride\u{2026} chaque variante de ton RAG se compare **sur les m\xeames requ\xeates annot\xe9es**. Sans \xe7a, on \xab am\xe9liore \xbb \xe0 l'aveugle. Avec \xe7a, chaque changement a un chiffre.`},{kind:"exercise",exercise:{id:"m6l3e1",title:"Benchmark de deux moteurs",instructions:'Le starter fournit deux moteurs jouets (`moteur_naif` et `moteur_tfidf`, interface : `moteur(requete, k)` → liste d\'indices) et un jeu de test. Implémente :\n\n1. `precision_at_k(resultats, pertinents, k)` — la fraction des `k` premiers résultats qui sont dans l\'ensemble `pertinents`,\n2. `evaluer_moteur(moteur, jeu, k)` — la précision@k **moyenne** sur le jeu de test,\n3. `comparer(m1, m2, jeu, k)` — renvoie `"moteur1"`, `"moteur2"` ou `"egalite"`.',starterCode:`JEU = [
    {"requete": "q1", "pertinents": {0, 4}},
    {"requete": "q2", "pertinents": {2}},
    {"requete": "q3", "pertinents": {1, 3}},
]

def moteur_naif(requete, k):
    return {"q1": [1, 0, 2], "q2": [2, 0, 1], "q3": [0, 2, 4]}[requete][:k]

def moteur_tfidf(requete, k):
    return {"q1": [4, 0, 1], "q2": [2, 1, 0], "q3": [3, 1, 0]}[requete][:k]

def precision_at_k(resultats, pertinents, k):
    ...

def evaluer_moteur(moteur, jeu, k):
    ...

def comparer(m1, m2, jeu, k):
    ...

print("na\xeff  :", evaluer_moteur(moteur_naif, JEU, 2))
print("tfidf :", evaluer_moteur(moteur_tfidf, JEU, 2))
print("gagnant :", comparer(moteur_naif, moteur_tfidf, JEU, 2))`,solution:`JEU = [
    {"requete": "q1", "pertinents": {0, 4}},
    {"requete": "q2", "pertinents": {2}},
    {"requete": "q3", "pertinents": {1, 3}},
]

def moteur_naif(requete, k):
    return {"q1": [1, 0, 2], "q2": [2, 0, 1], "q3": [0, 2, 4]}[requete][:k]

def moteur_tfidf(requete, k):
    return {"q1": [4, 0, 1], "q2": [2, 1, 0], "q3": [3, 1, 0]}[requete][:k]

def precision_at_k(resultats, pertinents, k):
    top = resultats[:k]
    return sum(1 for r in top if r in pertinents) / k

def evaluer_moteur(moteur, jeu, k):
    scores = [precision_at_k(moteur(cas["requete"], k), cas["pertinents"], k) for cas in jeu]
    return sum(scores) / len(scores)

def comparer(m1, m2, jeu, k):
    s1, s2 = evaluer_moteur(m1, jeu, k), evaluer_moteur(m2, jeu, k)
    if s1 > s2:
        return "moteur1"
    if s2 > s1:
        return "moteur2"
    return "egalite"

print("na\xeff  :", evaluer_moteur(moteur_naif, JEU, 2))
print("tfidf :", evaluer_moteur(moteur_tfidf, JEU, 2))
print("gagnant :", comparer(moteur_naif, moteur_tfidf, JEU, 2))`,tests:`assert precision_at_k([4, 1, 0], {0, 4}, 3) == 2/3, "2 pertinents sur 3 r\xe9sultats"

_s_naif = evaluer_moteur(moteur_naif, JEU, 2)

Un \xab neurone \xbb artificiel n'a rien de myst\xe9rieux : c'est un **produit scalaire suivi d'une fonction non lin\xe9aire**. Tu as d\xe9j\xe0 tous les ingr\xe9dients.

## La pr\xe9diction

Pour un vecteur d'entr\xe9e \`x\` (par exemple : les features d'une critique de film), des poids \`w\` et un biais \`b\` :

\`\`\`
z = w @ x + b          # le "logit" : un score brut, de -inf \xe0 +inf
p = sigmoid(z)         # une probabilit\xe9, entre 0 et 1
\`\`\`

La **sigmo\xefde** \xe9crase le score en probabilit\xe9 :

\`\`\`
sigmoid(z) = 1 / (1 + exp(-z))
\`\`\`

- \`z\` tr\xe8s n\xe9gatif \u{2192} p \u{2248} 0 (classe \xab n\xe9gatif \xbb)
- \`z = 0\` \u{2192} p = 0.5 (incertitude totale)
- \`z\` tr\xe8s positif \u{2192} p \u{2248} 1 (classe \xab positif \xbb)

## Ce que "apprendre" veut dire

Les poids \`w\` encodent l'importance de chaque feature : un poids positif pour \xab excellent \xbb, n\xe9gatif pour \xab ennuyeux \xbb. *Apprendre = trouver les bons poids* \u{2014} c'est l'objet de la le\xe7on suivante. Pour l'instant, on construit la machine \xe0 pr\xe9dire.

> Un LLM entier n'est que ce motif r\xe9p\xe9t\xe9 : des produits matriciels (des milliards de \xab neurones \xbb) entrecoup\xe9s de non-lin\xe9arit\xe9s. La sortie finale \u{2014} softmax sur le vocabulaire \u{2014} est la cousine multiclasse de cette sigmo\xefde.`},{kind:"exercise",exercise:{id:"m7l1e1",title:"Construire le neurone",instructions:"Implémente en NumPy :\n\n1. `sigmoid(z)` — doit fonctionner sur un scalaire **ou** un array (np.exp est vectorisé, profites-en),\n2. `predire_proba(X, w, b)` — pour une matrice `X` de shape `(n, d)` (n exemples, d features) : renvoie les `n` probabilités, soit `sigmoid(X @ w + b)`,\n3. `predire_classe(X, w, b)` — renvoie 1 quand la probabilité dépasse 0.5, sinon 0 (astuce : `(probas >= 0.5).astype(int)`).",starterCode:`import numpy as np

def sigmoid(z):
    ...

def predire_proba(X, w, b):
    ...

def predire_classe(X, w, b):
    ...

# 3 critiques, 2 features : [nb mots positifs, nb mots n\xe9gatifs]
X = np.array([[3.0, 0.0], [0.0, 2.0], [1.0, 1.0]])
w = np.array([1.5, -1.5])   # poids "sens\xe9s" fix\xe9s \xe0 la main
b = 0.0
print(predire_proba(X, w, b).round(3))
print(predire_classe(X, w, b))`,solution:`import numpy as np

    return 1 / (1 + np.exp(-z))

def predire_proba(X, w, b):
    return sigmoid(X @ w + b)

def predire_classe(X, w, b):
    return (predire_proba(X, w, b) >= 0.5).astype(int)

X = np.array([[3.0, 0.0], [0.0, 2.0], [1.0, 1.0]])
w = np.array([1.5, -1.5])
b = 0.0
print(predire_proba(X, w, b).round(3))
print(predire_classe(X, w, b))`,tests:`import numpy as np

assert sigmoid(100) > 0.999 and sigmoid(-100) < 0.001, "Saturation aux extr\xeames"
_z = sigmoid(np.array([-1.0, 0.0, 1.0]))
assert _z.shape == (3,), "sigmoid doit \xeatre vectoris\xe9e (marcher sur un array)"
_X = np.array([[3.0, 0.0], [0.0, 2.0], [1.0, 1.0]])
_w = np.array([1.5, -1.5])
_p = predire_proba(_X, _w, 0.0)
assert _p.shape == (3,), "Une probabilit\xe9 par exemple"
assert _p[0] > 0.9, "3 mots positifs, 0 n\xe9gatif : probabilit\xe9 haute"
assert _p[1] < 0.1, "0 positif, 2 n\xe9gatifs : probabilit\xe9 basse"
assert list(predire_classe(_X, _w, 0.0)) == [1, 0, 1], "Seuil \xe0 0.5 (1-1 avec poids sym\xe9triques donne z=0, p=0.5 -> classe 1)"
print("TESTS_PASS")`,hints:["sigmoid : littéralement 1 / (1 + np.exp(-z)) — np.exp gère scalaires et arrays.","X @ w donne un vecteur de n logits ; + b se diffuse tout seul (broadcasting).","(probas >= 0.5) donne des booléens ; .astype(int) les convertit en 0/1."],needsNumpy:!0}},{kind:"quiz",questions:[{question:"Que représente le logit z = w @ x + b avant la sigmoïde ?",options:["Une probabilité","Un score brut non borné : son signe donne la classe penchée, sa magnitude la confiance","Le gradient","Le taux d'erreur"],correct:1,explanation:'Les LLM aussi produisent des logits (un par token du vocabulaire) que softmax convertit en probabilités. Le mot "logits" que tu vois dans les API vient exactement d\'ici.'},{question:"Pourquoi une non-linéarité (sigmoïde, ReLU…) est-elle indispensable dans un réseau ?",options:["Pour ralentir l'entraînement","Sans elle, empiler des couches linéaires équivaut à UNE seule couche linéaire : le réseau ne peut rien apprendre de complexe","Pour économiser de la mémoire","C'est une convention historique sans importance"],correct:1,explanation:"La composition de fonctions linéaires est linéaire : W2(W1x) = (W2W1)x. Les non-linéarités entre les couches sont ce qui donne aux réseaux profonds — et aux transformers — leur pouvoir d'expression."}]}]},{id:"m7l2",title:"La descente de gradient, à la main",minutes:40,sections:[{kind:"text",md:`# Comment un mod\xe8le apprend

L'entra\xeenement de *tous* les mod\xe8les \u{2014} de la r\xe9gression logistique \xe0 GPT \u{2014} suit la m\xeame boucle :

1. **Pr\xe9dire** avec les poids actuels,
2. **Mesurer l'erreur** avec une fonction de perte (*loss*),
3. **Calculer le gradient** : dans quelle direction bouger chaque poids pour r\xe9duire la perte,
4. **Mettre \xe0 jour** : \`w = w - lr * gradient\` (lr = *learning rate*),
5. Recommencer.

## La perte : entropie crois\xe9e binaire

Pour des probabilit\xe9s \`p\` et des \xe9tiquettes \`y\` (0 ou 1) :

\`\`\`
loss = -moyenne( y*log(p) + (1-y)*log(1-p) )
\`\`\`

Elle punit s\xe9v\xe8rement une pr\xe9diction *confiante et fausse* (log(petit) \u{2192} tr\xe8s n\xe9gatif). C'est la m\xeame famille de perte que celle qui entra\xeene les LLM (entropie crois\xe9e sur le prochain token).

## Le gradient (offert, pour cette fois)

Pour la r\xe9gression logistique, le calcul donne des formules remarquablement simples :

\`\`\`
erreur = p - y                        # vecteur (n,)
grad_w = X.T @ erreur / n             # (d,)
grad_b = erreur.mean()                # scalaire
\`\`\`

L'intuition : chaque poids est corrig\xe9 proportionnellement \xe0 *(l'erreur) \xd7 (la feature qui y a contribu\xe9)*. En pratique, PyTorch calcule ces gradients automatiquement (\`loss.backward()\`) \u{2014} mais les avoir \xe9crits une fois \xe0 la main change ta compr\xe9hension de tout le reste.`},{kind:"exercise",exercise:{id:"m7l2e1",title:"Entraîner un classifieur de sentiment",instructions:"Le starter fournit `sigmoid` et un mini-dataset (features : [mots positifs, mots négatifs, longueur]). Implémente :\n\n1. `perte(p, y)` — l'entropie croisée binaire (utilise `np.clip(p, 1e-10, 1 - 1e-10)` avant les log pour éviter log(0)),\n2. `une_etape(X, y, w, b, lr)` — calcule `p`, puis les gradients (formules ci-dessus), et renvoie les **nouveaux** `(w, b)`,\n3. `entrainer(X, y, epochs=300, lr=0.5)` — initialise `w` à zéros et `b` à 0.0, boucle, et renvoie `(w, b)`.\n\nLes tests vérifient que la perte diminue et que le modèle classe correctement le dataset.",starterCode:`import numpy as np

def sigmoid(z):
    return 1 / (1 + np.exp(-z))

# [mots_positifs, mots_negatifs, longueur/10]
X = np.array([[3, 0, 1.2], [2, 1, 0.8], [0, 3, 1.0], [1, 2, 1.5],

 ML : s'\xe9valuer sur ses donn\xe9es d'entra\xeenement

Ton classifieur du module pr\xe9c\xe9dent classe parfaitement\u{2026} *les exemples sur lesquels il s'est entra\xeen\xe9*. Mais un mod\xe8le qui a m\xe9moris\xe9 n'a rien appris : ce qui compte, c'est sa performance sur des donn\xe9es **jamais vues**. C'est LA distinction fondamentale : apprentissage vs **g\xe9n\xe9ralisation**.

## Le protocole minimal

\`\`\`
1. M\xe9langer les donn\xe9es (avec une graine fix\xe9e : reproductibilit\xe9)
2. D\xe9couper : ~80 % train / ~20 % test
3. Entra\xeener sur train UNIQUEMENT
4. Mesurer l'accuracy sur test \u{2014} le seul chiffre qui compte
\`\`\`

## Lire l'\xe9cart train/test

- \`train \u{2248} test\`, tous deux bons \u{2192} le mod\xe8le g\xe9n\xe9ralise \u{2713}
- \`train \u{226B} test\` \u{2192} **overfitting** : le mod\xe8le a m\xe9moris\xe9 du bruit. Rem\xe8des : plus de donn\xe9es, mod\xe8le plus simple, r\xe9gularisation.
- \`train\` d\xe9j\xe0 mauvais \u{2192} **underfitting** : le mod\xe8le est trop simple pour le probl\xe8me.

## Le m\xe9lange : une \xe9tape critique

Si tes donn\xe9es sont ordonn\xe9es (tous les positifs puis tous les n\xe9gatifs \u{2014} tr\xe8s courant !), un d\xe9coupage sans m\xe9lange met *toutes* les classes d'un c\xf4t\xe9. \`rng.permutation(n)\` g\xe9n\xe8re des indices m\xe9lang\xe9s ; on indexe X et y avec **les m\xeames** indices pour garder l'alignement exemple\u{2194}\xe9tiquette.

> Ce protocole s'applique tel quel aux LLM : les jeux d'\xe9valuation (module 13) doivent \xeatre disjoints des donn\xe9es de fine-tuning, et la *contamination* des benchmarks par les donn\xe9es d'entra\xeenement est un probl\xe8me majeur du domaine.`},{kind:"exercise",exercise:{id:"m7l3e1",title:"Protocole d'évaluation complet",instructions:'Le starter fournit le classifieur du module 7 (entraînement compris). Implémente :\n\n1. `split_train_test(X, y, part_test, graine)` — mélange avec `np.random.RandomState(graine).permutation(len(y))`, puis découpe : les premiers `n_test = int(len(y) * part_test)` indices pour le test, le reste pour le train. Renvoie `(X_train, y_train, X_test, y_test)`,\n2. `accuracy(y_vrai, y_pred)` — la fraction d\'étiquettes correctes,\n3. `protocole(X, y)` — split (20 % test, graine 42), entraîne sur le train, renvoie `{"train": acc_train, "test": acc_test}`.',starterCode:`import numpy as np

def sigmoid(z):
    return 1 / (1 + np.exp(-z))

def entrainer(X, y, epochs=300, lr=0.5):
    w, b = np.zeros(X.shape[1]), 0.0
    for _ in range(epochs):
        p = sigmoid(X @ w + b)
        w -= lr * (X.T @ (p - y)) / len(y)
        b -= lr * (p - y).mean()
    return w, b

def predire(X, w, b):
    return (sigmoid(X @ w + b) >= 0.5).astype(int)

rng = np.random.RandomState(0)
X = rng.randn(20, 2)
y = (X[:, 0] > 0).astype(float)

def split_train_test(X, y, part_test=0.2, graine=42):
    indices = np.random.RandomState(graine).permutation(len(y))
    n_test = int(len(y) * part_test)
    test, train = indices[:n_test], indices[n_test:]
    return X[train], y[train], X[test], y[test]

def accuracy(y_vrai, y_pred):
    return float((y_vrai.astype(int) == y_pred.astype(int)).mean())

def protocole(X, y):
    X_tr, y_tr, X_te, y_te = split_train_test(X, y, 0.2, 42)
    w, b = entrainer(X_tr, y_tr)
    return {"train": accuracy(y_tr, predire(X_tr, w, b)),
            "test": accuracy(y_te, predire(X_te, w, b))}
