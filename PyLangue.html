Ton tokenizer du module 2 a une faille b\xe9ante : tout mot jamais vu devient \`<unk>\`. Or la langue invente sans cesse (\xab rebasculer \xbb, noms propres, code, typos). \xc0 l'oppos\xe9, tokeniser caract\xe8re par caract\xe8re marche toujours\u{2026} mais produit des s\xe9quences interminables que les mod\xe8les peinent \xe0 traiter.

**BPE (Byte-Pair Encoding)** est le compromis qui a gagn\xe9 : partir des caract\xe8res, puis **fusionner it\xe9rativement la paire adjacente la plus fr\xe9quente** du corpus, jusqu'\xe0 la taille de vocabulaire voulue.

## L'algorithme d'entra\xeenement

\`\`\`
1. D\xe9coupe chaque mot en caract\xe8res : "lower" -> l o w e r
2. Compte toutes les paires adjacentes dans le corpus
3. Fusionne la paire la plus fr\xe9quente partout : (l, o) -> "lo"
4. Retourne en 2, jusqu'\xe0 N fusions
\`\`\`

Les fusions apprises refl\xe8tent la statistique de la langue : \`er\`, \`ing\`, \`tion\` \xe9mergent t\xf4t en anglais. Les mots fr\xe9quents finissent en un seul token ; les mots rares restent d\xe9coup\xe9s en sous-unit\xe9s \u{2014} mais *jamais* en \`<unk>\`.

## Concr\xe8tement chez les LLM

GPT, Llama, Claude, Mistral : tous utilisent des variantes de BPE (souvent au niveau *octet*, d'o\xf9 \xab byte \xbb-pair). Le vocabulaire (~50k \xe0 260k tokens) et la liste ordonn\xe9e des fusions **sont** le tokenizer. C'est pour \xe7a qu'un mot rare ou une langue peu dot\xe9e \xab co\xfbte \xbb plus de tokens \u{2014} et pourquoi compter les caract\xe8res d'un mot est difficile pour un LLM : il ne voit m\xeame pas les caract\xe8res.`},{kind:"exercise",exercise:{id:"m8l1e1",title:"Compter et trouver la meilleure paire",instructions:'Un corpus BPE se représente comme un dict `mot_découpé → fréquence`, où le mot découpé est un **tuple** de symboles : `("l","o","w"): 5`.\n\nImplémente :\n\n1. `compter_paires(corpus)` — renvoie un dict `(sym1, sym2) → fréquence totale` de chaque paire *adjacente*, pondérée par la fréquence du mot,\n2. `meilleure_paire(paires)` — renvoie la paire la plus fréquente (`max` avec `key=paires.get`) ; si le dict est vide, renvoie `None`.',starterCode:`corpus = {

Il te manque une seule brique : **appliquer** une fusion au corpus. Fusionner la paire \`("l","o")\` transforme \`("l","o","w")\` en \`("lo","w")\` \u{2014} partout, dans tous les mots.

\`\`\`
def fusionner_mot(mot, paire):
    # ("l","o","w","e","r") + ("l","o") -> ("lo","w","e","r")
    nouveau = []
    i = 0
    while i < len(mot):
        if i < len(mot) - 1 and (mot[i], mot[i+1]) == paire:
            nouveau.append(mot[i] + mot[i+1])   # concat\xe8ne les 2 symboles
            i += 2                               # saute la paire
        else:
            nouveau.append(mot[i])
            i += 1
    return tuple(nouveau)
\`\`\`

L'entra\xeenement complet est alors une boucle de N it\xe9rations : compter les paires (le\xe7on 1) \u{2192} prendre la meilleure \u{2192} l'appliquer partout \u{2192} m\xe9moriser la fusion dans une liste ordonn\xe9e. Cette **liste ordonn\xe9e de fusions** est le produit final : c'est elle qu'on rejoue, dans le m\xeame ordre, pour tokeniser un texte nouveau.

> Le vrai tokenizer de GPT-2 tient en ~300 lignes de Python et fait exactement \xe7a (au niveau octet, avec une regex de pr\xe9-d\xe9coupage \u{2014} celle du module 3 !). Apr\xe8s cet exercice, tu peux le lire dans le texte.`},{kind:"exercise",exercise:{id:"m8l2e1",title:"Entraîner un mini-BPE",instructions:"Le starter fournit `compter_paires` et `fusionner_mot`. Implémente :\n\n1. `appliquer_fusion(corpus, paire)` — renvoie un **nouveau** dict corpus où chaque mot a subi `fusionner_mot` (attention : deux mots différents peuvent devenir identiques après fusion — additionne alors leurs fréquences),\n2. `entrainer_bpe(corpus, n_fusions)` — répète : compter → meilleure paire → appliquer → enregistrer la paire dans `fusions`. S'arrête si plus aucune paire. Renvoie `(corpus_final, fusions)`.",starterCode:`def compter_paires(corpus):

Entra\xeener BPE produit une **liste ordonn\xe9e de fusions**. Mais comment tokeniser un texte *nouveau* \u{2014} y compris des mots jamais vus \xe0 l'entra\xeenement ? En **rejouant les fusions dans leur ordre d'apprentissage** :

\`\`\`
mot nouveau : "lowest" -> l o w e s t
fusion 1 ("e","r")  : rien \xe0 fusionner ici
fusion 2 ("l","o")  : lo w e s t
fusion 3 ("lo","w") : low e s t
r\xe9sultat : ["low", "e", "s", "t"]
\`\`\`

Le mot inconnu \xab lowest \xbb se d\xe9coupe en sous-unit\xe9s connues \u{2014} dont \`low\`, appris sur d'autres mots. **Aucun \`<unk>\`**, et les r\xe9gularit\xe9s morphologiques sont r\xe9utilis\xe9es : c'est toute la puissance de BPE.

## Pourquoi l'ordre des fusions est sacr\xe9

Chaque fusion a \xe9t\xe9 apprise sur un corpus *o\xf9 les pr\xe9c\xe9dentes \xe9taient d\xe9j\xe0 appliqu\xe9es*. Les rejouer dans le d\xe9sordre produirait des d\xe9coupages diff\xe9rents de ceux vus \xe0 l'entra\xeenement du mod\xe8le \u{2014} et un LLM re\xe7oit alors des s\xe9quences de tokens qu'il n'a jamais rencontr\xe9es. C'est pourquoi un tokenizer est versionn\xe9 avec son mod\xe8le, \xe0 l'octet pr\xe8s.

## Mesurer la \xab fertilit\xe9 \xbb

Le nombre moyen de tokens par mot s'appelle la **fertilit\xe9** du tokenizer. Fertilit\xe9 1.1 = presque un token par mot (corpus bien couvert) ; fertilit\xe9 3 = mots pulv\xe9ris\xe9s (langue ou domaine mal couverts \u{2192} contexte et budget gaspill\xe9s). C'est un chiffre \xe0 conna\xeetre quand on choisit un mod\xe8le pour une langue donn\xe9e.`},{kind:"exercise",exercise:{id:"m8l3e1",title:"La fonction encoder()",instructions:"Le starter fournit `fusionner_mot` (module 8) et des fusions apprises. Implémente :\n\n1. `encoder_mot(mot, fusions)` — découpe le mot (str) en tuple de caractères, applique `fusionner_mot` pour **chaque fusion, dans l'ordre**, renvoie la liste finale des tokens,\n2. `encoder(texte, fusions)` — encode chaque mot du texte (split espaces) et concatène toutes les listes de tokens,\n3. `fertilite(texte, fusions)` — tokens totaux / nombre de mots, arrondi à 2 décimales.",starterCode:`def fusionner_mot(mot, paire):

Le papier de 2017 qui a donn\xe9 naissance aux transformers \u{2014} donc \xe0 GPT, Claude, Llama, Gemini \u{2014} repose sur une id\xe9e qu'on peut impl\xe9menter en NumPy avec ce que tu sais d\xe9j\xe0 : des produits scalaires et une normalisation.

## L'intuition

Pour comprendre le mot \xab le \xbb dans \xab le chat noir dort \xbb, un mod\xe8le doit savoir **quels autres mots regarder**. L'attention calcule, pour chaque token, une **moyenne pond\xe9r\xe9e** des autres tokens \u{2014} o\xf9 les poids refl\xe8tent la *pertinence*, mesur\xe9e par\u{2026} un produit scalaire (module 5 !).

## \xc9tape 1 : softmax, transformer des scores en poids

Les produits scalaires donnent des scores quelconques : \`[2.1, -0.3, 0.8]\`. Pour en faire des **poids de moyenne** (positifs, somme = 1), on applique softmax :

\`\`\`
softmax(x)\u{1D62} = exp(x\u{1D62}) / \u{3A3}\u{2C7C} exp(x\u{2C7C})
\`\`\`

## Le pi\xe8ge num\xe9rique (classique en entretien !)

\`exp(1000)\` d\xe9borde en \`inf\`. La solution, utilis\xe9e dans *toutes* les impl\xe9mentations r\xe9elles : soustraire le max avant l'exponentielle. Math\xe9matiquement identique (\xe7a se simplifie dans la fraction), num\xe9riquement stable :

\`\`\`
def softmax(x):
    e = np.exp(x - x.max())
    return e / e.sum()
\`\`\`

> Ce m\xeame softmax sert aussi \xe0 convertir les *logits* d'un LLM en probabilit\xe9s sur le prochain token \u{2014} c'est l\xe0 qu'agit le param\xe8tre \`temperature\` : on divise les scores par T avant le softmax. T petit \u{2192} distribution piqu\xe9e (d\xe9terministe) ; T grand \u{2192} distribution plate (cr\xe9atif).`},{kind:"exercise",exercise:{id:"m9l1e1",title:"Softmax stable, avec température",instructions:"Implémente `softmax(x, temperature=1.0)` :\n\n1. divise `x` par `temperature`,\n2. soustrais le max (stabilité numérique),\n3. exponentielle puis normalisation par la somme.\n\nVérifie ensuite ton intuition : que devient la distribution quand la température baisse ?",starterCode:`import numpy as np

print("T=0.1 :", softmax(logits, temperature=0.1))

La self-attention se d\xe9crit avec une m\xe9taphore de moteur de recherche interne \xe0 la phrase :

- **Query (Q)** : ce que chaque token *cherche* (\xab je suis "le", je cherche mon nom \xbb)
- **Key (K)** : ce que chaque token *offre* comme identit\xe9 (\xab je suis un nom commun \xbb)
- **Value (V)** : l'information que chaque token *transmet* si on le regarde

Chaque token est projet\xe9 en trois vecteurs (par des matrices apprises \`W_q, W_k, W_v\` \u{2014} ici on les suppose d\xe9j\xe0 appliqu\xe9es).

## La formule compl\xe8te

\`\`\`
Attention(Q, K, V) = softmax(Q @ K.T / sqrt(d)) @ V
\`\`\`

D\xe9composons pour \`n\` tokens de dimension \`d\` :

1. \`Q @ K.T\` \u{2192} matrice \`(n, n)\` : le score de chaque token envers chaque autre. **Un produit scalaire par paire de tokens** \u{2014} tu sais d\xe9j\xe0 que produit scalaire = similarit\xe9.
2. \`/ sqrt(d)\` : sans cette division, les scores grandissent avec la dimension et saturent le softmax (gradients minuscules). C'est le \xab scaled \xbb de *scaled dot-product attention*.
3. \`softmax\` **ligne par ligne** : chaque token convertit ses scores en poids qui somment \xe0 1.
4. \`@ V\` : chaque token repart avec une moyenne pond\xe9r\xe9e des valeurs des autres.

Trente lignes de NumPy, et tu as le c\u{153}ur d'un LLM. Le reste d'un transformer (module 10) : plusieurs \xab t\xeates \xbb d'attention en parall\xe8le, des couches empil\xe9es, des MLP, des normalisations.`},{kind:"code",title:"Softmax par ligne — brique nécessaire pour l'exercice",runnable:!0,needsNumpy:!0,code:`import numpy as np

def softmax_lignes(S):
    """Softmax appliqu\xe9 \xe0 chaque ligne d'une matrice."""
    e = np.exp(S - S.max(axis=1, keepdims=True))
    return e / e.sum(axis=1, keepdims=True)

S = np.array([[1.0, 2.0], [3.0, 0.0]])
P = softmax_lignes(S)
print(P)
print("sommes par ligne :", P.sum(axis=1))   # [1, 1]`},{kind:"exercise",exercise:{id:"m9l2e1",title:"Implémenter la scaled dot-product attention",instructions:"Implémente `attention(Q, K, V)` pour des matrices de shape `(n, d)` :\n\n1. scores `= Q @ K.T / sqrt(d)` (récupère `d` avec `Q.shape[1]`)\n2. poids `= softmax` ligne par ligne (fourni dans le starter)\n3. renvoie `poids @ V`\n\nC'est la formule exacte du papier de 2017 — celle qui tourne, en version optimisée GPU, à chaque token généré par un LLM.",starterCode:`import numpy as np

Ton attention laisse chaque token regarder *tous* les autres \u{2014} y compris ceux qui viennent apr\xe8s. Pour un mod\xe8le qui **pr\xe9dit le token suivant**, c'est de la triche : \xe0 l'entra\xeenement, le token 3 verrait la r\xe9ponse (le token 4) juste \xe0 c\xf4t\xe9. Les mod\xe8les de type GPT sont dits **causaux** : chaque position ne peut regarder que le pass\xe9.

## L'impl\xe9mentation : un masque \xe0 -inf

L'astuce est d'une \xe9l\xe9gance rare. Avant le softmax, on remplace les scores des positions futures par \`-inf\` :

\`\`\`
scores[i, j] = -inf   pour j > i     (le futur, interdit)
\`\`\`

Or \`exp(-inf) = 0\` : apr\xe8s softmax, les poids du futur sont **exactement z\xe9ro**, et les poids restants se renormalisent tout seuls entre eux. Aucune r\xe8gle sp\xe9ciale, la formule fait tout.

\`\`\`
masque = np.triu(np.ones((n, n)), k=1)   # triangle sup\xe9rieur strict
scores = np.where(masque == 1, -np.inf, scores)
\`\`\`

## Pourquoi c'est fondamental

C'est ce masque qui permet l'entra\xeenement massivement parall\xe8le des GPT : une phrase de n tokens fournit n exercices de pr\xe9diction *simultan\xe9s* (chaque position pr\xe9dit la suivante), calcul\xe9s en un seul passage de matrices. Sans le masque, il faudrait un passage par position. Le m\xeame masque explique aussi le KV-cache \xe0 l'inf\xe9rence : le pass\xe9 ne changeant jamais, on le calcule une seule fois.`},{kind:"exercise",exercise:{id:"m9l3e1",title:"Attention causale",instructions:"Implémente `attention_causale(Q, K, V)` :\n\n1. scores `Q @ K.T / sqrt(d)` comme d'habitude,\n2. construis le masque du futur avec `np.triu(np.ones((n, n)), k=1)`,\n3. applique `np.where(masque == 1, -np.inf, scores)`,\n4. softmax ligne par ligne (fourni), puis `@ V`.\n\nLes tests vérifient la propriété clé : la sortie du token i ne doit dépendre QUE des tokens 0..i.",starterCode:`import numpy as np

def softmax_lignes(S):
    e = np.exp(S - S.max(axis=1, keepdims=True))
    return e / e.sum(axis=1, keepdims=True)

def attention_causale(Q, K, V):

téner.\n\n## Le mécanisme\n\nPour des matrices `Q, K, V` de shape `(n, d)` et `h` têtes (avec `d` divisible par `h`) :\n\n```\n1. Découpe Q, K, V en h tranches de largeur d/h (sur les colonnes)\n2. Pour chaque tête i : sortie_i = attention(Q_i, K_i, V_i)   # ton module 9 !\n3. Concatène les h sorties -> shape (n, d) à nouveau\n```\n\n(Dans un vrai transformer s'ajoute une projection linéaire finale apprise — conceptuellement secondaire ici.)\n\n## Pourquoi l'ordre des tokens n'existe pas encore\n\nSurprise : l'attention est **insensible à l'ordre** — permuter les tokens permute juste les sorties. Or « le chat mord le chien » ≠ « le chien mord le chat ». Les transformers injectent donc l'information de position dans les embeddings : *positional encodings* appris (GPT-2), ou rotations RoPE appliquées à Q et K (Llama, la plupart des modèles récents). Retiens le principe : **la position est une information ajoutée, pas une propriété de l'architecture**."},{kind:"exercise",exercise:{id:"m10l1e1",title:"Implémenter le multi-head",instructions:"Le starter fournit `attention(Q, K, V)` (ton module 9). Implémente :\n\n`multi_head(Q, K, V, h)` qui :\n\n1. calcule `dh = d // h` (largeur d'une tête),\n2. pour chaque tête `i` : extrait les colonnes `[i*dh : (i+1)*dh]` de Q, K et V, applique `attention`,\n3. concatène les sorties avec `np.concatenate(liste, axis=1)` et la renvoie (shape `(n, d)`).",starterCode:`import numpy as np

def softmax_lignes(S):
    e = np.exp(S - S.max(axis=1, keepdims=True))
    return e / e.sum(axis=1, keepdims=True)

def attention(Q, K, V):
    d = Q.shape[1]
    return softmax_lignes(Q @ K.T / np.sqrt(d)) @ V

def multi_head(Q, K, V, h):
    d = Q.shape[1]
    dh = d // h
    sorties = []
    for i in range(h):
        deb, fin = i * dh, (i + 1) * dh
        sorties.append(attention(Q[:, deb:fin], K[:, deb:fin], V[:, deb:fin]))
    return np.concatenate(sorties, axis=1)

Un \xab bloc transformer \xbb (r\xe9p\xe9t\xe9 32 fois dans Llama-8B, ~100 fois dans les plus gros mod\xe8les) ajoute trois m\xe9canismes autour de l'attention :

## 1. Les connexions r\xe9siduelles

Au lieu de \`x = f(x)\`, on \xe9crit \`x = x + f(x)\` : chaque couche *ajoute une correction* au lieu de remplacer. C'est ce qui permet d'empiler des dizaines de couches sans que le gradient ne s'\xe9vanouisse \u{2014} l'information a toujours un \xab raccourci \xbb direct.

## 2. La layer normalization

Recentre et r\xe9\xe9chelonne chaque vecteur de token (moyenne 0, variance 1) pour stabiliser l'entra\xeenement :

\`\`\`
layer_norm(x) = (x - moyenne(x)) / sqrt(variance(x) + eps)
\`\`\`

(par ligne \u{2014} chaque token est normalis\xe9 ind\xe9pendamment ; les mod\xe8les r\xe9cents utilisent la variante RMSNorm, encore plus simple.)

## 3. Le MLP (feed-forward)

Apr\xe8s l'attention (qui *m\xe9lange* les tokens entre eux), un petit r\xe9seau \xe0 deux couches traite chaque token *individuellement* : expansion \xd74, non-lin\xe9arit\xe9, retour \xe0 la dimension d'origine. C'est l\xe0 que r\xe9sident ~2/3 des param\xe8tres d'un LLM \u{2014} on l'interpr\xe8te souvent comme la \xab m\xe9moire des connaissances \xbb du mod\xe8le.

## Le bloc assembl\xe9 (version pr\xe9-norm, la moderne)

\`\`\`
x = x + attention(layer_norm(x))     # communication entre tokens
x = x + mlp(layer_norm(x))           # calcul par token
\`\`\`

Deux lignes. Empile-les N fois entre un embedding d'entr\xe9e et un softmax de sortie : tu as un GPT.`},{kind:"exercise",exercise:{id:"m10l2e1",title:"Assembler le bloc complet",instructions:"Le starter fournit `attention`. Implémente :\n\n1. `layer_norm(X)` — normalise **chaque ligne** : soustrais sa moyenne, divise par `sqrt(variance + 1e-5)` (utilise `mean` et `var` avec `axis=1, keepdims=True`),\n2. `mlp(X, W1, W2)` — `relu(X @ W1) @ W2` où `relu(z) = np.maximum(0, z)`,\n3. `bloc_transformer(X, W1, W2)` — les deux lignes du cours : résiduel + attention sur la norme (avec `Q=K=V=layer_norm(X)`), puis résiduel + MLP sur la norme.",starterCode:`import numpy as np

def softmax_lignes(S):
    e = np.exp(S - S.max(axis=1, keepdims=True))
    return e / e.sum(axis=1, keepdims=True)

def attention(Q, K, V):
    d = Q.shape[1]
    return softmax_lignes(Q @ K.T / np.sqrt(d)) @ V

def layer_norm(X):
    mu = X.mean(axis=1, keepdims=True)
    var = X.var(axis=1, keepdims=True)
    return (X - mu) / np.sqrt(var + 1e-5)

def mlp(X, W1, W2):
    return np.maximum(0, X @ W1) @ W2

def bloc_transformer(X, W1, W2):
    n = layer_norm(X)
    X = X + attention(n, n, n)
    n = layer_norm(X)
    X = X + mlp(n, W1, W2)
    return X

rng = np.random.RandomState(1)
X = rng.randn(3, 4)
W1 = rng.randn(4, 16) * 0.1
W2 = rng.randn(16, 4) * 0.1

recommandée maintenant : nanoGPT de Karpathy — ~300 lignes que tu peux désormais lire ligne à ligne."}]}]},{id:"m10l3",title:"Générer du texte : greedy, température, top-k",minutes:40,sections:[{kind:"text",md:`# Du mod\xe8le au texte : l'\xe9chantillonnage

Un transformer produit, pour chaque position, un vecteur de **logits** \u{2014} un score par token du vocabulaire. G\xe9n\xe9rer du texte, c'est choisir un token \xe0 partir de ces scores, l'ajouter \xe0 la s\xe9quence, et recommencer. La *mani\xe8re* de choisir s'appelle la **strat\xe9gie d'\xe9chantillonnage**, et c'est elle que r\xe8glent les param\xe8tres d'API que tu connais.

## Les trois strat\xe9gies fondamentales

**Greedy** \u{2014} toujours le token le plus probable (\`argmax\`). D\xe9terministe, mais r\xe9p\xe9titif : les boucles infinies \xab the the the \xbb viennent de l\xe0.

**\xc9chantillonnage avec temp\xe9rature** \u{2014} softmax(logits / T), puis tirage selon les probabilit\xe9s. T faible \u{2192} concentr\xe9 sur les tokens s\xfbrs ; T \xe9lev\xe9 \u{2192} cr\xe9atif mais risqu\xe9. Tu as impl\xe9ment\xe9 ce softmax au module 9 !

**Top-k** \u{2014} ne garder que les k tokens les plus probables, renormaliser, tirer parmi eux. Coupe la \xab longue tra\xeene \xbb de tokens absurdes qu'une temp\xe9rature \xe9lev\xe9e pourrait atteindre. (Sa variante top-p, ou *nucleus sampling*, garde les tokens couvrant p % de probabilit\xe9 cumul\xe9e \u{2014} m\xeame esprit.)

## Le tirage pond\xe9r\xe9 en NumPy

\`\`\`
rng = np.random.RandomState(graine)
choix = rng.choice(len(probas), p=probas)   # tire un indice selon probas
\`\`\`

> Ces strat\xe9gies expliquent des comportements que tu observes tous les jours : pourquoi temp\xe9rature 0 donne des r\xe9ponses reproductibles, pourquoi une temp\xe9rature tr\xe8s haute part en vrille, et pourquoi les API combinent temperature ET top_p.`},{kind:"exercise",exercise:{id:"m10l3e1",title:"Implémenter les trois stratégies",instructions:"Implémente :\n\n1. `greedy(logits)` — l'indice du logit maximal (`int(np.argmax(...))`),\n2. `echantillonner(logits, temperature, rng)` — softmax avec température (fourni), puis `rng.choice` pondéré,\n3. `top_k(logits, k, temperature, rng)` — repère les `k` meilleurs indices (`np.argsort`), met les logits des AUTRES à `-np.inf` (copie d'abord !), puis réutilise `echantillonner`.",starterCode:`import numpy as np

def softmax_t(logits, temperature=1.0):
    z = logits / temperature
    e = np.exp(z - z.max())
    return e / e.sum()

def greedy(logits):
    ...

    ...

logits = np.array([3.0, 2.5, 1.0, -1.0, -3.0])
rng = np.random.RandomState(0)
print("greedy :", greedy(logits))
print("T=1.0  :", [echantillonner(logits, 1.0, rng) for _ in range(8)])
print("top-2  :", [top_k(logits, 2, 1.0, rng) for _ in range(8)])`,solution:`import numpy as np

def softmax_t(logits, temperature=1.0):
    z = logits / temperature
    e = np.exp(z - z.max())
    return e / e.sum()

def greedy(logits):
    return int(np.argmax(logits))

def echantillonner(logits, temperature, rng):
    probas = softmax_t(logits, temperature)
    return int(rng.choice(len(logits), p=probas))

def top_k(logits, k, temperature, rng):
    garder = np.argsort(logits)[::-1][:k]
    filtres = np.full_like(logits, -np.inf)
    filtres[garder] = logits[garder]
    return echantillonner(filtres, temperature, rng)

logits = np.array([3.0, 2.5, 1.0, -1.0, -3.0])
rng = np.random.RandomState(0)
print("greedy :", greedy(logits))
print("T=1.0  :", [echantillonner(logits, 1.0, rng) for _ in range(8)])
print("top-2  :", [top_k(logits, 2, 1.0, rng) for _ in range(8)])`,tests:`import numpy as np
_logits = np.array([3.0, 2.5, 1.0, -1.0, -3.0])

_rng = np.random.RandomState(42)
_tirages_froids = [echantillonner(_logits, 0.05, _rng) for _ in range(20)]
assert all(t == 0 for t in _tirages_froids), "Temp\xe9rature quasi nulle : quasi toujours le meilleur token"
_rng2 = np.random.RandomState(42)
_tirages = [echantillonner(_logits, 1.5, _rng2) for _ in range(50)]
assert len(set(_tirages)) >= 3, "Temp\xe9rature \xe9lev\xe9e : de la diversit\xe9"
_rng3 = np.random.RandomState(7)
_tk = [top_k(_logits, 2, 2.0, _rng3) for _ in range(40)]
assert set(_tk) <= {0, 1}, "top-2 : SEULS les 2 meilleurs tokens peuvent sortir, m\xeame \xe0 haute temp\xe9rature"
assert len(set(_tk)) == 2, "top-2 \xe0 haute temp\xe9rature : les deux doivent appara\xeetre"
_rng4 = np.random.RandomState(0)
assert top_k(_logits, 1, 1.0, _rng4) == 0, "top-1 == greedy"
assert np.allclose(_logits, np.array([3.0, 2.5, 1.0, -1.0, -3.0])), "top_k ne doit PAS modifier les logits d'origine (copie !)"
print("TESTS_PASS")`,hints:["echantillonner : probas = softmax_t(...), puis int(rng.choice(len(logits), p=probas)).","top_k : np.argsort(logits)[::-1][:k] donne les k meilleurs indices ; np.full_like(logits, -np.inf) crée le tableau filtré.","Si le test de non-modification échoue : tu écris dans logits au lieu d'un nouveau tableau."],needsNumpy:!0}},{kind:"quiz",questions:[{question:"Pourquoi le décodage greedy produit-il souvent des répétitions en boucle ?",options:["Un bug des implémentations","Toujours prendre le token le plus probable peut créer un cycle stable : une phrase répétée redevient le contexte le plus probable pour elle-même","Les logits sont aléatoires","Le vocabulaire est trop petit"],correct:1,explanation:"Le mode le plus probable localement n'est pas la séquence la plus intéressante globalement. Un peu d'aléa (température, top-k/top-p) casse ces cycles — c'est pour ça que presque aucune API ne décode en pur greedy par défaut."},{question:"Que garantit top-k que la température seule ne garantit pas ?",options:["Des réponses plus longues","Les tokens de la longue traîne (absurdes mais de probabilité non nulle) ne peuvent JAMAIS être tirés, quelle que soit la température","Un texte déterministe","Une meilleure grammaire"],correct:1,explanation:"Avec T élevée, même un token à 0.01 % finit par sortir sur des milliers de tirages — une hallucination flagrante suffit à ruiner une réponse. Top-k/top-p posent un plancher de qualité en tronquant la distribution."}]}]}]},{id:"m11",tier:3,title:"Coder avec les API LLM",tagline:"Messages, rôles, température, sorties structurées : les gestes professionnels de 2026.",status:"ready",lessons:[{id:"m11l1",title:"Anatomie d'un appel LLM",minutes:35,sections:[{kind:"text",md:'# Le format universel : une liste de messages\n\nToutes les API LLM modernes (Anthropic, OpenAI, Mistral, modèles locaux via Ollama…) partagent la même structure de requête : une **liste de messages**, chacun avec un `role` et un `content` :\n\n```\nmessages = [\n    {"role": "user", "content": "Explique le RAG en une phrase."},\n    {"role": "assistant", "content": "Le RAG combine..."},\n    {"role": "user", "content": "Et en anglais ?"},\n]\n```\n\n- `system` (ou paramètre dédié) : les instructions de cadrage — ton, format, contraintes\n- `user` / `assistant` : l\'historique de conversation, en alternance\n- Le modèle est **sans état** : à chaque appel, tu renvoies *tout* l\'historique. La « mémoire » d\'un chatbot, c\'est toi qui la gères, dans cette liste.\n\n## Les paramètres qui comptent\n\n- `model` : le modèle choisi (compromis coût / capacité / latence)\n- `temperature` : tu l\'as implémentée au module 9 ! 0 → extraction fiable, ~1 → créativité\n- `max_tokens` : borne de longueur de la réponse (et de la facture)\n\n## S\'entraîner sans clé d\'API\n\nDans cette leçon, tu travailles avec `MockLLM`, un faux client qui reproduit fidèlement l\'interface d\'un vrai SDK. C\'est une pratique professionnelle standard : on développe et on teste contre un *mock*, puis on branche le vrai client — l\'interface étant identique, le reste du code ne change pas.'},{kind:"exercise",exercise:{id:"m11l1e1",title:"Gérer une conversation multi-tours",instructions:'Le `MockLLM` du starter imite un vrai SDK : `client.chat(messages, temperature=...)` renvoie un dict `{"role": "assistant", "content": "..."}`.\n\nÉcris la classe `Conversation` :\n\n- `__init__(client, system)` : stocke le client et initialise `self.messages` avec le message system\n- `demander(question)` : ajoute le message user, appelle `client.chat(self.messages)`, **ajoute la réponse à l\'historique** (sinon le modèle « oublie » !), et renvoie le `content` de la réponse\n\nC\'est le squelette de tout chatbot — celui que tu réécrirais avec le vrai SDK Anthropic ou OpenAI en changeant deux lignes.',starterCode:`class MockLLM:
    """Faux client LLM, interface identique \xe0 un vrai SDK."""
    def chat(self, messages, temperature=0.7):
        assert messages[0]["role"] == "system", "Le premier message doit \xeatre system"
        n_users = sum(1 for m in messages if m["role"] == "user")
        dernier = messages[-1]["content"]
        return {"role": "assistant",
                "content": f"[R\xe9ponse au tour {n_users} \xe0 : {dernier}]"}

class Conversation:
    def __init__(self, client, system):
        ...

    def demander(self, question):
        ...

conv = Conversation(MockLLM(), "Tu es un tuteur Python concis.")
print(conv.demander("C'est quoi un embedding ?"))
print(conv.demander("Donne un exemple."))
print(f"Historique : {len(conv.messages)} messages")`,solution:`class MockLLM:
    def chat(self, messages, temperature=0.7):
        assert messages[0]["role"] == "system", "Le premier message doit \xeatre system"
        n_users = sum(1 for m in messages if m["role"] == "user")
        dernier = messages[-1]["content"]
        return {"role": "assistant",
                "content": f"[R\xe9ponse au tour {n_users} \xe0 : {dernier}]"}

class Conversation:
    def __init__(self, client, system):
        self.client = client
        self.messages = [{"role": "system", "content": system}]

    def demander(self, question):
        self.messages.append({"role": "user", "content": question})
        reponse = self.client.chat(self.messages)
        self.messages.append(reponse)
        return reponse["content"]

conv = Conversation(MockLLM(), "Tu es un tuteur Python concis.")
print(conv.demander("C'est quoi un embedding ?"))
print(conv.demander("Donne un exemple."))
print(f"Historique : {len(conv.messages)} messages")`,tests:`_c = Conversation(MockLLM(), "Tu es utile.")
_r1 = _c.demander("Question A")
assert "tour 1" in _r1, "Le premier appel doit \xeatre le tour 1"

assert "tour 2" in _r2, "Le mock doit voir 2 messages user : as-tu bien conserv\xe9 l'historique ?"
assert len(_c.messages) == 5, "Apr\xe8s 2 tours : system + 2\xd7(user + assistant) = 5 messages"
assert _c.messages[0]["role"] == "system", "Le message system doit rester en t\xeate"
assert _c.messages[-1]["role"] == "assistant", "Le dernier message doit \xeatre la r\xe9ponse de l'assistant"
print("TESTS_PASS")`,hints:['self.messages démarre avec [{"role": "system", "content": system}].',"demander : append du user, appel au client, append de la réponse, return du content.","Si le test \"tour 2\" échoue : tu n'ajoutes pas la réponse assistant à l'historique."]}},{kind:"quiz",questions:[{question:"Pourquoi doit-on renvoyer tout l'historique à chaque appel d'API ?",options:["Pour des raisons de facturation",'Parce que les API LLM sont sans état : le modèle ne "se souvient" que de ce qu\'on lui envoie',"C'est optionnel, le serveur garde l'historique","Pour chiffrer la conversation"],correct:1,explanation:"Chaque appel est indépendant. C'est aussi pour ça que les longues conversations coûtent de plus en plus cher en tokens d'entrée — d'où les stratégies de résumé d'historique et le prompt caching."},{question:"Pour extraire des données structurées d'un document, quelle température choisir ?",options:["1.5","0.9","0 (ou proche de 0)","La température n'a aucun effet"],correct:2,explanation:"L'extraction demande de la reproductibilité, pas de la créativité : température minimale. Tu as vu au module 9 pourquoi : la distribution devient quasi déterministe."}]}]},{id:"m11l2",title:"Sorties structurées et robustesse",minutes:35,sections:[{kind:"text",md:`# Le LLM comme composant logiciel

Dans une vraie application, la sortie du LLM n'est pas lue par un humain : elle alimente **du code**. Il faut donc des sorties *structur\xe9es* (JSON) et un code *robuste* face aux r\xe9ponses imparfaites.

## Demander du JSON

Le geste de base : sp\xe9cifier le sch\xe9ma dans le prompt.

\`\`\`
prompt = """Extrais du texte suivant un JSON avec les cl\xe9s
"nom" (str), "sentiment" ("positif"|"negatif"|"neutre") et "score" (float 0-1).
R\xe9ponds UNIQUEMENT avec le JSON, sans texte autour.

Texte : {texte}"""
\`\`\`

(Les API modernes offrent aussi des modes JSON garantis et le *function calling* / *tool use* \u{2014} m\xeame principe, contraintes appliqu\xe9es c\xf4t\xe9 serveur.)

## Le probl\xe8me : le mod\xe8le \xab d\xe9borde \xbb

Malgr\xe9 la consigne, un mod\xe8le peut r\xe9pondre :

\`\`\`
Voici le JSON demand\xe9 :
{"nom": "produit X", "sentiment": "positif", "score": 0.9}
J'esp\xe8re que cela vous aide !
\`\`\`

Un \`json.loads\` na\xeff explose. Le r\xe9flexe professionnel : **extraire** le JSON de la r\xe9ponse (chercher le premier \`{\` et le dernier \`}\`), parser, **valider** les champs, et pr\xe9voir un plan B (nouvelle tentative, valeur par d\xe9faut, erreur explicite).

> Cette \xab couche de d\xe9fiance \xbb entre le LLM et ton code, c'est ce qui distingue une d\xe9mo d'un produit. Les biblioth\xe8ques comme Pydantic ou Instructor industrialisent exactement \xe7a.`},{kind:"exercise",exercise:{id:"m11l2e1",title:"Parser robuste de réponses LLM",instructions:'Écris `extraire_json(reponse)` qui :\n\n1. localise le premier `{` et le dernier `}` de la chaîne (méthodes `.find()` et `.rfind()`),\n2. si l\'un des deux est absent → renvoie `None`,\n3. tente `json.loads` sur la sous-chaîne ; en cas de `json.JSONDecodeError` → renvoie `None`,\n4. sinon renvoie le dictionnaire.\n\nPuis `extraire_sentiment(reponse)` qui utilise la première et renvoie la valeur de `"sentiment"` si elle vaut `"positif"`, `"negatif"` ou `"neutre"` — sinon `"inconnu"`.',starterCode:`import json

def extraire_json(reponse):
    ...

def extraire_sentiment(reponse):
    ...

brut = 'Voici : {"sentiment": "positif", "score": 0.9} Voil\xe0 !'
print(extraire_json(brut))
print(extraire_sentiment(brut))
print(extraire_sentiment("D\xe9sol\xe9, je ne peux pas."))`,solution:`import json

def extraire_json(reponse):
    debut = reponse.find("{")
    fin = reponse.rfind("}")
    if debut == -1 or fin == -1:
        return None
    try:
        return json.loads(reponse[debut:fin + 1])
    except json.JSONDecodeError:
        return None

def extraire_sentiment(reponse):
    data = extraire_json(reponse)
    if data and data.get("sentiment") in ("positif", "negatif", "neutre"):
        return data["sentiment"]
    return "inconnu"

brut = 'Voici : {"sentiment": "positif", "score": 0.9} Voil\xe0 !'
print(extraire_json(brut))
print(extraire_sentiment(brut))
print(extraire_sentiment("D\xe9sol\xe9, je ne peux pas."))`,tests:`assert extraire_json('{"a": 1}') == {"a": 1}, "JSON propre : doit \xeatre pars\xe9"
assert extraire_json('bla {"a": 1} bla') == {"a": 1}, "JSON entour\xe9 de texte : doit \xeatre extrait"
assert extraire_json('pas de json ici') is None, "Aucun JSON : None"
assert extraire_json('{"cass\xe9": ') is None, "JSON invalide : None, pas une exception !"
assert extraire_sentiment('ok {"sentiment": "negatif"}') == "negatif", "Doit extraire 'negatif'"
assert extraire_sentiment('{"sentiment": "euphorique"}') == "inconnu", "Valeur hors sch\xe9ma : 'inconnu'"
assert extraire_sentiment('rien') == "inconnu", "Pas de JSON : 'inconnu'"
print("TESTS_PASS")`,hints:['.find("{") renvoie -1 si absent — teste-le avant de découper.',"La tranche est reponse[debut:fin + 1] — le +1 pour inclure la dernière accolade.","try/except json.JSONDecodeError autour de json.loads, return None dans le except."]}},{kind:"quiz",questions:[{question:"Pourquoi valider les champs du JSON même après un parsing réussi ?",options:["Par pur formalisme","Le modèle peut renvoyer un JSON valide mais avec des valeurs hors schéma (clé manquante, catégorie inventée)","json.loads valide déjà le schéma","Pour améliorer la vitesse"],correct:1,explanation:'Syntaxe valide ≠ schéma respecté. Un LLM peut inventer "sentiment": "mitigé". Pydantic/Instructor automatisent cette validation — le principe reste identique.'},{question:"Qu'est-ce que le \"tool use\" (function calling) d'une API LLM ?",options:["Le modèle exécute lui-même du code sur le serveur","On déclare des fonctions avec leur schéma ; le modèle répond par un appel structuré que NOTRE code exécute","Un plugin de l'éditeur de code","Une technique de fine-tuning"],correct:1,explanation:"Le modèle ne fait que produire une demande d'appel structurée (nom + arguments JSON validés). C'est ton code qui exécute et renvoie le résultat — c'est la brique de base des agents (module 13)."}]}]},{id:"m11l3",title:"Tokens, coûts et gestion du contexte",minutes:35,sections:[{kind:"text",md:`# L'\xe9conomie des tokens : la comp\xe9tence invisible

Une application LLM en production vit sous trois contraintes chiffr\xe9es : le **co\xfbt** (factur\xe9 au million de tokens, entr\xe9e et sortie \xe0 des tarifs diff\xe9rents), la **fen\xeatre de contexte** (au-del\xe0, l'API refuse), et la **latence** (proportionnelle aux tokens g\xe9n\xe9r\xe9s). Savoir estimer et ma\xeetriser ces chiffres est ce qui s\xe9pare le prototype du produit rentable.

## Estimer sans tokenizer

L'ordre de grandeur \xe0 conna\xeetre : **~4 caract\xe8res par token** en anglais, un peu plus en fran\xe7ais. Pour dimensionner, l'estimation \`len(texte) // 4\` suffit largement \u{2014} les biblioth\xe8ques officielles (tiktoken\u{2026}) donnent le compte exact quand il le faut.

## Le co\xfbt d'une conversation qui s'allonge

Souviens-toi du module 11 : l'API est sans \xe9tat, on renvoie *tout l'historique \xe0 chaque tour*. Cons\xe9quence arithm\xe9tique brutale : le co\xfbt d'une conversation cro\xeet **quadratiquement** avec le nombre de tours \u{2014} le tour 20 renvoie les 19 pr\xe9c\xe9dents. D'o\xf9 les strat\xe9gies de production :

- **Troncature** : ne garder que les derniers messages qui tiennent dans un budget de tokens (en pr\xe9servant TOUJOURS le message system !),
- **R\xe9sum\xe9** : compresser les vieux tours en un r\xe9sum\xe9,
- **Prompt caching** : les pr\xe9fixes stables (system, exemples) sont factur\xe9s \xe0 prix r\xe9duit s'ils ne changent pas \u{2014} une raison de plus de structurer ses prompts avec le stable au d\xe9but.`},{kind:"exercise",exercise:{id:"m11l3e1",title:"Budget de contexte et facture",instructions:"Implémente :\n\n1. `estimer_tokens(texte)` — `len(texte) // 4` (minimum 1 pour un texte non vide, 0 si vide),\n2. `cout_appel(messages, prix_entree, prix_sortie, tokens_sortie)` — somme des tokens estimés des `content` × `prix_entree` + `tokens_sortie × prix_sortie` (prix par token),\n3. `tronquer(messages, budget)` — garde le message `system` (index 0) **plus** les messages les plus récents dont le total estimé (system compris) tient dans `budget` ; les messages gardés restent dans l'ordre chronologique.",starterCode:`def estimer_tokens(texte):
    ...

def cout_appel(messages, prix_entree, prix_sortie, tokens_sortie):
    ...

def tronquer(messages, budget):
    ...

MESSAGES = [
    {"role": "system", "content": "Tu es un assistant concis."},   # ~6 tokens
    {"role": "user", "content": "a" * 400},                        # ~100 tokens
    {"role": "assistant", "content": "b" * 200},                   # ~50 tokens
    {"role": "user", "content": "c" * 100},                        # ~25 tokens
]

print(cout_appel(MESSAGES, 0.000003, 0.000015, 500))
court = tronquer(MESSAGES, 90)
print([m["role"] for m in court])`,solution:`def estimer_tokens(texte):
    if not texte:
        return 0
    return max(1, len(texte) // 4)

def cout_appel(messages, prix_entree, prix_sortie, tokens_sortie):
    tokens_entree = sum(estimer_tokens(m["content"]) for m in messages)
    return tokens_entree * prix_entree + tokens_sortie * prix_sortie

def tronquer(messages, budget):
    system = messages[0]
    reste = messages[1:]
    total = estimer_tokens(system["content"])
    gardes = []
    for m in reversed(reste):
        t = estimer_tokens(m["content"])
        if total + t > budget:
            break
        gardes.append(m)
        total += t
    return [system] + gardes[::-1]

MESSAGES = [
    {"role": "system", "content": "Tu es un assistant concis."},
    {"role": "user", "content": "a" * 400},
    {"role": "assistant", "content": "b" * 200},
    {"role": "user", "content": "c" * 100},
]

print(cout_appel(MESSAGES, 0.000003, 0.000015, 500))
court = tronquer(MESSAGES, 90)
print([m["role"] for m in court])`,tests:`assert estimer_tokens("") == 0, "Texte vide : 0 token"
assert estimer_tokens("abc") == 1, "Texte court non vide : au moins 1 token"
assert estimer_tokens("a" * 400) == 100, "400 caract\xe8res : ~100 tokens"
_c = cout_appel(MESSAGES, 0.000003, 0.000015, 500)
_attendu = (6 + 100 + 50 + 25) * 0.000003 + 500 * 0.000015
assert abs(_c - _attendu) < 1e-9, "Co\xfbt = tokens d'entr\xe9e x prix_entree + tokens de sortie x prix_sortie"
_court = tronquer(MESSAGES, 90)
assert _court[0]["role"] == "system", "Le message system doit TOUJOURS survivre \xe0 la troncature"
assert [m["role"] for m in _court] == ["system", "assistant", "user"], "Budget 90 : system (6) + assistant (50) + user (25) = 81 ; le gros user de 100 tokens saute"
_tout = tronquer(MESSAGES, 10000)
assert len(_tout) == 4, "Budget large : tout est conserv\xe9"
assert [m["role"] for m in _tout] == ["system", "user", "assistant", "user"], "L'ordre chronologique doit \xeatre pr\xe9serv\xe9"
print("TESTS_PASS")`,hints:["tronquer : pars de la FIN (reversed), accumule tant que ça tient, puis remets à l'endroit avec [::-1].","Initialise le total avec les tokens du system : il fait partie du budget.",'Le break s\'arrête au premier message qui ne tient pas — on ne "saute" pas pour prendre un plus vieux.']}},{kind:"quiz",questions:[{question:"Pourquoi le coût d'un chatbot croît-il quadratiquement avec la longueur de la conversation ?",options:["Les API augmentent leurs prix en cours de session","Chaque tour renvoie TOUT l'historique : le tour n paie ~n messages, et la somme 1+2+...+n est quadratique","Les réponses deviennent plus longues","C'est faux, le coût est constant"],correct:1,explanation:"C'est LA surprise des factures de chatbots en production. Troncature, résumé d'historique et prompt caching sont les trois réponses standard — souvent combinées."},{question:"Pourquoi placer le contenu stable (system, exemples) au DÉBUT du prompt ?",options:["Pour la lisibilité uniquement","Le prompt caching facture à prix réduit les préfixes identiques entre appels : un début stable = cache efficace","Le modèle ignore la fin des prompts","C'est une obligation des API"],correct:1,explanation:"Le cache fonctionne par préfixe exact : tout ce qui précède le premier octet différent est réutilisé. Structurer ses prompts stable→variable est une optimisation de coût quasi gratuite."}]}]}]},{id:"m12",tier:3,title:"RAG de bout en bout",tagline:"Chunking, retrieval, assemblage de prompt : construire le pattern le plus demandé en entreprise.",status:"ready",lessons:[{id:"m12l1",title:"Chunking : découper intelligemment",minutes:35,sections:[{kind:"text",md:`# Pourquoi le RAG, et pourquoi le chunking d'abord

Un LLM ne conna\xeet ni tes documents internes, ni rien de post\xe9rieur \xe0 son entra\xeenement. Le **RAG** (Retrieval-Augmented Generation) r\xe9pond en deux temps : *retrouver* les passages pertinents dans ta base documentaire, puis les *injecter* dans le prompt pour que le mod\xe8le r\xe9ponde en s'appuyant dessus.

Tout commence par le **chunking** : d\xe9couper les documents en morceaux indexables. C'est l'\xe9tape la plus sous-estim\xe9e \u{2014} et celle qui fait le plus souvent la diff\xe9rence entre un RAG qui marche et un RAG qui hallucine.

## Les deux param\xe8tres cl\xe9s

- **Taille du chunk** : trop petit \u{2192} le contexte est amput\xe9 (une phrase orpheline ne veut rien dire) ; trop grand \u{2192} le retrieval devient impr\xe9cis et le prompt se remplit de bruit. Typiquement 200-800 tokens.
- **Chevauchement (overlap)** : les chunks cons\xe9cutifs partagent une marge (10-20 %) pour qu'une information \xe0 cheval sur une fronti\xe8re ne soit jamais coup\xe9e en deux moiti\xe9s inutilisables.

\`\`\`
Texte :   [ A B C D E F G H I J ]
taille=4, overlap=1 :
chunk 1 : [ A B C D ]
chunk 2 : [ D E F G ]      # D r\xe9p\xe9t\xe9 : le chevauchement
chunk 3 : [ G H I J ]
\`\`\`

## En production

Les d\xe9coupages r\xe9els respectent la *structure* : paragraphes, titres, cellules de tableau \u{2014} plut\xf4t que des fen\xeatres aveugles. Mais la fen\xeatre glissante avec chevauchement reste la base de r\xe9f\xe9rence, et c'est elle que tu impl\xe9mentes aujourd'hui.`},{kind:"exercise",exercise:{id:"m12l1e1",title:"Fenêtre glissante avec chevauchement",instructions:"Implémente `decouper(texte, taille, overlap)` :\n\n1. tokenise par espaces (`.split()`),\n2. produit des chunks de `taille` mots, chaque chunk commençant `taille - overlap` mots après le précédent,\n3. chaque chunk est la chaîne des mots re-joints par des espaces,\n4. le dernier chunk peut être plus court, mais **ne produis pas** de chunk entièrement contenu dans le précédent.\n\nExemple : 10 mots, taille=4, overlap=1 → chunks aux positions 0, 3, 6, 9… non, 0, 3, 6 (le chunk partant de 9 serait couvert).",starterCode:`def decouper(texte, taille, overlap):
    ...

texte = "a b c d e f g h i j"
for c in decouper(texte, taille=4, overlap=1):
    print(repr(c))`,solution:`def decouper(texte, taille, overlap):
    mots = texte.split()
    pas = taille - overlap
    chunks = []
    for debut in range(0, len(mots), pas):
        chunk = mots[debut:debut + taille]
        chunks.append(" ".join(chunk))
        if debut + taille >= len(mots):
            break
    return chunks

texte = "a b c d e f g h i j"
for c in decouper(texte, taille=4, overlap=1):
    print(repr(c))`,tests:`_c = decouper("a b c d e f g h i j", 4, 1)
assert _c == ["a b c d", "d e f g", "g h i j"], "Fen\xeatres de 4 avec 1 mot de chevauchement"
_c2 = decouper("a b c d e", 3, 0)
assert _c2 == ["a b c", "d e"], "Sans overlap : blocs disjoints, dernier incomplet"
_c3 = decouper("a b", 5, 2)
assert _c3 == ["a b"], "Texte plus court qu'un chunk : un seul chunk"
_c4 = decouper("a b c d e f", 4, 2)
assert _c4 == ["a b c d", "c d e f"], "taille=4, overlap=2 : pas de 2"
for _prev, _nxt in zip(_c[:-1], _c[1:]):
    assert _prev.split()[-1] == _nxt.split()[0], "Les chunks cons\xe9cutifs doivent partager le mot de chevauchement"

Tu as *toutes* les briques : le chunking (le\xe7on 1), la similarit\xe9 (module 5), TF-IDF (module 6), la construction de prompts (module 11). Il ne reste qu'\xe0 les visser ensemble.

## Le pipeline canonique

\`\`\`
INDEXATION (une fois) :
  documents -> chunks -> vecteurs -> index

REQU\xcaTE (\xe0 chaque question) :
  1. vectoriser la question
  2. scorer tous les chunks, garder le top-k
  3. assembler le prompt : contexte num\xe9rot\xe9 + question + consignes
  4. appeler le LLM
\`\`\`

En production, les vecteurs viennent d'un mod\xe8le d'embeddings et l'index d'une base vectorielle \u{2014} mais avec ta similarit\xe9 TF, le *flux* est identique \xe0 100 %.

## L'assemblage du prompt : l\xe0 o\xf9 tout se joue

Un bon prompt RAG contient trois choses : les passages **num\xe9rot\xe9s** (pour permettre les citations), la **question**, et des **consignes de fid\xe9lit\xe9** :

\`\`\`
R\xe9ponds UNIQUEMENT \xe0 partir des passages ci-dessous.
Cite le num\xe9ro du passage utilis\xe9, au format [1].
Si la r\xe9ponse ne s'y trouve pas, dis-le explicitement.

[1] <chunk 1>
[2] <chunk 2>

Question : <question>
\`\`\`

La consigne \xab dis-le si la r\xe9ponse n'y est pas \xbb est ta premi\xe8re d\xe9fense contre les hallucinations \u{2014} et le taux de r\xe9ponses correctement *refus\xe9es* est une m\xe9trique d'\xe9valuation \xe0 part enti\xe8re (module 13).`},{kind:"exercise",exercise:{id:"m12l2e1",title:"Le pipeline RAG complet",instructions:'Le starter fournit `score_tf` (similarité par mots communs pondérés). Implémente :\n\n1. `top_k(question, chunks, k)` — renvoie les indices des `k` chunks aux meilleurs scores, **triés du meilleur au moins bon** (indice : `sorted(range(len(scores)), key=..., reverse=True)`),\n2. `construire_prompt(question, chunks, indices)` — assemble le prompt exactement au format :\n\n```\nRéponds uniquement à partir des passages suivants. Cite tes sources au format [n].\n\n[1] <premier chunk retenu>\n[2] <second chunk retenu>\n\nQuestion : <question>\n```\n\n(numérotation [1], [2]… dans l\'ordre des indices fournis, une ligne vide avant "Question").',starterCode:`def score_tf(question, chunk):

Ton pipeline injecte des passages num\xe9rot\xe9s et exige des citations \`[n]\`. Mais rien ne garantit que le mod\xe8le respecte le contrat : il peut citer un passage qui ne dit pas ce qu'il affirme, ou inventer un num\xe9ro. La **v\xe9rification de fid\xe9lit\xe9** (*faithfulness*) est la couche de contr\xf4le qui ferme la boucle \u{2014} et l'un des sujets les plus actifs de l'ing\xe9nierie RAG.

## V\xe9rifier m\xe9caniquement ce qui peut l'\xeatre

Avant tout LLM-juge, une batterie de contr\xf4les *d\xe9terministes* attrape d\xe9j\xe0 beaucoup :

1. **Extraction des citations** : \`re.findall(r"\\[(\\d+)\\]", reponse)\` \u{2014} le module 3 au travail,
2. **Validit\xe9** : chaque num\xe9ro cit\xe9 correspond-il \xe0 un passage r\xe9ellement fourni ?
3. **Couverture** : chaque phrase affirmative contient-elle au moins une citation ?
4. **Ancrage lexical** : les mots significatifs d'une phrase se retrouvent-ils dans le passage qu'elle cite ? Un chevauchement quasi nul = alerte hallucination.

## Le score d'ancrage

Version simple et \xe9tonnamment efficace : la fraction des mots significatifs (> 3 lettres) de la phrase pr\xe9sents dans le passage cit\xe9 :

\`\`\`
ancrage = |mots(phrase) \u{2229} mots(passage)| / |mots(phrase)|
\`\`\`

Ce n'est pas parfait (paraphrases, synonymes \u{2014} les limites du lexical, module 6 !), mais en production on combine : contr\xf4les m\xe9caniques d'abord (gratuits, fiables), LLM-juge ensuite (co\xfbteux, nuanc\xe9) sur ce qui passe le premier filtre.`},{kind:"exercise",exercise:{id:"m12l3e1",title:"Vérificateur de citations",instructions:"Implémente :\n\n1. `extraire_citations(reponse)` — la liste des numéros cités `[n]` convertis en `int` (dans l'ordre, doublons inclus),\n2. `citations_valides(reponse, n_passages)` — `True` si la réponse contient **au moins une** citation et que toutes sont entre 1 et `n_passages`,\n3. `score_ancrage(phrase, passage)` — fraction des mots de plus de 3 lettres de la phrase (minuscules) présents dans le passage (minuscules) ; `1.0` si la phrase n'a aucun mot significatif.",starterCode:`import re

def extraire_citations(reponse):
    ...

def citations_valides(reponse, n_passages):

def score_ancrage(phrase, passage):
    ...

reponse = "Le RAG combine recherche et g\xe9n\xe9ration [1]. Il r\xe9duit les hallucinations [2]."
print(extraire_citations(reponse))
print(citations_valides(reponse, 2))
print(score_ancrage("Le RAG combine recherche et g\xe9n\xe9ration",
                    "Le RAG combine la recherche documentaire et la g\xe9n\xe9ration par LLM."))`,solution:`import re

def extraire_citations(reponse):
    return [int(n) for n in re.findall(r"\\[(\\d+)\\]", reponse)]

def citations_valides(reponse, n_passages):
    citations = extraire_citations(reponse)
    if not citations:
        return False
    return all(1 <= c <= n_passages for c in citations)

def score_ancrage(phrase, passage):
    mots = {m for m in phrase.lower().split() if len(m) > 3}
    if not mots:
        return 1.0
    mots_passage = set(passage.lower().split())
    return len(mots & mots_passage) / len(mots)

                    "Le RAG combine la recherche documentaire et la g\xe9n\xe9ration par LLM."))`,tests:`assert extraire_citations("Vrai [1] et vrai [2] et re-vrai [1].") == [1, 2, 1], "Num\xe9ros dans l'ordre, doublons inclus"

Un chatbot r\xe9pond. Un **agent** *agit* : il d\xe9cide d'appeler des outils (recherche, calcul, code, API), observe les r\xe9sultats, et recommence jusqu'\xe0 pouvoir r\xe9pondre. Claude Code, les Deep Research, les agents d'entreprise : tous reposent sur la m\xeame boucle, \xe9tonnamment simple.

## La boucle canonique

\`\`\`
messages = [question]
tant que True :
    decision = llm(messages)
    si decision est une r\xe9ponse finale :
        retourne-la
    sinon (c'est un appel d'outil) :
        resultat = executer_outil(decision.outil, decision.args)
        messages += [decision, resultat]     # l'agent VOIT le r\xe9sultat
\`\`\`

Le point crucial : **le LLM ne fait que d\xe9cider**. C'est ton code qui ex\xe9cute les outils, contr\xf4le ce qui est permis, et renvoie les r\xe9sultats dans l'historique. Le mod\xe8le produit du texte structur\xe9 ; ton programme fait le reste.

## Les garde-fous non n\xe9gociables

Une boucle pilot\xe9e par un mod\xe8le probabiliste *peut* ne jamais s'arr\xeater, appeler un outil avec des arguments invalides, ou tourner en rond. Tout agent de production a :

- un **budget d'it\xe9rations** (max_tours) \u{2014} jamais de \`while True\` nu,
- une **validation des arguments** avant ex\xe9cution,
- une gestion d'erreur qui renvoie l'\xe9chec *au mod\xe8le* (souvent il se corrige au tour suivant !).`},{kind:"exercise",exercise:{id:"m13l1e1",title:"Implémenter la boucle agent",instructions:'Le starter fournit un `MockLLM` scripté (il « décide » d\'utiliser la calculatrice, puis répond) et un dict `OUTILS`. Implémente :\n\n`executer_agent(llm, question, outils, max_tours=5)` :\n\n1. initialise `messages = [{"role": "user", "content": question}]`,\n2. boucle au plus `max_tours` fois : appelle `llm.decider(messages)`,\n3. si la décision a le type `"reponse"` → renvoie `(decision["contenu"], messages)`,\n4. si type `"outil"` → exécute `outils[decision["nom"]](decision["args"])`, puis ajoute à `messages` la décision (role `"assistant"`) et le résultat (`{"role": "outil", "content": resultat}`),\n5. si le budget s\'épuise → renvoie `("[budget épuisé]", messages)`.',starterCode:`def calculatrice(args):
    return str(eval(args["expression"], {"__builtins__": {}}, {}))

OUTILS = {"calculatrice": calculatrice}

class MockLLM:
    """Sc\xe9nario script\xe9 : demande un calcul, puis r\xe9pond avec le r\xe9sultat."""
    def decider(self, messages):
        derniers = [m for m in messages if m["role"] == "outil"]
        if not derniers:
            return {"type": "outil", "nom": "calculatrice",
                    "args": {"expression": "127 * 43"}}
        return {"type": "reponse",
                "contenu": f"Le r\xe9sultat est {derniers[-1]['content']}."}

def executer_agent(llm, question, outils, max_tours=5):
    ...

reponse, historique = executer_agent(MockLLM(), "Combien font 127 x 43 ?", OUTILS)
print(reponse)
print(f"{len(historique)} messages dans l'historique")`,solution:`def calculatrice(args):
    return str(eval(args["expression"], {"__builtins__": {}}, {}))

OUTILS = {"calculatrice": calculatrice}

class MockLLM:
    def decider(self, messages):
        derniers = [m for m in messages if m["role"] == "outil"]
        if not derniers:
            return {"type": "outil", "nom": "calculatrice",
                    "args": {"expression": "127 * 43"}}
        return {"type": "reponse",
                "contenu": f"Le r\xe9sultat est {derniers[-1]['content']}."}

def executer_agent(llm, question, outils, max_tours=5):
    messages = [{"role": "user", "content": question}]
    for _ in range(max_tours):
        decision = llm.decider(messages)
        if decision["type"] == "reponse":
            return decision["contenu"], messages
        resultat = outils[decision["nom"]](decision["args"])
        messages.append({"role": "assistant", "content": str(decision)})
        messages.append({"role": "outil", "content": resultat})
    return "[budget \xe9puis\xe9]", messages

Construire une d\xe9mo LLM prend une journ\xe9e. Savoir **prouver qu'elle marche** \u{2014} et qu'elle marche *encore* apr\xe8s un changement de prompt ou de mod\xe8le \u{2014} est ce qui distingue l'ing\xe9nieur du bricoleur. Les evals sont devenues le nerf de la guerre.

## Les trois \xe9tages de l'\xe9valuation

**1. M\xe9triques exactes** \u{2014} quand la sortie est v\xe9rifiable m\xe9caniquement :

\`\`\`
exact_match : la r\xe9ponse normalis\xe9e est-elle exactement l'attendue ?
inclusion   : la r\xe9ponse contient-elle l'information cl\xe9 ?
\`\`\`

Rapides, objectives, parfaites pour l'extraction, la classification, le calcul.

**2. LLM-as-judge** \u{2014} quand la qualit\xe9 est subjective (ton, clart\xe9, fid\xe9lit\xe9 \xe0 une source) : on demande \xe0 un *autre* mod\xe8le de noter la r\xe9ponse selon une grille pr\xe9cise. Puissant mais \xe0 manier avec soin : biais de position, pr\xe9f\xe9rence pour les r\xe9ponses longues, auto-complaisance. R\xe8gle d'or : **calibrer le juge sur un \xe9chantillon annot\xe9 par des humains** avant de lui faire confiance.

**3. M\xe9triques m\xe9tier** \u{2014} taux de r\xe9solution des tickets, satisfaction, co\xfbt par requ\xeate. La seule v\xe9rit\xe9 finale.

## Le jeu de test (golden set)

Un fichier de cas \`{entr\xe9e, sortie attendue}\`, construit \xe0 la main, versionn\xe9 avec le code. \xc0 chaque modification du prompt ou du mod\xe8le, on rejoue tout et on compare les scores : c'est le *test de r\xe9gression* du monde LLM. 50 bons exemples battent 5000 exemples m\xe9diocres.`},{kind:"exercise",exercise:{id:"m13l2e1",title:"Un harnais d'évaluation complet",instructions:'Implémente :\n\n1. `normaliser(texte)` — minuscules, sans ponctuation `.,!?`, espaces compactés (tu l\'as déjà écrite au module 1 — recommence de mémoire !),\n2. `exact_match(prediction, attendu)` — `True` si les versions normalisées sont égales,\n3. `evaluer(systeme, jeu_de_test)` — applique `systeme(entree)` à chaque cas, calcule le taux d\'exact match, et renvoie le dict `{"score": taux, "echecs": [liste des entrées ratées]}`.\n\nLe starter fournit un faux système à évaluer.',starterCode:`import re

def systeme_a_evaluer(entree):
    """Un 'mod\xe8le' imparfait \xe0 \xe9valuer."""
    reponses = {
        "capitale de la France": "Paris.",
        "2 + 2": "4",
        "auteur de 1984": "George Orwell",

    {"entree": "capitale de la France", "attendu": "paris"},
    {"entree": "2 + 2", "attendu": "4"},
    {"entree": "auteur de 1984", "attendu": "george orwell"},

]

def normaliser(texte):
    texte = texte.lower()
    texte = re.sub(r"[.,!?]", "", texte)
    texte = re.sub(r"\\s+", " ", texte).strip()
    return texte

def exact_match(prediction, attendu):
    return normaliser(prediction) == normaliser(attendu)

def evaluer(systeme, jeu_de_test):
    echecs = []
    reussites = 0
    for cas in jeu_de_test:
        prediction = systeme(cas["entree"])
        if exact_match(prediction, cas["attendu"]):
            reussites += 1
        else:
            echecs.append(cas["entree"])
    return {"score": reussites / len(jeu_de_test), "echecs": echecs}

Le module pr\xe9c\xe9dent l'a annonc\xe9 : avant d'automatiser l'\xe9valuation avec un LLM-juge, il faut **mesurer son accord avec des humains**. Un juge, c'est un capteur \u{2014} et un capteur, \xe7a se calibre. Cette le\xe7on t'apprend \xe0 le faire proprement, avec les deux m\xe9triques standard.

## Le taux d'accord brut

Sur un \xe9chantillon annot\xe9 par des humains, la fraction des cas o\xf9 le juge donne le m\xeame verdict :

\`\`\`
accord = verdicts identiques / total
\`\`\`

Simple, mais trompeur : si 90 % des r\xe9ponses sont \xab bonnes \xbb, un juge paresseux qui dit *toujours* \xab bonne \xbb atteint 90 % d'accord\u{2026} sans rien juger du tout.

## Kappa de Cohen : l'accord corrig\xe9 du hasard

Le kappa compare l'accord observ\xe9 \xe0 l'accord qu'on obtiendrait *par hasard* vu les distributions de chacun :

\`\`\`
kappa = (accord_observe - accord_hasard) / (1 - accord_hasard)

accord_hasard = P(les deux disent oui) + P(les deux disent non)
              = p_juge_oui \xd7 p_humain_oui + p_juge_non \xd7 p_humain_non
\`\`\`

- kappa \u{2248} 1 : accord r\xe9el excellent
- kappa \u{2248} 0 : le juge ne fait pas mieux que le hasard (m\xeame si l'accord brut est haut !)
- Rep\xe8res usuels : < 0.4 faible \xb7 0.4-0.6 mod\xe9r\xe9 \xb7 0.6-0.8 substantiel \xb7 > 0.8 excellent

Le juge paresseux du paragraphe pr\xe9c\xe9dent ? Accord brut 90 %, **kappa 0** \u{2014} d\xe9masqu\xe9. C'est exactement pour \xe7a que les papiers d'\xe9valuation rapportent le kappa, pas l'accord brut.`},{kind:"exercise",exercise:{id:"m13l3e1",title:"Accord et kappa",instructions:"Les verdicts sont des listes de booléens (`True` = réponse jugée bonne). Implémente :\n\n1. `taux_accord(juge, humain)` — fraction des positions où les deux listes coïncident,\n2. `kappa_cohen(juge, humain)` — la formule du cours : calcule `p_juge` (fraction de True chez le juge), `p_humain`, puis `accord_hasard = p_juge * p_humain + (1 - p_juge) * (1 - p_humain)`, et enfin le kappa. Cas limite : si `accord_hasard == 1` (distributions dégénérées), renvoie `0.0`,\n3. `juge_fiable(juge, humain, seuil=0.6)` — `True` si le kappa atteint le seuil.",starterCode:`def taux_accord(juge, humain):

    return sum(1 for j, h in zip(juge, humain) if j == h) / len(humain)

def kappa_cohen(juge, humain):
    n = len(humain)
    p_juge = sum(juge) / n
    p_humain = sum(humain) / n
    accord_hasard = p_juge * p_humain + (1 - p_juge) * (1 - p_humain)
    if accord_hasard == 1:
        return 0.0
    return (taux_accord(juge, humain) - accord_hasard) / (1 - accord_hasard)
