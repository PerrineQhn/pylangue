En NLP, en IA et avec les LLM, la donn\xe9e de base est **la cha\xeene de caract\xe8res**. Avant de parler de tokens, d'embeddings ou d'attention, il faut \xeatre \xe0 l'aise avec la manipulation de texte en Python \u{2014} c'est le socle de *tout* le reste : nettoyage de corpus, construction de prompts, parsing de r\xe9ponses de mod\xe8les.

## Variables et cha\xeenes

Une variable se cr\xe9e par simple affectation. Les cha\xeenes (\`str\`) se d\xe9limitent par des guillemets simples ou doubles :

\`\`\`
phrase = "Les mod\xe8les de langage pr\xe9disent le prochain token."
auteur = 'un data scientist'
\`\`\`

Les **f-strings** sont la mani\xe8re moderne d'ins\xe9rer des valeurs dans du texte \u{2014} tu les utiliseras en permanence pour construire des prompts :

\`\`\`
modele = "GPT"
prompt = f"R\xe9sume ce texte comme le ferait {auteur} avec {modele}."
\`\`\`

## Les m\xe9thodes de cha\xeenes essentielles

- \`.lower()\` / \`.upper()\` \u{2014} normaliser la casse
- \`.strip()\` \u{2014} retirer les espaces (et sauts de ligne) en d\xe9but/fin
- \`.replace(a, b)\` \u{2014} remplacer une sous-cha\xeene
- \`.split(sep)\` \u{2014} d\xe9couper en liste (premi\xe8re \xe9tape vers la *tokenisation* !)
- \`.join(liste)\` \u{2014} recoller une liste en cha\xeene
- \`in\` \u{2014} tester la pr\xe9sence d'une sous-cha\xeene

> En nettoyage de corpus r\xe9el, ces six m\xe9thodes couvrent une part \xe9norme du travail quotidien.`},{kind:"code",title:"Exemple à exécuter — observe chaque sortie",runnable:!0,code:`texte = "  Le Transformer a \xe9t\xe9 introduit en 2017.  \\n"

propre = texte.strip()
print(repr(propre))          # repr() montre la cha\xeene exacte

minuscules = propre.lower()
print(minuscules)

mots = minuscules.split(" ")
print(mots)
print(f"Nombre de mots : {len(mots)}")

# .join() fait l'inverse de .split()
recolle = " ".join(mots)
print(recolle)`},{kind:"exercise",exercise:{id:"m1l1e1",title:"Normaliser un texte brut",instructions:`\xc9cris une fonction \`normaliser(texte)\` qui :

1. retire les espaces et sauts de ligne en d\xe9but/fin,
2. met tout en minuscules,
3. remplace les doubles espaces \`"  "\` par des espaces simples.

C'est litt\xe9ralement la premi\xe8re \xe9tape de 90 % des pipelines NLP.`,starterCode:`def normaliser(texte):
    # \xc0 toi de jouer !
    ...

print(normaliser("  Bonjour  le MONDE \\n"))`,solution:`def normaliser(texte):
    texte = texte.strip()
    texte = texte.lower()
    texte = texte.replace("  ", " ")
    return texte

print(normaliser("  Bonjour  le MONDE \\n"))`,tests:`assert normaliser("  Bonjour  le MONDE \\n") == "bonjour le monde", "La normalisation de '  Bonjour  le MONDE ' devrait donner 'bonjour le monde'"
assert normaliser("IA") == "ia", "normaliser('IA') devrait donner 'ia'"
assert normaliser(" Un  deux  trois ") == "un deux trois", "Les doubles espaces doivent devenir simples"
print("TESTS_PASS")`,hints:["Enchaîne les méthodes : strip() d'abord, puis lower(), puis replace().","N'oublie pas le return ! Une fonction sans return renvoie None."]}},{kind:"quiz",questions:[{question:'Que renvoie "Hello World".split(" ") ?',options:['"HelloWorld"','["Hello", "World"]','("Hello", "World")',"Une erreur"],correct:1,explanation:"split() découpe la chaîne selon le séparateur et renvoie une liste de sous-chaînes. C'est l'ancêtre conceptuel de la tokenisation."},{question:"Pourquoi les f-strings sont-elles importantes quand on travaille avec des LLM ?",options:["Elles rendent le code plus rapide","Elles servent à construire dynamiquement des prompts avec des variables","Elles sont obligatoires en Python 3","Elles compressent le texte"],correct:1,explanation:"Un prompt est presque toujours un template avec des parties variables (contexte, question de l'utilisateur, exemples). Les f-strings sont l'outil de base pour ça."}]}]},{id:"m1l2",title:"Listes, dictionnaires et fréquences de mots",minutes:30,sections:[{kind:"text",md:`# Compter les mots : ton premier mod\xe8le de langage (ou presque)

Avant les r\xe9seaux de neurones, le NLP reposait sur le **comptage**. Et m\xeame aujourd'hui, compter des fr\xe9quences reste partout : construction de vocabulaires, TF-IDF, statistiques de corpus, d\xe9tection de mots-cl\xe9s.

## Les listes

Une liste est une s\xe9quence ordonn\xe9e et modifiable :

\`\`\`
tokens = ["le", "chat", "dort"]
tokens.append("profond\xe9ment")
premier = tokens[0]        # indexation
derniers = tokens[-2:]     # slicing : les 2 derniers
\`\`\`

## Les dictionnaires

Un dictionnaire associe des **cl\xe9s** \xe0 des **valeurs**. C'est LA structure de donn\xe9es du NLP : vocabulaires (\`mot \u{2192} id\`), comptages (\`mot \u{2192} fr\xe9quence\`), embeddings (\`mot \u{2192} vecteur\`)\u{2026}

\`\`\`
comptes = {}
comptes["chat"] = 1
comptes["chat"] = comptes["chat"] + 1   # incr\xe9menter
"chien" in comptes                       # tester une cl\xe9 : False
comptes.get("chien", 0)                  # valeur par d\xe9faut : 0
\`\`\`

## Le motif fondamental : compter

\`\`\`
for token in tokens:
    comptes[token] = comptes.get(token, 0) + 1
\`\`\`

Ce petit motif de trois lignes, tu vas le r\xe9\xe9crire des dizaines de fois dans ta carri\xe8re (ou utiliser \`collections.Counter\`, sa version standard).`},{kind:"code",title:"Counter : le comptage version bibliothèque standard",runnable:!0,code:`from collections import Counter

texte = "le chat dort et le chien dort aussi le chat r\xeave"
tokens = texte.split()

comptes = Counter(tokens)
print(comptes)
print(comptes.most_common(3))   # les 3 tokens les plus fr\xe9quents

# Un vrai vocabulaire NLP : mot -> identifiant entier
vocab = {mot: i for i, mot in enumerate(sorted(comptes))}
print(vocab)`},{kind:"exercise",exercise:{id:"m1l2e1",title:"Top-k des mots d'un texte",instructions:"Écris une fonction `top_mots(texte, k)` qui renvoie la liste des `k` mots les plus fréquents du texte (en minuscules), du plus fréquent au moins fréquent.\n\nUtilise `Counter` et sa méthode `.most_common(k)` — mais attention, elle renvoie des paires `(mot, compte)` et on ne veut que les mots.",starterCode:`from collections import Counter

def top_mots(texte, k):
    # 1. minuscules, 2. split, 3. Counter, 4. extraire les mots
    ...

print(top_mots("Le chat dort le chat r\xeave le chien", 2))`,solution:`from collections import Counter

def top_mots(texte, k):
    tokens = texte.lower().split()
    comptes = Counter(tokens)
    return [mot for mot, _ in comptes.most_common(k)]

print(top_mots("Le chat dort le chat r\xeave le chien", 2))`,tests:`assert top_mots("Le chat dort le chat r\xeave le chien", 2) == ["le", "chat"], "Les 2 mots les plus fr\xe9quents sont 'le' puis 'chat'"
assert top_mots("a b b c c c", 1) == ["c"], "Le mot le plus fr\xe9quent est 'c'"
assert top_mots("x", 5) == ["x"], "Si k d\xe9passe le nombre de mots, on renvoie ce qu'on a"
print("TESTS_PASS")`,hints:["texte.lower().split() te donne la liste des tokens en minuscules.","Counter(tokens).most_common(k) renvoie [(mot, compte), ...] — utilise une list comprehension pour ne garder que les mots."]}},{kind:"quiz",questions:[{question:"Quelle structure de données représente naturellement un vocabulaire mot → identifiant ?",options:["Une liste","Un tuple","Un dictionnaire","Une chaîne"],correct:2,explanation:"Le dictionnaire fait l'association clé → valeur en temps constant. Les tokenizers de Hugging Face contiennent exactement ça : un dict token → id."},{question:'Que fait comptes.get("chien", 0) si "chien" n\'est pas dans le dictionnaire ?',options:["Lève une KeyError","Renvoie None","Renvoie 0",'Ajoute "chien" au dictionnaire'],correct:2,explanation:"get(clé, défaut) renvoie la valeur par défaut sans erreur ni modification. C'est ce qui rend le motif de comptage si compact."},{question:"En NLP, pourquoi met-on généralement le texte en minuscules avant de compter ?",options:["Pour économiser de la mémoire",'Pour que "Le" et "le" soient comptés comme le même mot',"Python l'exige","Pour accélérer le split"],correct:1,explanation:"C'est une forme de normalisation : sans elle, le vocabulaire explose avec des doublons. (Les tokenizers modernes comme BPE font des choix plus subtils, on le verra au palier 2.)"}]}]}]},{id:"m2",tier:1,title:"Fonctions, pipelines et objets",tagline:"Structurer son code comme un vrai pipeline NLP : fonctions, comprehensions, classes.",status:"ready",lessons:[{id:"m2l1",title:"Fonctions et list comprehensions",minutes:30,sections:[{kind:"text",md:`# Du script au pipeline

Un pipeline NLP r\xe9el, c'est une suite d'\xe9tapes : *nettoyer \u{2192} tokeniser \u{2192} filtrer \u{2192} vectoriser*. Chaque \xe9tape m\xe9rite sa **fonction** : testable, r\xe9utilisable, rempla\xe7able.

## Fonctions : les bons r\xe9flexes

\`\`\`
def tokeniser(texte, sep=" "):
    """D\xe9coupe un texte en tokens."""     # docstring
    return texte.lower().split(sep)
\`\`\`

- Param\xe8tres avec **valeur par d\xe9faut** (\`sep=" "\`)
- Une fonction = une responsabilit\xe9
- Toujours un \`return\` explicite

## List comprehensions

La mani\xe8re pythonique de transformer et filtrer des listes \u{2014} omnipr\xe9sente dans le code de pr\xe9paration de donn\xe9es :

\`\`\`
tokens = ["le", "transformer", "est", "une", "architecture"]

longs = [t for t in tokens if len(t) > 3]      # filtrer
majs  = [t.upper() for t in tokens]            # transformer
ids   = [vocab[t] for t in tokens if t in vocab]  # les deux
\`\`\`

## Stopwords : filtrer le bruit

Les mots tr\xe8s fr\xe9quents mais peu informatifs (\xab le \xbb, \xab de \xbb, \xab et \xbb\u{2026}) sont appel\xe9s **stopwords**. Les retirer est une \xe9tape classique en recherche d'information \u{2014} m\xeame si les LLM modernes, eux, gardent tout : leur tokenizer ne jette rien, c'est le m\xe9canisme d'attention qui apprend \xe0 pond\xe9rer.`},{kind:"exercise",exercise:{id:"m2l1e1",title:"Un tokenizer avec filtrage de stopwords",instructions:'Écris `tokeniser(texte, stopwords)` qui :\n\n1. met le texte en minuscules et le découpe sur les espaces,\n2. retire la ponctuation `.`, `,`, `!` et `?` collée aux mots (indice : `.strip(".,!?")`),\n3. élimine les tokens présents dans l\'ensemble `stopwords` **et** les tokens vides.\n\nRenvoie la liste des tokens restants. Une seule list comprehension bien construite peut suffire (avec une étape intermédiaire pour le strip).',starterCode:`def tokeniser(texte, stopwords):
    ...

STOP = {"le", "la", "les", "de", "et", "un", "une", "est"}
print(tokeniser("Le Transformer est une architecture de r\xe9seau !", STOP))`,solution:`def tokeniser(texte, stopwords):
    bruts = texte.lower().split()
    nettoyes = [t.strip(".,!?") for t in bruts]
    return [t for t in nettoyes if t and t not in stopwords]

est **exactement** celle des vrais outils (scikit-learn, tokenizers HF).\n\n## Le token inconnu : `<unk>`\n\nQue faire d'un mot jamais vu à l'entraînement ? Les vocabulaires réels réservent un id spécial `<unk>` (unknown). Les tokenizers modernes (BPE, module 8) contournent le problème en découpant les mots inconnus en sous-mots — mais le concept de token spécial (`<unk>`, `<pad>`, `<eos>`…) reste central dans tous les LLM."},{kind:"exercise",exercise:{id:"m2l2e1",title:"Ton premier Tokenizer complet",instructions:'Complète la classe `Tokenizer` :\n\n- `__init__` : initialise `self.vocab = {"<unk>": 0}`\n- `fit(texte)` : ajoute chaque mot (minuscules, split espace) au vocab avec l\'id suivant (`len(self.vocab)`), sans doublons\n- `encode(texte)` : renvoie la liste des ids ; un mot inconnu → id de `"<unk>"` (0)\n- `decode(ids)` : renvoie la chaîne des mots correspondants séparés par des espaces (construis un dict inverse id → mot)',starterCode:`class Tokenizer:
    def __init__(self):
        ...

    def fit(self, texte):

    def decode(self, ids):

tok = Tokenizer()

print(tok.vocab)

    def __init__(self):
        self.vocab = {"<unk>": 0}

    def fit(self, texte):
        for mot in texte.lower().split():
            if mot not in self.vocab:
                self.vocab[mot] = len(self.vocab)

    def encode(self, texte):
        return [self.vocab.get(m, 0) for m in texte.lower().split()]

    def decode(self, ids):
        inverse = {i: m for m, i in self.vocab.items()}
        return " ".join(inverse[i] for i in ids)

tok = Tokenizer()
tok.fit("le chat dort")
print(tok.vocab)

s à connaître\n\n```\nimport re\n\nre.findall(r"#\\w+", texte)        # extraire toutes les occurrences\nre.sub(r"https?://\\S+", "", texte) # remplacer (ici : supprimer les URLs)\nre.search(r"\\d{4}", texte)         # premier match (ou None)\n```\n\nLe préfixe `r"..."` (*raw string*) évite que Python interprète les backslashes — utilise-le systématiquement pour les regex.\n\n> En NLP moderne, les regex restent partout : pré-tokenisation de GPT (une grosse regex !), extraction de blocs de code dans les réponses de LLM, détection de PII à anonymiser, parsing de logs.'},{kind:"code",title:'Nettoyage type "réseaux sociaux" — exécute et observe',runnable:!0,code:`import re

tweet = "RT @bob: Les #LLM c'est fou !! \u{1F92F} https://exemple.com/article  #IA #NLP"

sans_url = re.sub(r"https?://\\S+", "", tweet)
sans_mention = re.sub(r"@\\w+", "", sans_url)
hashtags = re.findall(r"#(\\w+)", tweet)   # les () capturent sans le #
propre = re.sub(r"\\s+", " ", sans_mention).strip()

print("hashtags :", hashtags)
print("propre   :", propre)`},{kind:"exercise",exercise:{id:"m3l1e1",title:"Pipeline de nettoyage de commentaires",instructions:'Écris `nettoyer(texte)` qui, dans cet ordre :\n\n1. supprime les URLs (`http://` ou `https://` suivis de non-espaces),\n2. supprime les mentions `@pseudo`,\n3. remplace les ponctuations répétées (`!!`, `???`, `...`) par une seule occurrence — indice : `re.sub(r"([!?.])\\1+", r"\\1", ...)`,\n4. compacte les espaces multiples en un seul et retire ceux des extrémités.\n\nÉcris aussi `extraire_hashtags(texte)` qui renvoie la liste des hashtags **sans** le `#`.',starterCode:`import re

def nettoyer(texte):
    ...

def extraire_hashtags(texte):
    ...

print(nettoyer("G\xe9nial !!! @alice regarde https://x.co/abc  \xe7a"))
print(extraire_hashtags("#IA et #NLP sont li\xe9s"))`,solution:`import re

def nettoyer(texte):
    texte = re.sub(r"https?://\\S+", "", texte)
    texte = re.sub(r"@\\w+", "", texte)
    texte = re.sub(r"([!?.])\\1+", r"\\1", texte)
    texte = re.sub(r"\\s+", " ", texte).strip()
    return texte

def extraire_hashtags(texte):
    return re.findall(r"#(\\w+)", texte)

print(nettoyer("G\xe9nial !!! @alice regarde https://x.co/abc  \xe7a"))
print(extraire_hashtags("#IA et #NLP sont li\xe9s"))`,tests:`assert nettoyer("G\xe9nial !!! @alice regarde https://x.co/abc  \xe7a") == "G\xe9nial ! regarde \xe7a", "Attendu : 'G\xe9nial ! regarde \xe7a'"
assert nettoyer("Quoi ???") == "Quoi ?", "Les '???' doivent devenir '?'"
assert nettoyer("  a   b  ") == "a b", "Espaces multiples compact\xe9s, extr\xe9mit\xe9s nettoy\xe9es"
assert extraire_hashtags("#IA et #NLP sont li\xe9s") == ["IA", "NLP"], "Hashtags sans le #"
assert extraire_hashtags("rien ici") == [], "Aucun hashtag : liste vide"
print("TESTS_PASS")`,hints:["Enchaîne quatre re.sub, chacun sur le résultat du précédent.",'Dans r"([!?.])\\1+" : le groupe ( ) capture le caractère, \\1+ matche ses répétitions, et r"\\1" le remplace par une seule occurrence.','Pour les hashtags : re.findall(r"#(\\w+)", texte) — les parenthèses font que findall renvoie le contenu du groupe.']}},{kind:"quiz",questions:[{question:'Que renvoie re.findall(r"\\d+", "an 2017, puis 2023") ?',options:['["2017", "2023"]','"20172023"','["2", "0", "1", "7", ...]',"None"],correct:0,explanation:'\\d+ matche des séquences de chiffres aussi longues que possible (quantificateur "gourmand") : deux matches, renvoyés comme liste de chaînes.'},{question:'Pourquoi écrire les regex avec le préfixe r"..." ?',options:["Pour les rendre plus rapides","Pour que Python n'interprète pas les backslashes (\\d resterait \\d, pas un caractère d'échappement)","C'est obligatoire pour re.sub","Pour activer le mode multiligne"],correct:1,explanation:'Sans raw string, "\\n" devient un saut de ligne avant même d\'arriver au moteur regex. Avec r"\\n", la regex reçoit bien le motif \\n. Réflexe systématique.'}]}]},{id:"m3l2",title:"JSON : le format des API et des datasets",minutes:30,sections:[{kind:"text",md:'# La lingua franca des données\n\nRéponses d\'API LLM, datasets Hugging Face, configurations de modèles, logs d\'évaluation : **tout est en JSON**. Sa correspondance avec Python est directe : objet → `dict`, tableau → `list`, string → `str`, number → `int`/`float`, `null` → `None`.\n\n## Les deux fonctions centrales\n\n```\nimport json\n\ndata = json.loads(chaine)          # JSON (str) -> objets Python\nchaine = json.dumps(data)          # objets Python -> JSON (str)\njson.dumps(data, indent=2, ensure_ascii=False)  # lisible + accents\n```\n\n## Naviguer dans du JSON imbriqué\n\nLes réponses d\'API sont profondément imbriquées. La navigation, c\'est des crochets en cascade — avec `.get()` pour les champs optionnels :\n\n```\nreponse = {"choices": [{"message": {"content": "Bonjour !"}}]}\ntexte = reponse["choices"][0]["message"]["content"]\nusage = reponse.get("usage", {}).get("total_tokens", 0)  # robuste si absent\n```\n\n## Le format JSONL\n\nLes datasets NLP utilisent souvent le **JSON Lines** : un objet JSON par ligne. C\'est le format des fichiers de fine-tuning (OpenAI, Anthropic), des exports de corpus, des logs d\'éval :\n\n```\nfor ligne in contenu.splitlines():\n    exemple = json.loads(ligne)\n```'},{kind:"exercise",exercise:{id:"m3l2e1",title:"Analyser un dataset JSONL de classification",instructions:"Le starter contient un mini-dataset JSONL (une critique par ligne : `texte` + `label`). Écris :\n\n1. `charger_jsonl(contenu)` — parse chaque ligne non vide et renvoie la liste des dicts,\n2. `stats_labels(exemples)` — renvoie un dict `label → nombre d'exemples`,\n3. `textes_du_label(exemples, label)` — la liste des champs `texte` ayant ce label.\n\nC'est exactement le genre d'inspection qu'on fait avant tout fine-tuning : vérifier l'équilibre des classes.",starterCode:`import json

print(stats_labels(ex))
print(textes_du_label(ex, "negatif"))`,solution:`import json

DATA = """{"texte": "Film magnifique", "label": "positif"}

{"texte": "Chef-d'oeuvre absolu", "label": "positif"}

{"texte": "Sc\xe9nario incoh\xe9rent", "label": "negatif"}

def charger_jsonl(contenu):

Un corpus d'entra\xeenement fait souvent des dizaines de gigaoctets. Le charger entier dans une liste ? Impossible. La r\xe9ponse pythonique : les **g\xe9n\xe9rateurs** \u{2014} des fonctions qui *produisent* les \xe9l\xe9ments un par un, \xe0 la demande, avec \`yield\`.

## yield : produire sans accumuler

\`\`\`
def lire_corpus(lignes):
    for ligne in lignes:
        ligne = ligne.strip().lower()
        if ligne:                # on filtre au vol
            yield ligne          # produit UNE valeur, puis se met en pause
\`\`\`

Appeler \`lire_corpus(...)\` n'ex\xe9cute *rien* : \xe7a renvoie un g\xe9n\xe9rateur. Le code ne tourne qu'au fil de l'it\xe9ration (\`for\`, \`next()\`, \`list()\`). M\xe9moire utilis\xe9e : une ligne \xe0 la fois, pas le corpus entier.

## Le pattern central du ML : les batches

Les GPU traitent les donn\xe9es par **lots** (batches). Tout data loader \u{2014} y compris ceux de PyTorch \u{2014} repose sur ce motif : accumuler jusqu'\xe0 la taille voulue, c\xe9der le lot, recommencer :

\`\`\`
def par_batch(elements, taille):
    batch = []
    for e in elements:
        batch.append(e)
        if len(batch) == taille:
            yield batch
            batch = []
    if batch:            # le dernier lot, incomplet
        yield batch
\`\`\`

## Expressions g\xe9n\xe9ratrices

Comme une list comprehension, mais paresseuse \u{2014} parenth\xe8ses au lieu de crochets :

\`\`\`
total_tokens = sum(len(l.split()) for l in lignes)   # aucun stockage interm\xe9diaire
\`\`\``},{kind:"exercise",exercise:{id:"m4l1e1",title:"Un data loader minimal",instructions:"Implémente deux générateurs :\n\n1. `tokens_du_corpus(phrases)` — cède (`yield`) chaque token (minuscules, split espace) de chaque phrase, un par un,\n2. `par_batch(elements, taille)` — regroupe n'importe quel itérable en listes de `taille` éléments (dernier lot possiblement incomplet).\n\nLes deux doivent être de vrais générateurs (utiliser `yield`), composables : `par_batch(tokens_du_corpus(phrases), 4)`.",starterCode:`def tokens_du_corpus(phrases):

_lots = list(par_batch(tokens_du_corpus(["Le chat dort", "Le chien aboie fort", "Fin"]), 4))
assert _lots == [["le", "chat", "dort", "le"], ["chien", "aboie", "fort", "fin"]], "Les deux g\xe9n\xe9rateurs doivent se composer"
print("TESTS_PASS")`,hints:["tokens_du_corpus : deux for imbriqués, yield token au centre.",'par_batch : accumule dans une liste, yield + remise à zéro quand elle est pleine, et n\'oublie pas le "if batch: yield batch" final.']}},{kind:"quiz",questions:[{question:"Que se passe-t-il à l'appel de gen = par_batch(corpus, 32) ?",options:["Tout le corpus est découpé immédiatement en lots","Rien ne s'exécute : un générateur est créé, le code tournera pendant l'itération","Le premier lot est calculé","Une erreur si corpus est trop grand"],correct:1,explanation:"L'évaluation est paresseuse : c'est le for (ou next()) qui déclenche l'exécution, lot par lot. C'est ce qui permet de streamer des téraoctets avec quelques Mo de RAM."},{question:"Quelle est la différence entre [f(x) for x in data] et (f(x) for x in data) ?",options:["Aucune","La première construit toute la liste en mémoire, la seconde produit les valeurs à la demande","La seconde est une erreur de syntaxe","La seconde trie les résultats"],correct:1,explanation:"Crochets = liste matérialisée ; parenthèses = expression génératrice paresseuse. Pour un sum() ou un max() sur un gros flux, la version paresseuse évite le pic mémoire."}]}]},{id:"m4l2",title:"Erreurs, robustesse et annotations de type",minutes:30,sections:[{kind:"text",md:`# Le code qui survit \xe0 la production

Un pipeline qui appelle une API LLM sur 10 000 documents *va* rencontrer des erreurs : timeouts, rate limits, JSON malform\xe9. La diff\xe9rence entre un script et un syst\xe8me, c'est ce qui se passe \xe0 ce moment-l\xe0.

## try / except : pr\xe9cis, jamais silencieux

\`\`\`
try:
    data = json.loads(reponse)
except json.JSONDecodeError:      # on attrape PR\xc9CIS\xc9MENT ce qu'on attend
    data = None                   # et on d\xe9cide quoi faire
\`\`\`

Deux r\xe8gles d'or : ne jamais attraper \`Exception\` \xe0 l'aveugle (\xe7a masque les vrais bugs), et ne jamais laisser un \`except: pass\` silencieux.

## Le retry avec backoff : LE pattern des API LLM

Les erreurs de rate limit (429) sont *normales* et *temporaires*. Le r\xe9flexe professionnel : r\xe9essayer en attendant de plus en plus longtemps (backoff exponentiel : 1 s, 2 s, 4 s\u{2026}). Toutes les biblioth\xe8ques clientes le font ; savoir l'\xe9crire soi-m\xeame est un classique d'entretien.

## Annotations de type : lire les signatures

Les annotations ne changent pas l'ex\xe9cution, mais documentent et permettent la v\xe9rification statique. Tu les liras partout dans les biblioth\xe8ques ML :

\`\`\`
def encoder(textes: list[str], batch_size: int = 32) -> list[list[float]]:
    ...
\`\`\`

\xc7a se lit : \xab prend une liste de cha\xeenes, renvoie une liste de vecteurs \xbb. Les signatures typ\xe9es sont la *documentation la plus fiable* d'une biblioth\xe8que \u{2014} souvent plus \xe0 jour que la doc elle-m\xeame.`},{kind:"exercise",exercise:{id:"m4l2e1",title:"Retry avec backoff exponentiel",instructions:"Le starter fournit `APIInstable`, qui échoue les 2 premiers appels (`RateLimitError`) puis répond. Écris :\n\n`appeler_avec_retry(fonction, max_essais=4)` qui :\n\n1. tente `fonction()` ; si ça réussit, renvoie le résultat,\n2. sur `RateLimitError` : note le délai de backoff `2 ** tentative` (1, 2, 4…) dans la liste `delais` au lieu de vraiment attendre, puis réessaie,\n3. après `max_essais` échecs, relance l'exception (`raise`).\n\nRenvoie le tuple `(resultat, delais)`.",starterCode:`class RateLimitError(Exception):
    pass

class APIInstable:
    def __init__(self, echecs=2):
        self.restants = echecs
    def appeler(self):
        if self.restants > 0:
            self.restants -= 1
            raise RateLimitError("429 Too Many Requests")
        return "r\xe9ponse du mod\xe8le"

def appeler_avec_retry(fonction, max_essais=4):
    delais = []
    ...

api = APIInstable(echecs=2)
print(appeler_avec_retry(api.appeler))`,solution:`class RateLimitError(Exception):
    pass

class APIInstable:
    def __init__(self, echecs=2):
        self.restants = echecs
    def appeler(self):
        if self.restants > 0:
            self.restants -= 1
            raise RateLimitError("429 Too Many Requests")
        return "r\xe9ponse du mod\xe8le"

def appeler_avec_retry(fonction, max_essais=4):
    delais = []
    for tentative in range(max_essais):
        try:
            return fonction(), delais
        except RateLimitError:
            if tentative == max_essais - 1:
                raise
            delais.append(2 ** tentative)

api = APIInstable(echecs=2)
print(appeler_avec_retry(api.appeler))`,tests:`_r, _d = appeler_avec_retry(APIInstable(echecs=2).appeler)
assert _r == "r\xe9ponse du mod\xe8le", "Apr\xe8s 2 \xe9checs, le 3e essai doit r\xe9ussir"
assert _d == [1, 2], "Backoff exponentiel : d\xe9lais 2**0=1 puis 2**1=2"
_r2, _d2 = appeler_avec_retry(APIInstable(echecs=0).appeler)
assert _r2 == "r\xe9ponse du mod\xe8le" and _d2 == [], "Succ\xe8s imm\xe9diat : aucun d\xe9lai"
try:
    appeler_avec_retry(APIInstable(echecs=10).appeler, max_essais=3)
    assert False, "Apr\xe8s max_essais \xe9checs, l'exception doit \xeatre relanc\xe9e"
except RateLimitError:
    pass
print("TESTS_PASS")`,hints:["Une boucle for tentative in range(max_essais) contenant un try/except.","return fonction(), delais — le return sort de la boucle dès le premier succès.","Dans le except : si c'était la dernière tentative, raise (tout court) relance l'exception ; sinon append le délai."]}},{kind:"quiz",questions:[{question:'Pourquoi "except Exception: pass" est-il dangereux ?',options:["C'est une erreur de syntaxe","Il avale TOUTES les erreurs — y compris les bugs (typos, None inattendu) — qui deviennent invisibles","Il ralentit le programme","Il ne fonctionne qu'en Python 2"],correct:1,explanation:'Un pipeline qui "réussit" en silence sur des données corrompues est pire qu\'un crash : tu découvres le problème dans les résultats du modèle, des semaines plus tard. Attrape précis, loggue toujours.'},{question:"Que signifie la signature def chunker(texte: str, taille: int = 500) -> list[str] ?",options:["Python refusera un appel avec un int comme texte","Elle documente : entrée str + int optionnel (défaut 500), sortie liste de str — sans effet à l'exécution","Elle convertit automatiquement les types","Elle rend la fonction plus rapide"],correct:1,explanation:"Les annotations sont déclaratives : l'interpréteur les ignore, mais mypy/pyright les vérifient et ton éditeur s'en sert pour l'autocomplétion. En ML, elles sont le premier réflexe de lecture d'une API."}]}]}]},{id:"m5",tier:2,title:"NumPy, le langage des tenseurs",tagline:"Vecteurs, matrices et vectorisation : la grammaire de tout le deep learning.",status:"ready",lessons:[{id:"m5l1",title:"Arrays, shapes et vectorisation",minutes:35,sections:[{kind:"text",md:`# NumPy : pourquoi c'est incontournable

PyTorch, TensorFlow, JAX\u{2026} toutes les biblioth\xe8ques de deep learning sont des variations autour du m\xeame objet : le **tableau multidimensionnel** (array/tenseur). NumPy est l'original \u{2014} apprendre \xe0 *penser en arrays* est le vrai objectif de ce module.

## Cr\xe9er et inspecter

\`\`\`
import numpy as np

v = np.array([1.0, 2.0, 3.0])        # vecteur, shape (3,)
M = np.array([[1, 2], [3, 4]])       # matrice, shape (2, 2)
v.shape, M.shape, M.dtype
\`\`\`

Le r\xe9flexe n\xb01 en debug de code ML : **imprimer les shapes**. La moiti\xe9 des bugs de deep learning sont des erreurs de shape.

## La vectorisation : jamais de boucle

\`\`\`
v * 2          # multiplie chaque \xe9l\xe9ment
v + w          # addition \xe9l\xe9ment par \xe9l\xe9ment
v * w          # produit \xe9l\xe9ment par \xe9l\xe9ment (PAS le produit scalaire !)
v @ w          # produit scalaire (dot product)
np.sqrt(v)     # fonction appliqu\xe9e \xe0 chaque \xe9l\xe9ment
v.sum(), v.mean(), v.max()
\`\`\`

En NLP, un mot devient un **vecteur** (embedding), une phrase une **matrice** (une ligne par token), un batch un **tenseur 3D**. Les op\xe9rations vectoris\xe9es sont des centaines de fois plus rapides que des boucles Python \u{2014} et surtout, elles correspondent aux maths des articles de recherche.

## Le produit scalaire, star du NLP

\`v @ w = v\u{2081}w\u{2081} + v\u{2082}w\u{2082} + \u{2026}\` mesure \xe0 quel point deux vecteurs \xab pointent dans la m\xeame direction \xbb. C'est le c\u{153}ur de la similarit\xe9 d'embeddings **et** des scores d'attention des transformers (palier 3). Retiens : *produit scalaire = similarit\xe9 brute*.`},{kind:"code",title:"Penser en arrays — exécute et observe les shapes",runnable:!0,needsNumpy:!0,code:`import numpy as np

# 4 "embeddings" de dimension 3 (une ligne = un mot)
E = np.array([
    [0.9, 0.1, 0.0],   # chat
    [0.8, 0.2, 0.1],   # chien
    [0.0, 0.1, 0.9],   # voiture
    [0.1, 0.0, 0.8],   # camion
])
print("shape :", E.shape)

chat = E[0]
print("norme de 'chat' :", np.linalg.norm(chat))

# Produit scalaire de 'chat' avec TOUS les mots d'un coup :
scores = E @ chat          # (4,3) @ (3,) -> (4,)
print("similarit\xe9s brutes :", scores)
print("mot le plus proche (hors lui-m\xeame) :", scores[1:].argmax() + 1)`},{kind:"exercise",exercise:{id:"m5l1e1",title:"Normaliser des vecteurs (norme L2)",instructions:"Les embeddings sont souvent **normalisés** : divisés par leur norme pour avoir une longueur de 1. Écris `normaliser_l2(M)` qui prend une matrice `(n, d)` et renvoie la matrice où **chaque ligne** a une norme de 1.\n\nIndices : `np.linalg.norm(M, axis=1)` donne la norme de chaque ligne (shape `(n,)`) ; pour diviser une matrice `(n, d)` par un vecteur `(n,)`, il faut le remodeler en `(n, 1)` avec `.reshape(-1, 1)` ou `[:, None]` — c'est le *broadcasting*.",starterCode:`import numpy as np

def normaliser_l2(M):
    ...

M = np.array([[3.0, 4.0], [0.0, 2.0]])
print(normaliser_l2(M))`,solution:`import numpy as np

def normaliser_l2(M):
    normes = np.linalg.norm(M, axis=1)
    return M / normes[:, None]

M = np.array([[3.0, 4.0], [0.0, 2.0]])
print(normaliser_l2(M))`,tests:`import numpy as np
_M = np.array([[3.0, 4.0], [0.0, 2.0]])
_R = normaliser_l2(_M)
assert _R.shape == (2, 2), "La shape doit \xeatre conserv\xe9e"
assert np.allclose(_R[0], [0.6, 0.8]), "Ligne 0 : [3,4]/5 = [0.6, 0.8]"
assert np.allclose(np.linalg.norm(_R, axis=1), [1.0, 1.0]), "Chaque ligne doit avoir une norme de 1"
print("TESTS_PASS")`,hints:["np.linalg.norm(M, axis=1) → normes de chaque ligne, shape (n,).","normes[:, None] transforme (n,) en (n, 1) : la division se diffuse alors ligne par ligne."],needsNumpy:!0}},{kind:"quiz",questions:[{question:"Quelle est la shape du résultat de A @ B si A est (32, 128) et B est (128, 64) ?",options:["(32, 64)","(128, 128)","(64, 32)","Erreur : shapes incompatibles"],correct:0,explanation:"(n, k) @ (k, m) → (n, m) : les dimensions internes (128) doivent coïncider et disparaissent. C'est LA règle à connaître par cœur — c'est elle qui régit toutes les couches d'un réseau."},{question:"Quelle est la différence entre v * w et v @ w pour deux vecteurs ?",options:["Aucune","v * w est élément par élément (renvoie un vecteur), v @ w est le produit scalaire (renvoie un nombre)","v @ w est plus lent","v * w n'existe pas en NumPy"],correct:1,explanation:"Confusion classique ! * multiplie terme à terme, @ somme ensuite ces produits. Le produit scalaire mesure la similarité — on le retrouvera dans l'attention."}]}]},{id:"m5l2",title:"Similarité cosinus et recherche sémantique",minutes:35,sections:[{kind:"text",md:`# La similarit\xe9 cosinus : le moteur du RAG

Quand un syst\xe8me RAG (Retrieval-Augmented Generation) cherche \xab les passages les plus pertinents \xbb pour une question, il calcule presque toujours une **similarit\xe9 cosinus** entre l'embedding de la question et ceux des documents. Toute base vectorielle (Pinecone, Chroma, pgvector, FAISS\u{2026}) fait \xe7a \xe0 grande \xe9chelle.

## La formule

\`\`\`
cos(u, v) = (u @ v) / (||u|| * ||v||)
\`\`\`

- Vaut **1** si les vecteurs pointent exactement dans la m\xeame direction
- **0** s'ils sont orthogonaux (sans rapport)
- **-1** s'ils sont oppos\xe9s

Diviser par les normes rend la mesure **ind\xe9pendante de la longueur** des vecteurs : seule la *direction* compte \u{2014} et dans un espace d'embeddings, la direction encode le *sens*.

## Recherche s\xe9mantique en 3 lignes

Avec une matrice \`E\` d'embeddings normalis\xe9s (norme 1), la similarit\xe9 cosinus se r\xe9duit au produit scalaire :

\`\`\`
scores = E @ q          # q : embedding normalis\xe9 de la requ\xeate
meilleur = scores.argmax()
\`\`\`

C'est *exactement* ce que fait une base vectorielle, plus des structures d'index pour aller vite sur des millions de vecteurs. Le concept tient en deux lignes de NumPy.`},{kind:"exercise",exercise:{id:"m5l2e1",title:"Mini moteur de recherche sémantique",instructions:"Implémente :\n\n1. `cosinus(u, v)` — la similarité cosinus entre deux vecteurs (utilise `np.linalg.norm`)\n2. `chercher(E, q)` — renvoie l'**indice** de la ligne de `E` la plus similaire (au sens cosinus) au vecteur requête `q`\n\nPour `chercher`, une boucle sur les lignes avec `cosinus` est acceptable — ou la version vectorisée pour les ambitieux.",starterCode:`import numpy as np

def cosinus(u, v):
    ...

def chercher(E, q):
    ...

# Embeddings jouets : chat, chien, voiture
E = np.array([[0.9, 0.1, 0.0],
              [0.8, 0.3, 0.1],
              [0.0, 0.1, 0.9]])
q = np.array([1.0, 0.2, 0.0])   # requ\xeate proche de "chat"
print(chercher(E, q))`,solution:`import numpy as np

def cosinus(u, v):
    return (u @ v) / (np.linalg.norm(u) * np.linalg.norm(v))

def chercher(E, q):
    scores = [cosinus(ligne, q) for ligne in E]
    return int(np.argmax(scores))

E = np.array([[0.9, 0.1, 0.0],
              [0.8, 0.3, 0.1],
              [0.0, 0.1, 0.9]])
q = np.array([1.0, 0.2, 0.0])
print(chercher(E, q))`,tests:`import numpy as np
assert abs(cosinus(np.array([1.0, 0.0]), np.array([1.0, 0.0])) - 1.0) < 1e-9, "Deux vecteurs identiques : cosinus = 1"
assert abs(cosinus(np.array([1.0, 0.0]), np.array([0.0, 1.0]))) < 1e-9, "Vecteurs orthogonaux : cosinus = 0"
assert abs(cosinus(np.array([2.0, 0.0]), np.array([5.0, 0.0])) - 1.0) < 1e-9, "La longueur ne doit pas compter, seulement la direction"
_E = np.array([[0.9, 0.1, 0.0], [0.8, 0.3, 0.1], [0.0, 0.1, 0.9]])
assert chercher(_E, np.array([1.0, 0.2, 0.0])) == 0, "La requ\xeate est la plus proche de la ligne 0"
assert chercher(_E, np.array([0.1, 0.0, 1.0])) == 2, "Cette requ\xeate est la plus proche de la ligne 2"
print("TESTS_PASS")`,hints:["cosinus : (u @ v) divisé par le produit des deux normes.","chercher : calcule la liste des similarités puis np.argmax. Pense à convertir en int()."],needsNumpy:!0}},{kind:"quiz",questions:[{question:"Pourquoi la similarité cosinus plutôt que le simple produit scalaire ?",options:["Elle est plus rapide à calculer","Elle ignore la longueur des vecteurs et ne compare que leur direction","Elle donne toujours des valeurs positives","Le produit scalaire ne marche pas en dimension > 3"],correct:1,explanation:"Un document long peut avoir un embedding de grande norme sans être plus pertinent. La normalisation rend la comparaison équitable. (Beaucoup de modèles d'embeddings sortent d'ailleurs des vecteurs déjà normalisés.)"},{question:"Dans un pipeline RAG, à quel moment intervient la similarité cosinus ?",options:["Pendant la génération de la réponse par le LLM","Lors de la récupération (retrieval) des passages les plus proches de la question","Pendant le fine-tuning","Elle n'intervient pas dans le RAG"],correct:1,explanation:"RAG = retrieval puis génération. Le retrieval compare l'embedding de la question à ceux des chunks de documents — par similarité cosinus — puis injecte les meilleurs passages dans le prompt."}]}]}]},{id:"m6",tier:2,title:"TF-IDF et moteur de recherche from scratch",tagline:"Vectoriser des documents sans réseau de neurones — et comprendre ce que les embeddings ont amélioré.",status:"ready",lessons:[{id:"m6l1",title:"Bag of words : des textes aux vecteurs",minutes:30,sections:[{kind:"text",md:`# Transformer du texte en nombres, premi\xe8re m\xe9thode

Aucun algorithme ne travaille sur des mots : il faut des **vecteurs**. La m\xe9thode historique, toujours utilis\xe9e (recherche lexicale, baselines, features), est le **bag of words** (sac de mots) : chaque document devient un vecteur de comptages, une dimension par mot du vocabulaire.

\`\`\`
Vocabulaire : ["chat", "chien", "dort", "mange"]
"le chat dort, le chat mange"  ->  [2, 0, 1, 1]
"le chien dort"                ->  [0, 1, 1, 0]
\`\`\`

L'*ordre des mots est perdu* (d'o\xf9 le nom : un \xab sac \xbb) \u{2014} c'est la grande limite, et la raison d'\xeatre des mod\xe8les s\xe9quentiels puis des transformers.

## Construire la repr\xe9sentation

Deux \xe9tapes, que tu connais d\xe9j\xe0 par morceaux :

1. **Vocabulaire** : l'ensemble des mots du corpus, avec un index fixe par mot (module 2 !),
2. **Vectorisation** : pour chaque document, compter les occurrences de chaque mot du vocabulaire (module 1 !).

## La matrice documents \xd7 mots

Empile les vecteurs : tu obtiens une matrice \`(n_documents, taille_vocab)\`. C'est la structure de donn\xe9es de la recherche d'information classique \u{2014} et l'entr\xe9e des premiers classifieurs de texte. Dans scikit-learn, tout ceci s'appelle \`CountVectorizer\` ; aujourd'hui tu l'\xe9cris toi-m\xeame.`},{kind:"exercise",exercise:{id:"m6l1e1",title:"Vectoriseur bag of words complet",instructions:"Implémente :\n\n1. `construire_vocab(documents)` — renvoie le dict `mot → index` des mots (minuscules, split espace) de tous les documents, **triés alphabétiquement** (pour des index reproductibles),\n2. `vectoriser(document, vocab)` — renvoie la liste de comptages, de longueur `len(vocab)`, où la position `vocab[mot]` contient le nombre d'occurrences du mot (mots hors vocab : ignorés).",starterCode:`def construire_vocab(documents):
    ...

def vectoriser(document, vocab):
    ...

docs = ["le chat dort", "le chien mange le os"]
vocab = construire_vocab(docs)
print(vocab)
print(vectoriser("le chat mange le chat", vocab))`,solution:`def construire_vocab(documents):
    mots = set()
    for doc in documents:
        mots.update(doc.lower().split())
    return {mot: i for i, mot in enumerate(sorted(mots))}

def vectoriser(document, vocab):
    vecteur = [0] * len(vocab)
    for mot in document.lower().split():
        if mot in vocab:
            vecteur[vocab[mot]] += 1
    return vecteur

docs = ["le chat dort", "le chien mange le os"]
vocab = construire_vocab(docs)
print(vocab)
print(vectoriser("le chat mange le chat", vocab))`,tests:`_v = construire_vocab(["b a", "c a"])
assert _v == {"a": 0, "b": 1, "c": 2}, "Vocab tri\xe9 alphab\xe9tiquement avec index 0, 1, 2"
_vocab = construire_vocab(["le chat dort", "le chien mange le os"])
assert vectoriser("le chat mange le chat", _vocab) == [2, 0, 0, 2, 1, 0], "Comptages aux bons index"
assert vectoriser("un mot inconnu", _vocab) == [0, 0, 0, 0, 0, 0], "Mots hors vocabulaire ignor\xe9s"
assert len(vectoriser("", _vocab)) == len(_vocab), "Toujours la longueur du vocabulaire"
print("TESTS_PASS")`,hints:["Un set() pour collecter les mots uniques, puis sorted() + enumerate pour les index.","vectoriser : commence par [0] * len(vocab), puis incrémente vecteur[vocab[mot]] pour chaque mot connu."]}},{kind:"quiz",questions:[{question:"Quelle information le bag of words perd-il complètement ?",options:["La fréquence des mots",'L\'ordre des mots (et donc la syntaxe : "le chat mord le chien" = "le chien mord le chat")',"La casse","La langue du document"],correct:1,explanation:"Les deux phrases donnent exactement le même vecteur. Cette limite a motivé les n-grammes, puis les RNN, puis les transformers — qui traitent la séquence, pas le sac."},{question:"Pour un vocabulaire de 50 000 mots, à quoi ressemble le vecteur d'un tweet de 15 mots ?",options:["Un vecteur dense de dimension 15","Un vecteur de dimension 50 000, presque entièrement rempli de zéros","Une matrice 15 × 50 000","Un dictionnaire de 50 000 clés"],correct:1,explanation:"C'est le problème de la *sparsité* : d'immenses vecteurs creux. Les embeddings neuronaux (dimension 300-4096, denses) sont précisément la réponse moderne à ce problème."}]}]},{id:"m6l2",title:"TF-IDF : pondérer ce qui compte",minutes:35,sections:[{kind:"text",md:`# Le probl\xe8me des comptages bruts

Dans un moteur de recherche bag of words, \xab le \xbb et \xab de \xbb dominent tous les scores : tr\xe8s fr\xe9quents, jamais informatifs. **TF-IDF** corrige \xe7a avec une id\xe9e simple : *un mot compte s'il est fr\xe9quent dans CE document mais rare dans LES AUTRES*.

## La formule

Pour un mot \`m\` dans un document \`d\` :

\`\`\`
tf(m, d)   = nombre d'occurrences de m dans d
idf(m)     = log(N / df(m))          # N = nb docs, df = nb docs contenant m
tfidf(m,d) = tf(m, d) * idf(m)
\`\`\`

- Un mot pr\xe9sent dans **tous** les documents : \`idf = log(N/N) = 0\` \u{2192} poids nul. \xab Le \xbb dispara\xeet de lui-m\xeame, sans liste de stopwords !
- Un mot rare : \`idf\` \xe9lev\xe9 \u{2192} ses occurrences p\xe8sent lourd.

## Le moteur de recherche

Score d'un document pour une requ\xeate = somme des tf-idf des mots de la requ\xeate :

\`\`\`
score(d, requete) = somme des tfidf(m, d) pour chaque mot m de la requ\xeate
\`\`\`

Classe les documents par score d\xe9croissant : c'est un moteur de recherche. Les vrais syst\xe8mes (Elasticsearch, et la moiti\xe9 des pipelines RAG en mode \xab recherche hybride \xbb) utilisent **BM25**, un raffinement direct de cette formule \u{2014} le c\u{153}ur conceptuel est identique.`},{kind:"exercise",exercise:{id:"m6l2e1",title:"Moteur de recherche TF-IDF",instructions:"À partir de `docs` (liste de listes de tokens), implémente :\n\n1. `idf(mot, docs)` — `log(N / df)` avec `math.log` ; si le mot n'apparaît dans aucun doc, renvoie `0.0`,\n2. `score(doc, requete, docs)` — somme, pour chaque mot de la requête (liste de tokens), de `tf * idf` où `tf` est le comptage du mot dans `doc`,\n3. `chercher(requete, docs)` — renvoie l'indice du document au meilleur score.",starterCode:`import math

docs = [
    ["le", "chat", "mange", "le", "poisson"],
    ["le", "chien", "mange", "le", "os"],
    ["le", "poisson", "nage", "dans", "le", "lac"],
]

def idf(mot, docs):
    ...

def score(doc, requete, docs):
    ...

def chercher(requete, docs):
    ...

print(round(idf("poisson", docs), 3))
print(chercher(["poisson", "mange"], docs))`,solution:`import math

docs = [
    ["le", "chat", "mange", "le", "poisson"],
    ["le", "chien", "mange", "le", "os"],
    ["le", "poisson", "nage", "dans", "le", "lac"],
]

def idf(mot, docs):
    df = sum(1 for d in docs if mot in d)
    if df == 0:
        return 0.0
    return math.log(len(docs) / df)

def score(doc, requete, docs):
    total = 0.0
    for mot in requete:
        tf = doc.count(mot)
        total += tf * idf(mot, docs)
    return total

def chercher(requete, docs):
    scores = [score(d, requete, docs) for d in docs]
    return scores.index(max(scores))

print(round(idf("poisson", docs), 3))
print(chercher(["poisson", "mange"], docs))`,tests:`import math

assert idf("dragon", docs) == 0.0, "Mot absent partout : 0.0 (pas de division par z\xe9ro !)"
assert chercher(["poisson", "mange"], docs) == 0, "Doc 0 contient 'poisson' ET 'mange'"
assert chercher(["nage"], docs) == 2, "'nage' n'est que dans le doc 2"
_s0 = score(docs[0], ["le", "le", "le"], docs)

print("TESTS_PASS")`,hints:["df = sum(1 for d in docs if mot in d) — le nombre de documents contenant le mot.","tf = doc.count(mot) — les listes Python ont une méthode count.","chercher : calcule tous les scores puis scores.index(max(scores))."]}},{kind:"quiz",questions:[{question:'Pourquoi idf("le") vaut-il 0 si "le" apparaît dans tous les documents ?',options:["C'est un bug de la formule","log(N/N) = log(1) = 0 : un mot présent partout ne discrimine rien, son poids s'annule naturellement",'Parce que "le" est dans une liste de stopwords',"Parce que tf vaut 0"],correct:1,explanation:"C'est l'élégance de TF-IDF : le filtrage des mots vides émerge de la statistique du corpus, sans aucune liste manuelle — et il s'adapte au domaine (dans un corpus médical, \"patient\" devient un quasi-stopword)."},{question:"Quelle limite de TF-IDF les embeddings neuronaux résolvent-ils ?",options:["La lenteur de calcul",'TF-IDF ne voit aucun lien entre "voiture" et "automobile" : sans mot exact commun, score nul',"TF-IDF ne gère pas les corpus de plus de 1000 documents","TF-IDF nécessite un GPU"],correct:1,explanation:'TF-IDF est purement lexical : synonymes et paraphrases lui échappent. Les embeddings capturent la *sémantique* — "voiture" et "automobile" ont des vecteurs proches. Les meilleurs systèmes RAG combinent d\'ailleurs les deux (recherche hybride).'}]}]}]},{id:"m7",tier:2,title:"Un neurone, puis un réseau",tagline:"Régression logistique et descente de gradient from scratch : les mécanismes qui entraînent aussi GPT.",status:"ready",lessons:[{id:"m7l1",title:"Le neurone : produit scalaire + sigmoïde",minutes:35,sections:[{kind:"text",md:`# L'unit\xe9 de base de tout le deep learning

Un \xab neurone \xbb artificiel n'a rien de myst\xe9rieux : c'est un **produit scalaire suivi d'une fonction non lin\xe9aire**. Tu as d\xe9j\xe0 tous les ingr\xe9dients.

## La pr\xe9diction

Pour un vecteur d'entr\xe9e \`x\` (par exemple : les features d'une critique de film), des poids \`w\` et un biais \`b\` :

\`\`\`
z = w @ x + b          # le "logit" : un score brut, de -inf \xe0 +inf
p = sigmoid(z)         # une probabilit\xe9, entre 0 et 1
\`\`\`

La **sigmo\xefde** \xe9crase le score en probabilit\xe9 :

\`\`\`
sigmoid(z) = 1 / (1 + exp(-z))
\`\`\`

- \`z\` tr\xe8s n\xe9gatif \u{2192} p \u{2248} 0 (classe \xab n\xe9gatif \xbb)
- \`z = 0\` \u{2192} p = 0.5 (incertitude totale)
- \`z\` tr\xe8s positif \u{2192} p \u{2248} 1 (classe \xab positif \xbb)

## Ce que "apprendre" veut dire

Les poids \`w\` encodent l'importance de chaque feature : un poids positif pour \xab excellent \xbb, n\xe9gatif pour \xab ennuyeux \xbb. *Apprendre = trouver les bons poids* \u{2014} c'est l'objet de la le\xe7on suivante. Pour l'instant, on construit la machine \xe0 pr\xe9dire.

> Un LLM entier n'est que ce motif r\xe9p\xe9t\xe9 : des produits matriciels (des milliards de \xab neurones \xbb) entrecoup\xe9s de non-lin\xe9arit\xe9s. La sortie finale \u{2014} softmax sur le vocabulaire \u{2014} est la cousine multiclasse de cette sigmo\xefde.`},{kind:"exercise",exercise:{id:"m7l1e1",title:"Construire le neurone",instructions:"Implémente en NumPy :\n\n1. `sigmoid(z)` — doit fonctionner sur un scalaire **ou** un array (np.exp est vectorisé, profites-en),\n2. `predire_proba(X, w, b)` — pour une matrice `X` de shape `(n, d)` (n exemples, d features) : renvoie les `n` probabilités, soit `sigmoid(X @ w + b)`,\n3. `predire_classe(X, w, b)` — renvoie 1 quand la probabilité dépasse 0.5, sinon 0 (astuce : `(probas >= 0.5).astype(int)`).",starterCode:`import numpy as np

def sigmoid(z):
    ...

def predire_proba(X, w, b):

def predire_classe(X, w, b):
    ...

# 3 critiques, 2 features : [nb mots positifs, nb mots n\xe9gatifs]
X = np.array([[3.0, 0.0], [0.0, 2.0], [1.0, 1.0]])
w = np.array([1.5, -1.5])   # poids "sens\xe9s" fix\xe9s \xe0 la main
b = 0.0
print(predire_proba(X, w, b).round(3))
print(predire_classe(X, w, b))`,solution:`import numpy as np

print("TESTS_PASS")`,hints:["sigmoid : littéralement 1 / (1 + np.exp(-z)) — np.exp gère scalaires et arrays.","X @ w donne un vecteur de n logits ; + b se diffuse tout seul (broadcasting).","(probas >= 0.5) donne des booléens ; .astype(int) les convertit en 0/1."],needsNumpy:!0}},{kind:"quiz",questions:[{question:"Que représente le logit z = w @ x + b avant la sigmoïde ?",options:["Une probabilité","Un score brut non borné : son signe donne la classe penchée, sa magnitude la confiance","Le gradient","Le taux d'erreur"],correct:1,explanation:'Les LLM aussi produisent des logits (un par token du vocabulaire) que softmax convertit en probabilités. Le mot "logits" que tu vois dans les API vient exactement d\'ici.'},{question:"Pourquoi une non-linéarité (sigmoïde, ReLU…) est-elle indispensable dans un réseau ?",options:["Pour ralentir l'entraînement","Sans elle, empiler des couches linéaires équivaut à UNE seule couche linéaire : le réseau ne peut rien apprendre de complexe","Pour économiser de la mémoire","C'est une convention historique sans importance"],correct:1,explanation:"La composition de fonctions linéaires est linéaire : W2(W1x) = (W2W1)x. Les non-linéarités entre les couches sont ce qui donne aux réseaux profonds — et aux transformers — leur pouvoir d'expression."}]}]},{id:"m7l2",title:"La descente de gradient, à la main",minutes:40,sections:[{kind:"text",md:`# Comment un mod\xe8le apprend

L'entra\xeenement de *tous* les mod\xe8les \u{2014} de la r\xe9gression logistique \xe0 GPT \u{2014} suit la m\xeame boucle :

1. **Pr\xe9dire** avec les poids actuels,
2. **Mesurer l'erreur** avec une fonction de perte (*loss*),
3. **Calculer le gradient** : dans quelle direction bouger chaque poids pour r\xe9duire la perte,
4. **Mettre \xe0 jour** : \`w = w - lr * gradient\` (lr = *learning rate*),
5. Recommencer.

## La perte : entropie crois\xe9e binaire

Pour des probabilit\xe9s \`p\` et des \xe9tiquettes \`y\` (0 ou 1) :

\`\`\`
loss = -moyenne( y*log(p) + (1-y)*log(1-p) )
\`\`\`

Elle punit s\xe9v\xe8rement une pr\xe9diction *confiante et fausse* (log(petit) \u{2192} tr\xe8s n\xe9gatif). C'est la m\xeame famille de perte que celle qui entra\xeene les LLM (entropie crois\xe9e sur le prochain token).

## Le gradient (offert, pour cette fois)

Pour la r\xe9gression logistique, le calcul donne des formules remarquablement simples :

\`\`\`
erreur = p - y                        # vecteur (n,)
grad_w = X.T @ erreur / n             # (d,)
grad_b = erreur.mean()                # scalaire
\`\`\`

L'intuition : chaque poids est corrig\xe9 proportionnellement \xe0 *(l'erreur) \xd7 (la feature qui y a contribu\xe9)*. En pratique, PyTorch calcule ces gradients automatiquement (\`loss.backward()\`) \u{2014} mais les avoir \xe9crits une fois \xe0 la main change ta compr\xe9hension de tout le reste.`},{kind:"exercise",exercise:{id:"m7l2e1",title:"Entraîner un classifieur de sentiment",instructions:"Le starter fournit `sigmoid` et un mini-dataset (features : [mots positifs, mots négatifs, longueur]). Implémente :\n\n1. `perte(p, y)` — l'entropie croisée binaire (utilise `np.clip(p, 1e-10, 1 - 1e-10)` avant les log pour éviter log(0)),\n2. `une_etape(X, y, w, b, lr)` — calcule `p`, puis les gradients (formules ci-dessus), et renvoie les **nouveaux** `(w, b)`,\n3. `entrainer(X, y, epochs=300, lr=0.5)` — initialise `w` à zéros et `b` à 0.0, boucle, et renvoie `(w, b)`.\n\nLes tests vérifient que la perte diminue et que le modèle classe correctement le dataset.",starterCode:`import numpy as np

def sigmoid(z):
    return 1 / (1 + np.exp(-z))

# [mots_positifs, mots_negatifs, longueur/10]
X = np.array([[3, 0, 1.2], [2, 1, 0.8], [0, 3, 1.0], [1, 2, 1.5],
              [4, 1, 2.0], [0, 2, 0.5], [3, 1, 1.0], [1, 3, 1.2]], dtype=float)
y = np.array([1, 1, 0, 0, 1, 0, 1, 0], dtype=float)

def perte(p, y):
    ...

def une_etape(X, y, w, b, lr):
    ...

def entrainer(X, y, epochs=300, lr=0.5):
    ...

w, b = entrainer(X, y)
p_final = sigmoid(X @ w + b)
print("poids appris :", w.round(2), "biais :", round(b, 2))
print("perte finale :", round(perte(p_final, y), 4))`,solution:`import numpy as np

def sigmoid(z):
    return 1 / (1 + np.exp(-z))

X = np.array([[3, 0, 1.2], [2, 1, 0.8], [0, 3, 1.0], [1, 2, 1.5],
              [4, 1, 2.0], [0, 2, 0.5], [3, 1, 1.0], [1, 3, 1.2]], dtype=float)
y = np.array([1, 1, 0, 0, 1, 0, 1, 0], dtype=float)

def perte(p, y):
    p = np.clip(p, 1e-10, 1 - 1e-10)
    return -np.mean(y * np.log(p) + (1 - y) * np.log(1 - p))

def une_etape(X, y, w, b, lr):
    p = sigmoid(X @ w + b)
    erreur = p - y
    grad_w = X.T @ erreur / len(y)
    grad_b = erreur.mean()
    return w - lr * grad_w, b - lr * grad_b

def entrainer(X, y, epochs=300, lr=0.5):
    w = np.zeros(X.shape[1])
    b = 0.0
    for _ in range(epochs):
        w, b = une_etape(X, y, w, b, lr)
    return w, b

w, b = entrainer(X, y)
p_final = sigmoid(X @ w + b)
print("poids appris :", w.round(2), "biais :", round(b, 2))
print("perte finale :", round(perte(p_final, y), 4))`,tests:`import numpy as np

_y = np.array([1.0, 0.0])

assert perte(np.array([0.1]), np.array([1.0])) > 1.5, "Pr\xe9diction confiante et fausse : perte \xe9lev\xe9e"
assert np.isfinite(perte(np.array([0.0, 1.0]), np.array([1.0, 0.0]))), "p=0 ou 1 ne doit pas donner inf \u{2014} pense \xe0 np.clip"
_w0 = np.zeros(3)
_w1, _b1 = une_etape(X, y, _w0, 0.0, 0.5)
_l0 = perte(sigmoid(X @ _w0 + 0.0), y)
_l1 = perte(sigmoid(X @ _w1 + _b1), y)
assert _l1 < _l0, "Une \xe9tape de gradient doit faire baisser la perte"
_w, _b = entrainer(X, y)
_pred = (sigmoid(X @ _w + _b) >= 0.5).astype(int)
assert (_pred == y.astype(int)).all(), "Apr\xe8s entra\xeenement, les 8 exemples doivent \xeatre bien class\xe9s"
assert _w[0] > 0 and _w[1] < 0, "Le mod\xe8le doit apprendre : mots positifs -> poids positif, mots n\xe9gatifs -> poids n\xe9gatif"
print("TESTS_PASS")`,hints:["perte : np.clip d'abord, puis -np.mean(y * np.log(p) + (1 - y) * np.log(1 - p)).","une_etape suit mot à mot les formules du cours : erreur = p - y, grad_w = X.T @ erreur / n.","entrainer : w = np.zeros(X.shape[1]), puis une boucle qui réaffecte w, b = une_etape(...)."],needsNumpy:!0}},{kind:"quiz",questions:[{question:"Que fait concrètement w = w - lr * grad_w ?",options:["Elle remet les poids à zéro","Elle déplace chaque poids d'un petit pas dans la direction qui réduit la perte","Elle normalise les poids","Elle ajoute du bruit aléatoire"],correct:1,explanation:"Le gradient pointe vers la montée de la perte ; on va dans le sens opposé, à petits pas (lr). GPT-4 a été entraîné exactement ainsi — avec des optimiseurs plus raffinés (Adam), mais le principe est celui-ci."},{question:"Que risque-t-il de se passer avec un learning rate beaucoup trop grand ?",options:["L'entraînement est juste plus rapide","La perte oscille ou diverge : les pas sont si grands qu'on saute par-dessus le minimum","Rien, le lr n'a pas d'importance","Le modèle apprend par cœur"],correct:1,explanation:"Le lr est L'hyperparamètre le plus sensible de tout le deep learning. Trop petit : interminable. Trop grand : divergence. D'où les \"lr schedules\" (warmup, décroissance) mentionnés dans tous les papiers de LLM."},{question:"Quel est le lien entre cette leçon et l'entraînement d'un LLM ?",options:["Aucun, les LLM utilisent une autre méthode","Identique dans le principe : entropie croisée + descente de gradient — sur des milliards de poids et de tokens","Les LLM n'ont pas de fonction de perte","Les LLM sont entraînés sans données"],correct:1,explanation:"Un LLM minimise l'entropie croisée de sa prédiction du prochain token, par descente de gradient (via backpropagation automatique). Tu viens d'écrire la version minimale exacte de ce processus."}]}]}]},{id:"m8",tier:2,title:"Tokenisation moderne : BPE",tagline:"Implémenter l'algorithme Byte-Pair Encoding utilisé par GPT, Llama, Claude et les autres.",status:"ready",lessons:[{id:"m8l1",title:"Pourquoi BPE, et comment ça marche",minutes:35,sections:[{kind:"text",md:`# Le probl\xe8me du vocabulaire ouvert

Ton tokenizer du module 2 a une faille b\xe9ante : tout mot jamais vu devient \`<unk>\`. Or la langue invente sans cesse (\xab rebasculer \xbb, noms propres, code, typos). \xc0 l'oppos\xe9, tokeniser caract\xe8re par caract\xe8re marche toujours\u{2026} mais produit des s\xe9quences interminables que les mod\xe8les peinent \xe0 traiter.

**BPE (Byte-Pair Encoding)** est le compromis qui a gagn\xe9 : partir des caract\xe8res, puis **fusionner it\xe9rativement la paire adjacente la plus fr\xe9quente** du corpus, jusqu'\xe0 la taille de vocabulaire voulue.

## L'algorithme d'entra\xeenement

\`\`\`
1. D\xe9coupe chaque mot en caract\xe8res : "lower" -> l o w e r
2. Compte toutes les paires adjacentes dans le corpus
3. Fusionne la paire la plus fr\xe9quente partout : (l, o) -> "lo"
4. Retourne en 2, jusqu'\xe0 N fusions
\`\`\`

Les fusions apprises refl\xe8tent la statistique de la langue : \`er\`, \`ing\`, \`tion\` \xe9mergent t\xf4t en anglais. Les mots fr\xe9quents finissent en un seul token ; les mots rares restent d\xe9coup\xe9s en sous-unit\xe9s \u{2014} mais *jamais* en \`<unk>\`.

## Concr\xe8tement chez les LLM

GPT, Llama, Claude, Mistral : tous utilisent des variantes de BPE (souvent au niveau *octet*, d'o\xf9 \xab byte \xbb-pair). Le vocabulaire (~50k \xe0 260k tokens) et la liste ordonn\xe9e des fusions **sont** le tokenizer. C'est pour \xe7a qu'un mot rare ou une langue peu dot\xe9e \xab co\xfbte \xbb plus de tokens \u{2014} et pourquoi compter les caract\xe8res d'un mot est difficile pour un LLM : il ne voit m\xeame pas les caract\xe8res.`},{kind:"exercise",exercise:{id:"m8l1e1",title:"Compter et trouver la meilleure paire",instructions:'Un corpus BPE se représente comme un dict `mot_découpé → fréquence`, où le mot découpé est un **tuple** de symboles : `("l","o","w"): 5`.\n\nImplémente :\n\n1. `compter_paires(corpus)` — renvoie un dict `(sym1, sym2) → fréquence totale` de chaque paire *adjacente*, pondérée par la fréquence du mot,\n2. `meilleure_paire(paires)` — renvoie la paire la plus fréquente (`max` avec `key=paires.get`) ; si le dict est vide, renvoie `None`.',starterCode:`corpus = {
    ("l", "o", "w"): 5,
    ("l", "o", "w", "e", "r"): 2,
    ("n", "e", "w"): 6,
}

def compter_paires(corpus):
    ...

def meilleure_paire(paires):
    ...

p = compter_paires(corpus)
print(p)
print(meilleure_paire(p))`,solution:`corpus = {
    ("l", "o", "w"): 5,
    ("l", "o", "w", "e", "r"): 2,
    ("n", "e", "w"): 6,
}

def compter_paires(corpus):
    paires = {}
    for mot, freq in corpus.items():
        for i in range(len(mot) - 1):
            paire = (mot[i], mot[i + 1])
            paires[paire] = paires.get(paire, 0) + freq
    return paires

def meilleure_paire(paires):
    if not paires:
        return None
    return max(paires, key=paires.get)

p = compter_paires(corpus)
print(p)
print(meilleure_paire(p))`,tests:`_p = compter_paires({("a", "b", "c"): 3})
assert _p == {("a", "b"): 3, ("b", "c"): 3}, "Chaque paire adjacente, pond\xe9r\xe9e par la fr\xe9quence du mot"
_p2 = compter_paires(corpus)
assert _p2[("l", "o")] == 7, "(l,o) appara\xeet dans 'low' (5) et 'lower' (2) : 7"
assert _p2[("o", "w")] == 7, "(o,w) : 5 + 2 = 7"
assert _p2[("n", "e")] == 6 and _p2[("e", "w")] == 6, "Paires de 'new' : 6"
_best = meilleure_paire(_p2)

Il te manque une seule brique : **appliquer** une fusion au corpus. Fusionner la paire \`("l","o")\` transforme \`("l","o","w")\` en \`("lo","w")\` \u{2014} partout, dans tous les mots.

\`\`\`
def fusionner_mot(mot, paire):
    # ("l","o","w","e","r") + ("l","o") -> ("lo","w","e","r")
    nouveau = []
    i = 0
    while i < len(mot):
        if i < len(mot) - 1 and (mot[i], mot[i+1]) == paire:
            nouveau.append(mot[i] + mot[i+1])   # concat\xe8ne les 2 symboles
            i += 2                               # saute la paire
        else:
            nouveau.append(mot[i])
            i += 1
    return tuple(nouveau)
\`\`\`

L'entra\xeenement complet est alors une boucle de N it\xe9rations : compter les paires (le\xe7on 1) \u{2192} prendre la meilleure \u{2192} l'appliquer partout \u{2192} m\xe9moriser la fusion dans une liste ordonn\xe9e. Cette **liste ordonn\xe9e de fusions** est le produit final : c'est elle qu'on rejoue, dans le m\xeame ordre, pour tokeniser un texte nouveau.

> Le vrai tokenizer de GPT-2 tient en ~300 lignes de Python et fait exactement \xe7a (au niveau octet, avec une regex de pr\xe9-d\xe9coupage \u{2014} celle du module 3 !). Apr\xe8s cet exercice, tu peux le lire dans le texte.`},{kind:"exercise",exercise:{id:"m8l2e1",title:"Entraîner un mini-BPE",instructions:"Le starter fournit `compter_paires` et `fusionner_mot`. Implémente :\n\n1. `appliquer_fusion(corpus, paire)` — renvoie un **nouveau** dict corpus où chaque mot a subi `fusionner_mot` (attention : deux mots différents peuvent devenir identiques après fusion — additionne alors leurs fréquences),\n2. `entrainer_bpe(corpus, n_fusions)` — répète : compter → meilleure paire → appliquer → enregistrer la paire dans `fusions`. S'arrête si plus aucune paire. Renvoie `(corpus_final, fusions)`.",starterCode:`def compter_paires(corpus):

Le papier de 2017 qui a donn\xe9 naissance aux transformers \u{2014} donc \xe0 GPT, Claude, Llama, Gemini \u{2014} repose sur une id\xe9e qu'on peut impl\xe9menter en NumPy avec ce que tu sais d\xe9j\xe0 : des produits scalaires et une normalisation.

## L'intuition

Pour comprendre le mot \xab le \xbb dans \xab le chat noir dort \xbb, un mod\xe8le doit savoir **quels autres mots regarder**. L'attention calcule, pour chaque token, une **moyenne pond\xe9r\xe9e** des autres tokens \u{2014} o\xf9 les poids refl\xe8tent la *pertinence*, mesur\xe9e par\u{2026} un produit scalaire (module 5 !).

## \xc9tape 1 : softmax, transformer des scores en poids

Les produits scalaires donnent des scores quelconques : \`[2.1, -0.3, 0.8]\`. Pour en faire des **poids de moyenne** (positifs, somme = 1), on applique softmax :

\`\`\`
softmax(x)\u{1D62} = exp(x\u{1D62}) / \u{3A3}\u{2C7C} exp(x\u{2C7C})
\`\`\`

## Le pi\xe8ge num\xe9rique (classique en entretien !)

\`exp(1000)\` d\xe9borde en \`inf\`. La solution, utilis\xe9e dans *toutes* les impl\xe9mentations r\xe9elles : soustraire le max avant l'exponentielle. Math\xe9matiquement identique (\xe7a se simplifie dans la fraction), num\xe9riquement stable :

\`\`\`
def softmax(x):
    e = np.exp(x - x.max())
    return e / e.sum()
\`\`\`

> Ce m\xeame softmax sert aussi \xe0 convertir les *logits* d'un LLM en probabilit\xe9s sur le prochain token \u{2014} c'est l\xe0 qu'agit le param\xe8tre \`temperature\` : on divise les scores par T avant le softmax. T petit \u{2192} distribution piqu\xe9e (d\xe9terministe) ; T grand \u{2192} distribution plate (cr\xe9atif).`},{kind:"exercise",exercise:{id:"m9l1e1",title:"Softmax stable, avec température",instructions:"Implémente `softmax(x, temperature=1.0)` :\n\n1. divise `x` par `temperature`,\n2. soustrais le max (stabilité numérique),\n3. exponentielle puis normalisation par la somme.\n\nVérifie ensuite ton intuition : que devient la distribution quand la température baisse ?",starterCode:`import numpy as np

La self-attention se d\xe9crit avec une m\xe9taphore de moteur de recherche interne \xe0 la phrase :

- **Query (Q)** : ce que chaque token *cherche* (\xab je suis "le", je cherche mon nom \xbb)
- **Key (K)** : ce que chaque token *offre* comme identit\xe9 (\xab je suis un nom commun \xbb)
- **Value (V)** : l'information que chaque token *transmet* si on le regarde

Chaque token est projet\xe9 en trois vecteurs (par des matrices apprises \`W_q, W_k, W_v\` \u{2014} ici on les suppose d\xe9j\xe0 appliqu\xe9es).

## La formule compl\xe8te

\`\`\`
Attention(Q, K, V) = softmax(Q @ K.T / sqrt(d)) @ V
\`\`\`

D\xe9composons pour \`n\` tokens de dimension \`d\` :

1. \`Q @ K.T\` \u{2192} matrice \`(n, n)\` : le score de chaque token envers chaque autre. **Un produit scalaire par paire de tokens** \u{2014} tu sais d\xe9j\xe0 que produit scalaire = similarit\xe9.
2. \`/ sqrt(d)\` : sans cette division, les scores grandissent avec la dimension et saturent le softmax (gradients minuscules). C'est le \xab scaled \xbb de *scaled dot-product attention*.
3. \`softmax\` **ligne par ligne** : chaque token convertit ses scores en poids qui somment \xe0 1.
4. \`@ V\` : chaque token repart avec une moyenne pond\xe9r\xe9e des valeurs des autres.

Trente lignes de NumPy, et tu as le c\u{153}ur d'un LLM. Le reste d'un transformer (module 10) : plusieurs \xab t\xeates \xbb d'attention en parall\xe8le, des couches empil\xe9es, des MLP, des normalisations.`},{kind:"code",title:"Softmax par ligne — brique nécessaire pour l'exercice",runnable:!0,needsNumpy:!0,code:`import numpy as np

def softmax_lignes(S):
    """Softmax appliqu\xe9 \xe0 chaque ligne d'une matrice."""
    e = np.exp(S - S.max(axis=1, keepdims=True))
    return e / e.sum(axis=1, keepdims=True)

S = np.array([[1.0, 2.0], [3.0, 0.0]])
P = softmax_lignes(S)
print(P)
print("sommes par ligne :", P.sum(axis=1))   # [1, 1]`},{kind:"exercise",exercise:{id:"m9l2e1",title:"Implémenter la scaled dot-product attention",instructions:"Implémente `attention(Q, K, V)` pour des matrices de shape `(n, d)` :\n\n1. scores `= Q @ K.T / sqrt(d)` (récupère `d` avec `Q.shape[1]`)\n2. poids `= softmax` ligne par ligne (fourni dans le starter)\n3. renvoie `poids @ V`\n\nC'est la formule exacte du papier de 2017 — celle qui tourne, en version optimisée GPU, à chaque token généré par un LLM.",starterCode:`import numpy as np

on… L'idée du **multi-head** : découper la dimension en `h` « têtes », faire tourner une attention *indépendante* dans chaque sous-espace, puis concaténer.\n\n## Le mécanisme\n\nPour des matrices `Q, K, V` de shape `(n, d)` et `h` têtes (avec `d` divisible par `h`) :\n\n```\n1. Découpe Q, K, V en h tranches de largeur d/h (sur les colonnes)\n2. Pour chaque tête i : sortie_i = attention(Q_i, K_i, V_i)   # ton module 9 !\n3. Concatène les h sorties -> shape (n, d) à nouveau\n```\n\n(Dans un vrai transformer s'ajoute une projection linéaire finale apprise — conceptuellement secondaire ici.)\n\n## Pourquoi l'ordre des tokens n'existe pas encore\n\nSurprise : l'attention est **insensible à l'ordre** — permuter les tokens permute juste les sorties. Or « le chat mord le chien » ≠ « le chien mord le chat ». Les transformers injectent donc l'information de position dans les embeddings : *positional encodings* appris (GPT-2), ou rotations RoPE appliquées à Q et K (Llama, la plupart des modèles récents). Retiens le principe : **la position est une information ajoutée, pas une propriété de l'architecture**."},{kind:"exercise",exercise:{id:"m10l1e1",title:"Implémenter le multi-head",instructions:"Le starter fournit `attention(Q, K, V)` (ton module 9). Implémente :\n\n`multi_head(Q, K, V, h)` qui :\n\n1. calcule `dh = d // h` (largeur d'une tête),\n2. pour chaque tête `i` : extrait les colonnes `[i*dh : (i+1)*dh]` de Q, K et V, applique `attention`,\n3. concatène les sorties avec `np.concatenate(liste, axis=1)` et la renvoie (shape `(n, d)`).",starterCode:`import numpy as np

def attention(Q, K, V):
    d = Q.shape[1]
    return softmax_lignes(Q @ K.T / np.sqrt(d)) @ V

def multi_head(Q, K, V, h):
    d = Q.shape[1]
    dh = d // h
    sorties = []
    for i in range(h):
        deb, fin = i * dh, (i + 1) * dh
        sorties.append(attention(Q[:, deb:fin], K[:, deb:fin], V[:, deb:fin]))
    return np.concatenate(sorties, axis=1)

rng = np.random.RandomState(0)
Q = rng.randn(4, 8); K = rng.randn(4, 8); V = rng.randn(4, 8)
sortie = multi_head(Q, K, V, h=2)
print("shape :", sortie.shape)`,tests:`import numpy as np

Un \xab bloc transformer \xbb (r\xe9p\xe9t\xe9 32 fois dans Llama-8B, ~100 fois dans les plus gros mod\xe8les) ajoute trois m\xe9canismes autour de l'attention :

## 1. Les connexions r\xe9siduelles

Au lieu de \`x = f(x)\`, on \xe9crit \`x = x + f(x)\` : chaque couche *ajoute une correction* au lieu de remplacer. C'est ce qui permet d'empiler des dizaines de couches sans que le gradient ne s'\xe9vanouisse \u{2014} l'information a toujours un \xab raccourci \xbb direct.

## 2. La layer normalization

Recentre et r\xe9\xe9chelonne chaque vecteur de token (moyenne 0, variance 1) pour stabiliser l'entra\xeenement :

\`\`\`
layer_norm(x) = (x - moyenne(x)) / sqrt(variance(x) + eps)
\`\`\`

(par ligne \u{2014} chaque token est normalis\xe9 ind\xe9pendamment ; les mod\xe8les r\xe9cents utilisent la variante RMSNorm, encore plus simple.)

## 3. Le MLP (feed-forward)

Apr\xe8s l'attention (qui *m\xe9lange* les tokens entre eux), un petit r\xe9seau \xe0 deux couches traite chaque token *individuellement* : expansion \xd74, non-lin\xe9arit\xe9, retour \xe0 la dimension d'origine. C'est l\xe0 que r\xe9sident ~2/3 des param\xe8tres d'un LLM \u{2014} on l'interpr\xe8te souvent comme la \xab m\xe9moire des connaissances \xbb du mod\xe8le.

## Le bloc assembl\xe9 (version pr\xe9-norm, la moderne)

\`\`\`
x = x + attention(layer_norm(x))     # communication entre tokens
x = x + mlp(layer_norm(x))           # calcul par token
\`\`\`

Deux lignes. Empile-les N fois entre un embedding d'entr\xe9e et un softmax de sortie : tu as un GPT.`},{kind:"exercise",exercise:{id:"m10l2e1",title:"Assembler le bloc complet",instructions:"Le starter fournit `attention`. Implémente :\n\n1. `layer_norm(X)` — normalise **chaque ligne** : soustrais sa moyenne, divise par `sqrt(variance + 1e-5)` (utilise `mean` et `var` avec `axis=1, keepdims=True`),\n2. `mlp(X, W1, W2)` — `relu(X @ W1) @ W2` où `relu(z) = np.maximum(0, z)`,\n3. `bloc_transformer(X, W1, W2)` — les deux lignes du cours : résiduel + attention sur la norme (avec `Q=K=V=layer_norm(X)`), puis résiduel + MLP sur la norme.",starterCode:`import numpy as np

W1 = rng.randn(4, 16) * 0.1  # expansion x4
W2 = rng.randn(16, 4) * 0.1
print(bloc_transformer(X, W1, W2).round(2))`,solution:`import numpy as np

def softmax_lignes(S):
    e = np.exp(S - S.max(axis=1, keepdims=True))
    return e / e.sum(axis=1, keepdims=True)

def attention(Q, K, V):
    d = Q.shape[1]
    return softmax_lignes(Q @ K.T / np.sqrt(d)) @ V

def layer_norm(X):
    mu = X.mean(axis=1, keepdims=True)
    var = X.var(axis=1, keepdims=True)
    return (X - mu) / np.sqrt(var + 1e-5)

def mlp(X, W1, W2):
    return np.maximum(0, X @ W1) @ W2

def bloc_transformer(X, W1, W2):
    n = layer_norm(X)
    X = X + attention(n, n, n)
    n = layer_norm(X)
    X = X + mlp(n, W1, W2)
    return X

rng = np.random.RandomState(1)
X = rng.randn(3, 4)
W1 = rng.randn(4, 16) * 0.1
W2 = rng.randn(16, 4) * 0.1
print(bloc_transformer(X, W1, W2).round(2))`,tests:`import numpy as np

assert np.allclose(_n[0].std(), 1, atol=1e-2), "Chaque ligne doit avoir un \xe9cart-type ~1"
assert not np.isnan(_n).any(), "Une ligne constante ne doit pas donner NaN \u{2014} le +1e-5 sous la racine"
_rng = np.random.RandomState(1)

assert mlp(np.zeros((2, 4)), _W1, _W2).shape == (2, 4), "Le MLP doit rendre la dimension d'origine"
_out = bloc_transformer(_Xr, _W1, _W2)
assert _out.shape == _Xr.shape, "Le bloc pr\xe9serve la shape (empilable N fois !)"

recommandée maintenant : nanoGPT de Karpathy — ~300 lignes que tu peux désormais lire ligne à ligne."}]}]}]},{id:"m11",tier:3,title:"Coder avec les API LLM",tagline:"Messages, rôles, température, sorties structurées : les gestes professionnels de 2026.",status:"ready",lessons:[{id:"m11l1",title:"Anatomie d'un appel LLM",minutes:35,sections:[{kind:"text",md:'# Le format universel : une liste de messages\n\nToutes les API LLM modernes (Anthropic, OpenAI, Mistral, modèles locaux via Ollama…) partagent la même structure de requête : une **liste de messages**, chacun avec un `role` et un `content` :\n\n```\nmessages = [\n    {"role": "user", "content": "Explique le RAG en une phrase."},\n    {"role": "assistant", "content": "Le RAG combine..."},\n    {"role": "user", "content": "Et en anglais ?"},\n]\n```\n\n- `system` (ou paramètre dédié) : les instructions de cadrage — ton, format, contraintes\n- `user` / `assistant` : l\'historique de conversation, en alternance\n- Le modèle est **sans état** : à chaque appel, tu renvoies *tout* l\'historique. La « mémoire » d\'un chatbot, c\'est toi qui la gères, dans cette liste.\n\n## Les paramètres qui comptent\n\n- `model` : le modèle choisi (compromis coût / capacité / latence)\n- `temperature` : tu l\'as implémentée au module 9 ! 0 → extraction fiable, ~1 → créativité\n- `max_tokens` : borne de longueur de la réponse (et de la facture)\n\n## S\'entraîner sans clé d\'API\n\nDans cette leçon, tu travailles avec `MockLLM`, un faux client qui reproduit fidèlement l\'interface d\'un vrai SDK. C\'est une pratique professionnelle standard : on développe et on teste contre un *mock*, puis on branche le vrai client — l\'interface étant identique, le reste du code ne change pas.'},{kind:"exercise",exercise:{id:"m11l1e1",title:"Gérer une conversation multi-tours",instructions:'Le `MockLLM` du starter imite un vrai SDK : `client.chat(messages, temperature=...)` renvoie un dict `{"role": "assistant", "content": "..."}`.\n\nÉcris la classe `Conversation` :\n\n- `__init__(client, system)` : stocke le client et initialise `self.messages` avec le message system\n- `demander(question)` : ajoute le message user, appelle `client.chat(self.messages)`, **ajoute la réponse à l\'historique** (sinon le modèle « oublie » !), et renvoie le `content` de la réponse\n\nC\'est le squelette de tout chatbot — celui que tu réécrirais avec le vrai SDK Anthropic ou OpenAI en changeant deux lignes.',starterCode:`class MockLLM:
    """Faux client LLM, interface identique \xe0 un vrai SDK."""
    def chat(self, messages, temperature=0.7):
        assert messages[0]["role"] == "system", "Le premier message doit \xeatre system"
        n_users = sum(1 for m in messages if m["role"] == "user")
        dernier = messages[-1]["content"]
        return {"role": "assistant",
                "content": f"[R\xe9ponse au tour {n_users} \xe0 : {dernier}]"}

class Conversation:
    def __init__(self, client, system):
        ...

    def demander(self, question):
        ...

conv = Conversation(MockLLM(), "Tu es un tuteur Python concis.")
print(conv.demander("C'est quoi un embedding ?"))
print(conv.demander("Donne un exemple."))
print(f"Historique : {len(conv.messages)} messages")`,solution:`class MockLLM:
    def chat(self, messages, temperature=0.7):
        assert messages[0]["role"] == "system", "Le premier message doit \xeatre system"
        n_users = sum(1 for m in messages if m["role"] == "user")
        dernier = messages[-1]["content"]
        return {"role": "assistant",
                "content": f"[R\xe9ponse au tour {n_users} \xe0 : {dernier}]"}

class Conversation:
    def __init__(self, client, system):
        self.client = client
        self.messages = [{"role": "system", "content": system}]

        self.messages.append(reponse)

conv = Conversation(MockLLM(), "Tu es un tuteur Python concis.")
print(conv.demander("C'est quoi un embedding ?"))

print(f"Historique : {len(conv.messages)} messages")`,tests:`_c = Conversation(MockLLM(), "Tu es utile.")
